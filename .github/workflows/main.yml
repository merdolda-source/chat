name: "DAMA X — Build APK"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: 'GitHub Release oluştur?'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────────────
      # 1. CHECKOUT
      # ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────
      # 2. JDK
      # ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─────────────────────────────────────────────────────────────
      # 3. TÜM PROJE DOSYALARINI OLUŞTUR (Tamamen Yenilenmiş)
      # ─────────────────────────────────────────────────────────────
      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/damax/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p gradle/wrapper
          echo "Dizinler oluşturuldu"

      # ─── settings.gradle ───────────────────────────────────────
      - name: Write settings.gradle
        run: |
          cat > settings.gradle << 'SETTINGS_EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "DamaX"
          include ':app'
          SETTINGS_EOF

      # ─── build.gradle (root) ──────────────────────────────────
      - name: Write root build.gradle
        run: |
          cat > build.gradle << 'ROOT_GRADLE_EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          ROOT_GRADLE_EOF

      # ─── gradle.properties ────────────────────────────────────
      - name: Write gradle.properties
        run: |
          cat > gradle.properties << 'GRADLE_PROPS_EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          GRADLE_PROPS_EOF

      # ─── gradle wrapper properties ────────────────────────────
      - name: Write gradle wrapper
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'WRAPPER_EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          networkTimeout=10000
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          WRAPPER_EOF

      # ─── Download gradle wrapper jar ──────────────────────────
      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar || echo "Wrapper hazır"

      # ─── gradlew script ───────────────────────────────────────
      - name: Write gradlew
        run: |
          cat > gradlew << 'GRADLEW_EOF'
          #!/bin/sh
          GRADLE_OPTS="${GRADLE_OPTS:-}" exec "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" "$@" 2>/dev/null || gradle "$@"
          GRADLEW_EOF
          chmod +x gradlew

      # ─── app/build.gradle ─────────────────────────────────────
      - name: Write app/build.gradle
        run: |
          cat > app/build.gradle << 'APP_GRADLE_EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.damax.game'
              compileSdk 34
              defaultConfig {
                  applicationId "com.damax.game"
                  minSdk 24
                  targetSdk 34
                  versionCode 2
                  versionName "1.2.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      debuggable true
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              buildFeatures { viewBinding true }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
          }
          APP_GRADLE_EOF

      # ─── proguard-rules.pro ───────────────────────────────────
      - name: Write proguard rules
        run: echo "-keep class com.damax.game.** { *; }" > app/proguard-rules.pro

      # ─── AndroidManifest.xml ──────────────────────────────────
      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:hardwareAccelerated="true"
                  android:theme="@style/Theme.DamaX"
                  xmlns:tools="http://schemas.android.com/tools"
                  tools:replace="android:icon,android:roundIcon">
                  <activity android:name=".SplashActivity"
                      android:exported="true"
                      android:screenOrientation="portrait"
                      android:theme="@style/Theme.DamaX.Splash">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".MainActivity"
                      android:exported="false"
                      android:screenOrientation="portrait"/>
                  <activity android:name=".GameActivity"
                      android:exported="false"
                      android:screenOrientation="portrait"/>
                  <activity android:name=".LobbyActivity"
                      android:exported="false"
                      android:screenOrientation="portrait"/>
              </application>
          </manifest>
          MANIFEST_EOF

      # ─── res/values/strings.xml ───────────────────────────────
      - name: Write strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'STRINGS_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">DAMA X</string>
              <string name="app_subtitle">Klasik Türk Daması</string>
              <string name="vs_ai">🤖 AI ile Oyna</string>
              <string name="vs_local">👥 Lokal 2 Kişi</string>
              <string name="online">🌐 Online Oyna (Aynı WiFi)</string>
              <string name="settings">⚙ Ayarlar</string>
              <string name="create_room">Oda Oluştur</string>
              <string name="join_room">Odaya Katıl</string>
              <string name="your_turn">✦ Senin Sıran!</string>
              <string name="opponent_turn">Rakip düşünüyor…</string>
              <string name="resign">🏳 Teslim Ol</string>
              <string name="undo">↩ Geri Al</string>
              <string name="send">➤ Gönder</string>
              <string name="chat_hint">Mesaj yazın…</string>
              <string name="room_code_hint">Oda Kodu (örn: ABC123)</string>
              <string name="player_name_hint">Kullanıcı Adınız</string>
              <string name="server_ip_hint">Sunucu IP (örn: 192.168.1.5)</string>
              <string name="easy">Kolay</string>
              <string name="medium">Orta</string>
              <string name="hard">Zor</string>
              <string name="game_over">Oyun Bitti</string>
              <string name="wins">Kazandı!</string>
              <string name="play_again">🔄 Tekrar Oyna</string>
              <string name="main_menu">🏠 Ana Menü</string>
              <string name="forced_capture">⚠ Zorunlu yeme var!</string>
              <string name="not_your_turn">Sıra sende değil</string>
              <string name="waiting_opponent">Rakip bekleniyor…</string>
              <string name="opponent_left">Rakip oyundan ayrıldı!</string>
              <string name="king_promoted">♛ Dame oldu!</string>
              <string name="connect">Bağlan</string>
              <string name="connecting">Bağlanılıyor…</string>
              <string name="connected">● Bağlı</string>
              <string name="disconnected">○ Bağlantı Kesildi</string>
              <string name="sound">Ses Efektleri</string>

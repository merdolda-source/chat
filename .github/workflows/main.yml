name: "DAMA X — Build APK"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─────────────────────────────────────────────────────────────
      # 1. PROJE YAPISI (Dizinler)
      # ─────────────────────────────────────────────────────────────
      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/damax/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p gradle/wrapper

      # ─────────────────────────────────────────────────────────────
      # 2. GRADLE ALTYAPISI
      # ─────────────────────────────────────────────────────────────
      - name: Write Gradle System
        run: |
          cat > settings.gradle << 'EOF'
          rootProject.name = "DamaX"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.damax.game'
              compileSdk 34
              defaultConfig {
                  applicationId "com.damax.game"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.5.0"
              }
              buildFeatures { viewBinding true }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.google.code.gson:gson:2.10.1'
          }
          EOF

          # Gradle Wrapper
          curl -L https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          cat > gradlew << 'EOF'
          #!/usr/bin/env sh
          exec java -jar "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" "$@"
          EOF
          chmod +x gradlew

      # ─────────────────────────────────────────────────────────────
      # 3. KAYNAKLAR (Renkler, İkonlar, Yazılar)
      # ─────────────────────────────────────────────────────────────
      - name: Write Resources
        run: |
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <resources>
              <color name="bg_panel">#0D1117</color>
              <color name="gold">#FFD700</color>
              <color name="gold_dim">#AA8800</color>
              <color name="wood_dark">#2A1B0A</color>
              <color name="wood_light">#D2B48C</color>
              <color name="neon_hint">#39FF14</color>
              <color name="danger">#FF4444</color>
              <color name="white">#FFFFFF</color>
              <color name="p1_color">#CC0000</color>
              <color name="p2_color">#FFFFFF</color>
          </resources>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">DAMA X - KLASİK</string>
              <string name="wifi_play">WiFi Karşılıklı Oyna</string>
              <string name="local_play">Cihazda 2 Kişi</string>
              <string name="ai_play">Yapay Zekaya Karşı</string>
              <string name="turn_p1">Sıra: KIRMIZI</string>
              <string name="turn_p2">Sıra: BEYAZ</string>
              <string name="must_capture">Çok taş yeme zorunluluğu var!</string>
          </resources>
          EOF

      # ─────────────────────────────────────────────────────────────
      # 4. KLASİK TÜRK DAMASI MOTORU (GameEngine.java)
      # ─────────────────────────────────────────────────────────────
      - name: Write Game Engine
        run: |
          cat > app/src/main/java/com/damax/game/GameEngine.java << 'EOF'
          package com.damax.game;
          import java.util.*;

          /**
           * GERÇEK TÜRK DAMASI MANTIĞI:
           * - Taşlar dikey/yatay gider, çapraz gidemez.
           * - Normal taşlar geriye gidemez ve yiyemez.
           * - En çok taş yenecek yol seçilmelidir.
           * - Dama olan taş her yöne (ileri-geri-sağ-sol) uçabilir.
           */
          public class GameEngine {
              public static final int EMPTY = 0, P1 = 1, P2 = 2, P1D = 3, P2D = 4;
              public int[][] board = new int[8][8];
              public int turn = 1;
              public boolean isGameOver = false;

              public GameEngine() { reset(); }

              public void reset() {
                  for(int r=0; r<8; r++) for(int c=0; c<8; c++) board[r][c] = EMPTY;
                  // Türk Daması Dizilişi (2. ve 3. sıra vs 6. ve 7. sıra)
                  for(int c=0; c<8; c++) {
                      board[1][c] = P2; board[2][c] = P2; // Üst taraf (Beyaz)
                      board[5][c] = P1; board[6][c] = P1; // Alt taraf (Kırmızı)
                  }
                  turn = 1; isGameOver = false;
              }

              public static class Move {
                  public int fr, fc, tr, tc;
                  public List<int[]> captured = new ArrayList<>();
                  public Move(int fr, int fc, int tr, int tc) { this.fr=fr; this.fc=fc; this.tr=tr; this.tc=tc; }
              }

              public List<Move> getValidMoves(int r, int c) {
                  int p = board[r][c];
                  if (p == EMPTY) return new ArrayList<>();

                  List<Move> captures = getCaptures(r, c, p);
                  if (!captures.isEmpty()) return captures; // Zorunlu yeme kuralı

                  List<Move> simple = new ArrayList<>();
                  int[][] dirs = (p > 2) ? new int[][]{{0,1},{0,-1},{1,0},{-1,0}} : 
                                 (p == P1 ? new int[][]{{-1,0},{0,1},{0,-1}} : new int[][]{{1,0},{0,1},{0,-1}});

                  for (int[] d : dirs) {
                      int nr = r + d[0], nc = c + d[1];
                      if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && board[nr][nc] == EMPTY) {
                          simple.add(new Move(r, c, nr, nc));
                      }
                  }
                  return simple;
              }

              private List<Move> getCaptures(int r, int c, int p) {
                  List<Move> result = new ArrayList<>();
                  int[][] dirs = {{0,1},{0,-1},{1,0},{-1,0}};

                  for (int[] d : dirs) {
                      if (p < 3) { // Normal Taş
                          if (p == P1 && d[0] == 1) continue; // P1 geri yiyemez
                          if (p == P2 && d[0] == -1) continue; // P2 geri yiyemez
                          
                          int midR = r + d[0], midC = c + d[1];
                          int targetR = r + 2*d[0], targetC = c + 2*d[1];
                          
                          if (targetR >= 0 && targetR < 8 && targetC >= 0 && targetC < 8) {
                              int midP = board[midR][midC];
                              if (midP != EMPTY && isEnemy(p, midP) && board[targetR][targetC] == EMPTY) {
                                  Move m = new Move(r, c, targetR, targetC);
                                  m.captured.add(new int[]{midR, midC});
                                  result.add(m);
                              }
                          }
                      } else { // DAMA (Uçan Taş)
                          // Uçuş ve yeme mantığı burada basitleştirilmiştir.
                          for (int i = 1; i < 8; i++) {
                              int nr = r + d[0]*i, nc = c + d[1]*i;
                              if (nr < 0 || nr >= 8 || nc < 0 || nc >= 8) break;
                              if (board[nr][nc] != EMPTY) {
                                  if (isEnemy(p, board[nr][nc])) {
                                      int tr = nr + d[0], tc = nc + d[1];
                                      if (tr >= 0 && tr < 8 && tc >= 0 && tc < 8 && board[tr][tc] == EMPTY) {
                                          Move m = new Move(r, c, tr, tc);
                                          m.captured.add(new int[]{nr, nc});
                                          result.add(m);
                                      }
                                  }
                                  break;
                              }
                          }
                      }
                  }
                  return result;
              }

              private boolean isEnemy(int me, int target) {
                  if ((me == P1 || me == P1D) && (target == P2 || target == P2D)) return true;
                  return (me == P2 || me == P2D) && (target == P1 || target == P1D);
              }
          }
          EOF

      # ─────────────────────────────────────────────────────────────
      # 5. AKICI GÖRÜNÜM (BoardView.java)
      # ─────────────────────────────────────────────────────────────
      - name: Write Board View
        run: |
          cat > app/src/main/java/com/damax/game/BoardView.java << 'EOF'
          package com.damax.game;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.MotionEvent;
          import android.view.View;
          import java.util.*;

          public class BoardView extends View {
              private Paint pBoard = new Paint();
              private Paint pPiece = new Paint(Paint.ANTI_ALIAS_FLAG);
              private GameEngine engine;
              private int selR = -1, selC = -1;
              private List<GameEngine.Move> validMoves = new ArrayList<>();
              public interface BoardListener { void onCellTapped(int r, int c); }
              private BoardListener listener;

              public BoardView(Context ctx, AttributeSet attrs) { super(ctx, attrs); }
              public void setEngine(GameEngine e) { this.engine = e; invalidate(); }
              public void setListener(BoardListener l) { this.listener = l; }

              public void update(int r, int c, List<GameEngine.Move> moves) {
                  this.selR = r; this.selC = c; this.validMoves = moves;
                  invalidate();
              }

              @Override protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  if (engine == null) return;
                  float cell = getWidth() / 8f;

                  for (int r = 0; r < 8; r++) {
                      for (int c = 0; c < 8; c++) {
                          // Tahta Çizimi (Ahşap Görünüm)
                          pBoard.setColor((r+c)%2 == 0 ? 0xFFD2B48C : 0xFF2A1B0A);
                          canvas.drawRect(c*cell, r*cell, (c+1)*cell, (r+1)*cell, pBoard);

                          if (r == selR && c == selC) {
                              pBoard.setColor(0x88FFD700);
                              canvas.drawRect(c*cell, r*cell, (c+1)*cell, (r+1)*cell, pBoard);
                          }

                          int piece = engine.board[r][c];
                          if (piece != 0) drawRealisticPiece(canvas, r, c, cell, piece);
                      }
                  }

                  // Hamle İpuçları
                  pBoard.setColor(0xBB39FF14);
                  for (GameEngine.Move m : validMoves) {
                      canvas.drawCircle(m.tc*cell + cell/2, m.tr*cell + cell/2, cell/6, pBoard);
                  }
              }

              private void drawRealisticPiece(Canvas canvas, int r, int c, float cell, int type) {
                  float cx = c*cell + cell/2, cy = r*cell + cell/2, rad = cell * 0.4f;
                  
                  // Gölge
                  pPiece.setColor(0x66000000);
                  canvas.drawCircle(cx+4, cy+6, rad, pPiece);

                  // Taş Gövdesi
                  int color = (type == 1 || type == 3) ? 0xFFBB0000 : 0xFFEEEEEE;
                  RadialGradient grad = new RadialGradient(cx-5, cy-5, rad*1.2f, 0xFFFFFFFF, color, Shader.TileMode.CLAMP);
                  pPiece.setShader(grad);
                  canvas.drawCircle(cx, cy, rad, pPiece);
                  pPiece.setShader(null);

                  // Dama Logosu
                  if (type > 2) {
                      pPiece.setColor(0xFFFFD700);
                      pPiece.setTextSize(cell/2);
                      pPiece.setTextAlign(Paint.Align.CENTER);
                      canvas.drawText("♛", cx, cy + cell/6, pPiece);
                  }
              }

              @Override public boolean onTouchEvent(MotionEvent e) {
                  if (e.getAction() == MotionEvent.ACTION_UP && listener != null) {
                      float cell = getWidth() / 8f;
                      listener.onCellTapped((int)(e.getY()/cell), (int)(e.getX()/cell));
                  }
                  return true;
              }
          }
          EOF

      # ─────────────────────────────────────────────────────────────
      # 6. WIFI HABERLEŞME (P2P Network)
      # ─────────────────────────────────────────────────────────────
      - name: Write WiFi Manager
        run: |
          cat > app/src/main/java/com/damax/game/WifiSocket.java << 'EOF'
          package com.damax.game;
          import java.io.*;
          import java.net.*;

          public class WifiSocket {
              private ServerSocket server;
              private Socket socket;
              private PrintWriter out;
              private BufferedReader in;

              public interface WifiListener { void onReceived(String msg); }

              public void startServer(int port, WifiListener l) {
                  new Thread(() -> {
                      try {
                          server = new ServerSocket(port);
                          socket = server.accept();
                          listen(l);
                      } catch (Exception e) {}
                  }).start();
              }

              public void connect(String ip, int port, WifiListener l) {
                  new Thread(() -> {
                      try {
                          socket = new Socket(ip, port);
                          listen(l);
                      } catch (Exception e) {}
                  }).start();
              }

              private void listen(WifiListener l) throws IOException {
                  out = new PrintWriter(socket.getOutputStream(), true);
                  in = new BufferedReader(new InputStreamReader(socket.getInputStream()));
                  String line;
                  while ((line = in.readLine()) != null) {
                      final String msg = line;
                      l.onReceived(msg);
                  }
              }

              public void send(String msg) {
                  if (out != null) new Thread(() -> out.println(msg)).start();
              }
          }
          EOF

      # ─────────────────────────────────────────────────────────────
      # 7. ANA AKTİVİTELER
      # ─────────────────────────────────────────────────────────────
      - name: Write Activities
        run: |
          cat > app/src/main/java/com/damax/game/MainActivity.java << 'EOF'
          package com.damax.game;
          import android.content.Intent;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          import com.damax.game.databinding.ActivityMainBinding;

          public class MainActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  ActivityMainBinding b = ActivityMainBinding.inflate(getLayoutInflater());
                  setContentView(b.getRoot());

                  b.btnLocal.setOnClickListener(v -> {
                      Intent i = new Intent(this, GameActivity.class);
                      i.putExtra("mode", "local");
                      startActivity(i);
                  });

                  b.btnWifi.setOnClickListener(v -> {
                      startActivity(new Intent(this, LobbyActivity.class));
                  });
              }
          }
          EOF

          cat > app/src/main/java/com/damax/game/GameActivity.java << 'EOF'
          package com.damax.game;
          import android.os.Bundle;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import com.damax.game.databinding.ActivityGameBinding;
          import java.util.List;

          public class GameActivity extends AppCompatActivity implements BoardView.BoardListener {
              private ActivityGameBinding b;
              private GameEngine engine;
              private int selR = -1, selC = -1;

              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  b = ActivityGameBinding.inflate(getLayoutInflater());
                  setContentView(b.getRoot());
                  engine = new GameEngine();
                  b.boardView.setEngine(engine);
                  b.boardView.setListener(this);
              }

              @Override public void onCellTapped(int r, int c) {
                  if (engine.isGameOver) return;
                  
                  if (selR == -1) {
                      int p = engine.board[r][c];
                      if (p != 0 && ((engine.turn == 1 && (p==1||p==3)) || (engine.turn == 2 && (p==2||p==4)))) {
                          selR = r; selC = c;
                          b.boardView.update(r, c, engine.getValidMoves(r, c));
                      }
                  } else {
                      List<GameEngine.Move> moves = engine.getValidMoves(selR, selC);
                      for (GameEngine.Move m : moves) {
                          if (m.tr == r && m.tc == c) {
                              executeMove(m);
                              return;
                          }
                      }
                      selR = -1; selC = -1;
                      b.boardView.update(-1, -1, new ArrayList<>());
                  }
              }

              private void executeMove(GameEngine.Move m) {
                  engine.board[m.tr][m.tc] = engine.board[m.fr][m.fc];
                  engine.board[m.fr][m.fc] = 0;
                  for (int[] cap : m.captured) engine.board[cap[0]][cap[1]] = 0;

                  // Dama Dönüşümü
                  if (engine.turn == 1 && m.tr == 0) engine.board[m.tr][m.tc] = 3;
                  if (engine.turn == 2 && m.tr == 7) engine.board[m.tr][m.tc] = 4;

                  engine.turn = (engine.turn == 1) ? 2 : 1;
                  selR = -1; selC = -1;
                  b.boardView.update(-1, -1, new ArrayList<>());
                  Toast.makeText(this, "Hamle Yapıldı", Toast.LENGTH_SHORT).show();
              }
          }
          EOF

          cat > app/src/main/java/com/damax/game/LobbyActivity.java << 'EOF'
          package com.damax.game;
          import android.content.Intent;
          import android.net.format.Formatter;
          import android.net.wifi.WifiManager;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          import com.damax.game.databinding.ActivityLobbyBinding;

          public class LobbyActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  ActivityLobbyBinding b = ActivityLobbyBinding.inflate(getLayoutInflater());
                  setContentView(b.getRoot());

                  WifiManager wm = (WifiManager) getApplicationContext().getSystemService(WIFI_SERVICE);
                  String ip = Formatter.formatIpAddress(wm.getConnectionInfo().getIpAddress());
                  b.tvIp.setText("IP Adresin: " + ip);

                  b.btnCreate.setOnClickListener(v -> start("host", ""));
                  b.btnJoin.setOnClickListener(v -> start("join", b.etIp.getText().toString()));
              }
              private void start(String mode, String targetIp) {
                  Intent i = new Intent(this, GameActivity.class);
                  i.putExtra("mode", mode);
                  i.putExtra("ip", targetIp);
                  startActivity(i);
              }
          }
          EOF

          cat > app/src/main/java/com/damax/game/SplashActivity.java << 'EOF'
          package com.damax.game;
          import android.content.Intent;
          import android.os.Bundle;
          import android.os.Handler;
          import androidx.appcompat.app.AppCompatActivity;

          public class SplashActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  new Handler().postDelayed(() -> {
                      startActivity(new Intent(this, MainActivity.class));
                      finish();
                  }, 2000);
              }
          }
          EOF

      # ─────────────────────────────────────────────────────────────
      # 8. LAYOUT TASARIMLARI (XML)
      # ─────────────────────────────────────────────────────────────
      - name: Write Layouts
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:gravity="center" android:background="#0D1117" android:padding="40dp">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="DAMA X" android:textColor="#FFD700" android:textSize="60sp" android:textStyle="bold" android:layout_marginBottom="80dp"/>
              <Button android:id="@+id/btnLocal" android:layout_width="match_parent" android:layout_height="70dp"
                  android:text="@string/local_play" android:backgroundTint="#1F2937" android:layout_marginBottom="20dp"/>
              <Button android:id="@+id/btnWifi" android:layout_width="match_parent" android:layout_height="70dp"
                  android:text="@string/wifi_play" android:backgroundTint="#FFD700" android:textColor="#000"/>
          </LinearLayout>
          EOF

          cat > app/src/main/res/layout/activity_lobby.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#0D1117" android:padding="30dp">
              <TextView android:id="@+id/tvIp" android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:textColor="#39FF14" android:textSize="22sp" android:layout_marginBottom="50dp"/>
              <Button android:id="@+id/btnCreate" android:layout_width="match_parent" android:layout_height="70dp"
                  android:text="ODA KUR (HOST)" android:layout_marginBottom="40dp"/>
              <EditText android:id="@+id/etIp" android:layout_width="match_parent" android:layout_height="60dp"
                  android:hint="Rakip IP Girin" android:textColor="#FFF" android:gravity="center" android:background="#161B22" android:layout_marginBottom="10dp"/>
              <Button android:id="@+id/btnJoin" android:layout_width="match_parent" android:layout_height="70dp"
                  android:text="ODAYA KATIL" android:backgroundTint="#FFD700" android:textColor="#000"/>
          </LinearLayout>
          EOF

          cat > app/src/main/res/layout/activity_game.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000">
              <com.damax.game.BoardView android:id="@+id/boardView"
                  android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:layout_centerInParent="true"/>
          </RelativeLayout>
          EOF

      # ─────────────────────────────────────────────────────────────
      # 9. APK DERLEME (BUILD)
      # ─────────────────────────────────────────────────────────────
      - name: Build APK
        run: ./gradlew assembleDebug

      # ─────────────────────────────────────────────────────────────
      # 10. ÇIKTIYI YÜKLE
      # ─────────────────────────────────────────────────────────────
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DamaX-Classic-Final
          path: app/build/outputs/apk/debug/app-debug.apk

          package com.damax.game;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.*;
          import java.util.*;
          public class BoardView extends View {
              private GameEngine engine;
              private int[] selected = null;
              private List<GameEngine.Move> validMoves = new ArrayList<>();
              private int[] lastFrom = null, lastTo = null;
              private BoardListener listener;

              public interface BoardListener { void onCellTapped(int row, int col); }

              public BoardView(Context context) { super(context); init(); }
              public BoardView(Context context, AttributeSet attrs) { super(context, attrs); init(); }

              private void init() {
                  setOnTouchListener((v, event) -> {
                      if (event.getAction() == MotionEvent.ACTION_UP) {
                          float cellSize = Math.min(getWidth(), getHeight()) / 8f;
                          int col = (int) (event.getX() / cellSize);
                          int row = (int) (event.getY() / cellSize);
                          if (row >= 0 && row < 8 && col >= 0 && col < 8 && listener != null)
                              listener.onCellTapped(row, col);
                      }
                      return true;
                  });
              }

              @Override protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  if (engine == null) return;
                  float cellSize = Math.min(getWidth(), getHeight()) / 8f;

                  Paint paint = new Paint();
                  for (int r = 0; r < 8; r++) {
                      for (int c = 0; c < 8; c++) {
                          float left = c * cellSize;
                          float top = r * cellSize;
                          paint.setColor((r + c) % 2 == 0 ? 0xFFF5E8C7 : 0xFF8B5A2B);
                          canvas.drawRect(left, top, left + cellSize, top + cellSize, paint);
                      }
                  }

                  if (lastFrom != null) {
                      paint.setColor(0x44C9A84C);
                      canvas.drawRect(lastFrom[1] * cellSize, lastFrom[0] * cellSize,
                          (lastFrom[1] + 1) * cellSize, (lastFrom[0] + 1) * cellSize, paint);
                  }
                  if (lastTo != null) {
                      paint.setColor(0x44C9A84C);
                      canvas.drawRect(lastTo[1] * cellSize, lastTo[0] * cellSize,
                          (lastTo[1] + 1) * cellSize, (lastTo[0] + 1) * cellSize, paint);
                  }

                  for (int r = 0; r < 8; r++) {
                      for (int c = 0; c < 8; c++) {
                          int piece = engine.board[r][c];
                          if (piece == GameEngine.EMPTY) continue;
                          float cx = c * cellSize + cellSize / 2;
                          float cy = r * cellSize + cellSize / 2;
                          float radius = cellSize * 0.38f;
                          boolean isP1 = piece == GameEngine.P1 || piece == GameEngine.P1K;
                          paint.setColor(isP1 ? 0xFFFFC107 : 0xFF88BBFF);
                          canvas.drawCircle(cx, cy, radius, paint);
                          paint.setColor(0xFFFFFFFF);
                          paint.setStyle(Paint.Style.STROKE);
                          paint.setStrokeWidth(8);
                          canvas.drawCircle(cx, cy, radius - 10, paint);
                          paint.setStyle(Paint.Style.FILL);
                          if (piece == GameEngine.P1K || piece == GameEngine.P2K) {
                              paint.setTextSize(radius * 0.9f);
                              paint.setColor(0xFF000000);
                              paint.setTextAlign(Paint.Align.CENTER);
                              canvas.drawText("♛", cx, cy + radius * 0.3f, paint);
                          }
                      }
                  }
              }

              public void setEngine(GameEngine e) { engine = e; invalidate(); }
              public void setSelected(int[] sel, List<GameEngine.Move> moves) {
                  selected = sel; validMoves = moves != null ? moves : new ArrayList<>(); invalidate();
              }
              public void setLastMove(int[] from, int[] to) { lastFrom = from; lastTo = to; invalidate(); }
              public void clearSelection() { selected = null; validMoves.clear(); invalidate(); }
              public void setListener(BoardListener l) { listener = l; }
              public void refresh() { invalidate(); }
          }
          BOARDVIEW_EOF


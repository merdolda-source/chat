          package com.damax.game;
          import android.view.*;
          import android.widget.TextView;
          import androidx.annotation.NonNull;
          import androidx.recyclerview.widget.RecyclerView;
          import com.google.gson.JsonArray;
          import com.google.gson.JsonObject;
          public class RoomAdapter extends RecyclerView.Adapter<RoomAdapter.VH> {
              interface OnJoinClick { void join(String code); }
              private JsonArray rooms = new JsonArray();
              private OnJoinClick listener;
              public RoomAdapter(OnJoinClick l) { listener = l; }
              public void setRooms(JsonArray r) { rooms = r; notifyDataSetChanged(); }
              @NonNull @Override public VH onCreateViewHolder(@NonNull ViewGroup p, int t) {
                  View v = LayoutInflater.from(p.getContext()).inflate(R.layout.item_room, p, false);
                  return new VH(v);
              }
              @Override public void onBindViewHolder(@NonNull VH h, int pos) {
                  JsonObject room = rooms.get(pos).getAsJsonObject();
                  h.name.setText(room.get("name").getAsString());
                  h.code.setText(room.get("code").getAsString());
              }
              @Override public int getItemCount() { return rooms.size(); }
              static class VH extends RecyclerView.ViewHolder {
                  TextView name, code;
                  VH(View v) { super(v); name = v.findViewById(R.id.tvRoomName); code = v.findViewById(R.id.tvRoomCode); }
              }
          }

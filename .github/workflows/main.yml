          mkdir -p out
          find app/build/outputs/apk/debug -name "*.apk" -exec cp {} out/Dama-ahsap-v1.0.apk \;
          ls -lh out/

      # ═══════════════════════════════════════════════════════════
      # ADIM 4 — ARTIFACT YUKLE
      # ═══════════════════════════════════════════════════════════
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dama-Ahsap-APK-${{ github.run_number }}
          path: out/Dama-ahsap-v1.0.apk
          retention-days: 90


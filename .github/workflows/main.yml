      # ─── Java: GameEngine.java ────────────────────────────────
      - name: Write GameEngine.java
        run: |
          cat > app/src/main/java/com/damax/game/GameEngine.java << 'GAMEENGINE_EOF'
          package com.damax.game;

          import java.util.ArrayList;
          import java.util.List;
          import java.util.Random;

          public class GameEngine {
              public static final int EMPTY = 0, P1 = 1, P2 = 2, P1K = 3, P2K = 4;

              public int[][] board;
              public int currentPlayer = 1;
              public boolean gameActive = false;
              public int p1Count = 12, p2Count = 12;
              public int aiDifficulty = 2;

              public GameEngine() { initBoard(); }

              public void initBoard() {
                  board = new int[8][8];
                  for (int r = 0; r < 3; r++)
                      for (int c = 0; c < 8; c++)
                          if ((r + c) % 2 == 1) board[r][c] = P2;
                  for (int r = 5; r < 8; r++)
                      for (int c = 0; c < 8; c++)
                          if ((r + c) % 2 == 1) board[r][c] = P1;
                  currentPlayer = 1; gameActive = true;
                  p1Count = 12; p2Count = 12;
              }

              public static class Move {
                  public int[] from, to;
                  public List<int[]> captures;
                  public Move(int[] from, int[] to, List<int[]> captures) {
                      this.from = from; this.to = to;
                      this.captures = captures != null ? captures : new ArrayList<>();
                  }
              }

              public List<Move> getCaptures(int[][] b, int r, int c, int player) {
                  int piece = b[r][c];
                  boolean isKing = piece == P1K || piece == P2K;
                  int[][] dirs = getDirs(player, isKing);
                  List<Move> caps = new ArrayList<>();
                  for (int[] d : dirs) {
                      int er = r + d[0], ec = c + d[1], lr = r + 2*d[0], lc = c + 2*d[1];
                      if (er<0||er>7||ec<0||ec>7||lr<0||lr>7||lc<0||lc>7) continue;
                      int enemy = b[er][ec];
                      boolean isEnemy = (player==1 && (enemy==P2||enemy==P2K)) ||
                                        (player==2 && (enemy==P1||enemy==P1K));
                      if (isEnemy && b[lr][lc] == EMPTY) {
                          List<int[]> cap = new ArrayList<>(); cap.add(new int[]{er, ec});
                          caps.add(new Move(new int[]{r,c}, new int[]{lr,lc}, cap));
                      }
                  }
                  return caps;
              }

              public List<Move> getMoves(int[][] b, int r, int c, int player) {
                  List<Move> caps = getCaptures(b, r, c, player);
                  if (!caps.isEmpty()) return caps;
                  int piece = b[r][c];
                  boolean isKing = piece == P1K || piece == P2K;
                  int[][] dirs = getDirs(player, isKing);
                  List<Move> moves = new ArrayList<>();
                  for (int[] d : dirs) {
                      int nr = r + d[0], nc = c + d[1];
                      if (nr>=0&&nr<8&&nc>=0&&nc<8&&b[nr][nc]==EMPTY)
                          moves.add(new Move(new int[]{r,c}, new int[]{nr,nc}, null));
                  }
                  return moves;
              }

              public List<Move> getAllMoves(int[][] b, int player) {
                  List<Move> all = new ArrayList<>();
                  for (int r = 0; r < 8; r++)
                      for (int c = 0; c < 8; c++) {
                          int p = b[r][c];
                          if ((player==1 && (p==P1||p==P1K)) || (player==2 && (p==P2||p==P2K)))
                              all.addAll(getMoves(b, r, c, player));
                      }
                  boolean hasCap = all.stream().anyMatch(m -> !m.captures.isEmpty());
                  if (hasCap) { all.removeIf(m -> m.captures.isEmpty()); }
                  return all;
              }

              public int[][] applyMove(int[][] b, Move move, int player) {
                  int[][] nb = copyBoard(b);
                  int[] f = move.from, t = move.to;
                  nb[t[0]][t[1]] = nb[f[0]][f[1]]; nb[f[0]][f[1]] = EMPTY;
                  for (int[] cap : move.captures) nb[cap[0]][cap[1]] = EMPTY;
                  if (nb[t[0]][t[1]] == P1 && t[0] == 0) nb[t[0]][t[1]] = P1K;
                  if (nb[t[0]][t[1]] == P2 && t[0] == 7) nb[t[0]][t[1]] = P2K;
                  return nb;
              }

              public boolean applyMoveToBoard(Move move) {
                  int[] t = move.to;
                  int prevPiece = board[move.from[0]][move.from[1]];
                  board[t[0]][t[1]] = prevPiece; board[move.from[0]][move.from[1]] = EMPTY;
                  for (int[] cap : move.captures) {
                      board[cap[0]][cap[1]] = EMPTY;
                      if (currentPlayer == 1) p2Count--; else p1Count--;
                  }
                  boolean kinged = false;
                  if (board[t[0]][t[1]] == P1 && t[0] == 0) { board[t[0]][t[1]] = P1K; kinged = true; }
                  if (board[t[0]][t[1]] == P2 && t[0] == 7) { board[t[0]][t[1]] = P2K; kinged = true; }
                  return kinged;
              }

              public int checkWinner() {
                  if (p1Count <= 0) return 2;
                  if (p2Count <= 0) return 1;
                  int next = currentPlayer == 1 ? 2 : 1;
                  if (getAllMoves(board, next).isEmpty()) return currentPlayer;
                  return 0;
              }

              public Move getAIMove() {
                  List<Move> moves = getAllMoves(board, 2);
                  if (moves.isEmpty()) return null;
                  if (aiDifficulty == 1) return moves.get(new Random().nextInt(moves.size()));
                  if (aiDifficulty == 2) {
                      List<Move> caps = new ArrayList<>();
                      for (Move m : moves) if (!m.captures.isEmpty()) caps.add(m);
                      List<Move> pool = caps.isEmpty() ? moves : caps;
                      return pool.get(new Random().nextInt(pool.size()));
                  }
                  Move best = null; int bestScore = Integer.MIN_VALUE;
                  for (Move m : moves) {
                      int s = minimax(applyMove(board, m, 2), 2, false, 0);
                      if (s > bestScore) { bestScore = s; best = m; }
                  }
                  return best;
              }

              private int minimax(int[][] b, int player, boolean isMax, int depth) {
                  if (depth >= 4) return evalBoard(b);
                  List<Move> moves = getAllMoves(b, player);
                  if (moves.isEmpty()) return isMax ? -1000 : 1000;
                  if (isMax) {
                      int best = Integer.MIN_VALUE;
                      for (Move m : moves) best = Math.max(best, minimax(applyMove(b,m,player), 3-player, false, depth+1));
                      return best;
                  } else {
                      int best = Integer.MAX_VALUE;
                      for (Move m : moves) best = Math.min(best, minimax(applyMove(b,m,player), 3-player, true, depth+1));
                      return best;
                  }
              }

              private int evalBoard(int[][] b) {
                  int s = 0;
                  for (int r=0;r<8;r++) for(int c=0;c<8;c++) {
                      if (b[r][c]==P1) s -= 10;
                      else if (b[r][c]==P1K) s -= 18;
                      else if (b[r][c]==P2) s += 10 + (7-r);
                      else if (b[r][c]==P2K) s += 18;
                  }
                  return s;
              }

              private int[][] getDirs(int player, boolean isKing) {
                  if (isKing) return new int[][]{{-1,-1},{-1,1},{1,-1},{1,1}};
                  if (player == 1) return new int[][]{{-1,-1},{-1,1}};
                  return new int[][]{{1,-1},{1,1}};
              }

              private int[][] copyBoard(int[][] b) {
                  int[][] nb = new int[8][8];
                  for (int i=0;i<8;i++) System.arraycopy(b[i],0,nb[i],0,8);
                  return nb;
              }
          }
          GAMEENGINE_EOF

      # ─── Java: BoardView.java ─────────────────────────────────
      - name: Write BoardView.java
        run: |
          cat > app/src/main/java/com/damax/game/BoardView.java << 'BOARDVIEW_EOF'
          package com.damax.game;

          import android.animation.AnimatorSet;
          import android.animation.ObjectAnimator;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.*;
          import android.view.animation.AccelerateDecelerateInterpolator;
          import java.util.ArrayList;
          import java.util.List;

          public class BoardView extends View {
              // Colors
              private static final int COL_CELL_LIGHT = 0xFF1A1A2E;
              private static final int COL_CELL_DARK  = 0xFF0D0D1A;
              private static final int COL_SELECTED   = 0x4439FF85;
              private static final int COL_VALID      = 0x3339FF85;
              private static final int COL_CAPTURE    = 0x33FF4466;
              private static final int COL_LAST       = 0x22C9A84C;
              private static final int COL_GOLD       = 0xFFC9A84C;
              private static final int COL_P1_DARK    = 0xFFCC1133;
              private static final int COL_P1_LIGHT   = 0xFFFF8899;
              private static final int COL_P2_DARK    = 0xFF1144CC;
              private static final int COL_P2_LIGHT   = 0xFF88BBFF;
              private static final int COL_KING       = 0xFFF0D080;

              private Paint cellPaint = new Paint();
              private Paint piecePaint = new Paint(Paint.ANTI_ALIAS_FLAG);
              private Paint highlightPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
              private Paint textPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
              private Paint borderPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
              private Paint coordPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
              private Paint shadowPaint = new Paint(Paint.ANTI_ALIAS_FLAG);

              private GameEngine engine;
              private int[] selected = null;
              private List<GameEngine.Move> validMoves = new ArrayList<>();
              private int[] lastFrom = null, lastTo = null;
              private boolean showCoords = true;
              private float cellSize;
              private float offsetX, offsetY;
              private BoardListener listener;

              public interface BoardListener {
                  void onCellTapped(int row, int col);
              }

              public BoardView(Context context) { super(context); init(); }
              public BoardView(Context context, AttributeSet attrs) { super(context, attrs); init(); }
              public BoardView(Context context, AttributeSet attrs, int defStyle) { super(context, attrs, defStyle); init(); }

              private void init() {
                  borderPaint.setColor(COL_GOLD);
                  borderPaint.setStyle(Paint.Style.STROKE);
                  borderPaint.setStrokeWidth(3f);
                  coordPaint.setColor(0x88C9A84C);
                  coordPaint.setTextAlign(Paint.Align.CENTER);
                  coordPaint.setAntiAlias(true);
                  textPaint.setColor(COL_KING);
                  textPaint.setTextAlign(Paint.Align.CENTER);
                  textPaint.setAntiAlias(true);
                  shadowPaint.setColor(0x55000000);
                  shadowPaint.setMaskFilter(new BlurMaskFilter(8, BlurMaskFilter.Blur.NORMAL));
                  setOnTouchListener((v, event) -> {
                      if (event.getAction() == MotionEvent.ACTION_UP) {
                          int col = (int)((event.getX() - offsetX) / cellSize);
                          int row = (int)((event.getY() - offsetY) / cellSize);
                          if (row>=0&&row<8&&col>=0&&col<8 && listener!=null)
                              listener.onCellTapped(row, col);
                          performClick();
                      }
                      return true;
                  });
              }

              @Override protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  if (engine == null) return;
                  int size = Math.min(getWidth(), getHeight());
                  float coordPad = showCoords ? 20f : 0f;
                  cellSize = (size - coordPad * 2) / 8f;
                  offsetX = (getWidth() - size) / 2f + coordPad;
                  offsetY = (getHeight() - size) / 2f + coordPad;
                  coordPaint.setTextSize(cellSize * 0.22f);

                  // Draw cells
                  for (int r = 0; r < 8; r++) {
                      for (int c = 0; c < 8; c++) {
                          float l = offsetX + c * cellSize, t = offsetY + r * cellSize;
                          RectF rect = new RectF(l, t, l + cellSize, t + cellSize);
                          // Base color
                          cellPaint.setColor((r+c)%2==0 ? COL_CELL_LIGHT : COL_CELL_DARK);
                          canvas.drawRect(rect, cellPaint);
                          // Highlights
                          if (isLastMove(r, c)) { highlightPaint.setColor(COL_LAST); canvas.drawRect(rect, highlightPaint); }
                          if (isSelected(r, c)) { highlightPaint.setColor(COL_SELECTED); canvas.drawRect(rect, highlightPaint); }
                          GameEngine.Move vm = getValidMove(r, c);
                          if (vm != null) {
                              highlightPaint.setColor(vm.captures.isEmpty() ? COL_VALID : COL_CAPTURE);
                              canvas.drawRect(rect, highlightPaint);
                              // Dot
                              float cx = l + cellSize/2, cy = t + cellSize/2, dr = cellSize * 0.18f;
                              highlightPaint.setColor(vm.captures.isEmpty() ? 0xFF39FF85 : 0xFFFF4466);
                              canvas.drawCircle(cx, cy, dr, highlightPaint);
                          }
                      }
                  }

                  // Board border
                  canvas.drawRect(new RectF(offsetX, offsetY, offsetX+8*cellSize, offsetY+8*cellSize), borderPaint);

                  // Draw pieces
                  for (int r = 0; r < 8; r++) {
                      for (int c = 0; c < 8; c++) {
                          int piece = engine.board[r][c];
                          if (piece == GameEngine.EMPTY) continue;
                          float cx = offsetX + c * cellSize + cellSize/2;
                          float cy = offsetY + r * cellSize + cellSize/2;
                          float pr = cellSize * 0.38f;
                          boolean isP1 = piece == GameEngine.P1 || piece == GameEngine.P1K;
                          boolean isKing = piece == GameEngine.P1K || piece == GameEngine.P2K;
                          boolean sel = isSelected(r, c);
                          float prs = sel ? pr * 1.1f : pr;

                          // Shadow
                          canvas.drawCircle(cx + 2, cy + 4, prs, shadowPaint);

                          // Piece gradient via shader
                          RadialGradient grad = new RadialGradient(
                              cx - prs*0.3f, cy - prs*0.3f, prs*1.2f,
                              isP1 ? COL_P1_LIGHT : COL_P2_LIGHT,
                              isP1 ? COL_P1_DARK  : COL_P2_DARK,
                              Shader.TileMode.CLAMP);
                          piecePaint.setShader(grad);
                          canvas.drawCircle(cx, cy, prs, piecePaint);
                          piecePaint.setShader(null);

                          // Selection glow
                          if (sel) {
                              piecePaint.setColor(0x8839FF85);
                              piecePaint.setStyle(Paint.Style.STROKE);
                              piecePaint.setStrokeWidth(3f);
                              canvas.drawCircle(cx, cy, prs + 3, piecePaint);
                              piecePaint.setStyle(Paint.Style.FILL);
                          }

                          // King crown
                          if (isKing) {
                              textPaint.setTextSize(prs * 1.0f);
                              textPaint.setColor(COL_KING);
                              Paint.FontMetrics fm = textPaint.getFontMetrics();
                              canvas.drawText("♛", cx, cy - (fm.ascent + fm.descent)/2, textPaint);
                          }
                      }
                  }

                  // Coordinates
                  if (showCoords) {
                      String[] letters = {"A","B","C","D","E","F","G","H"};
                      String[] nums = {"8","7","6","5","4","3","2","1"};
                      for (int i = 0; i < 8; i++) {
                          float cx = offsetX + i*cellSize + cellSize/2;
                          float cy = offsetY + i*cellSize + cellSize/2;
                          canvas.drawText(letters[i], cx, offsetY - 4, coordPaint);
                          canvas.drawText(nums[i], offsetX - 10, cy + coordPaint.getTextSize()/3, coordPaint);
                      }
                  }
              }

              private boolean isSelected(int r, int c) { return selected!=null && selected[0]==r && selected[1]==c; }
              private boolean isLastMove(int r, int c) {
                  return (lastFrom!=null && lastFrom[0]==r && lastFrom[1]==c) ||
                         (lastTo!=null && lastTo[0]==r && lastTo[1]==c);
              }
              private GameEngine.Move getValidMove(int r, int c) {
                  for (GameEngine.Move m : validMoves) if (m.to[0]==r && m.to[1]==c) return m;
                  return null;
              }

              public void setEngine(GameEngine e) { engine = e; invalidate(); }
              public void setSelected(int[] sel, List<GameEngine.Move> moves) {
                  selected = sel; validMoves = moves != null ? moves : new ArrayList<>(); invalidate();
              }
              public void setLastMove(int[] from, int[] to) { lastFrom = from; lastTo = to; invalidate(); }
              public void clearSelection() { selected = null; validMoves.clear(); invalidate(); }
              public void setShowCoords(boolean show) { showCoords = show; invalidate(); }
              public void setListener(BoardListener l) { listener = l; }
              public void refresh() { invalidate(); }
              @Override public boolean performClick() { return super.performClick(); }
          }

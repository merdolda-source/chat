name: "DAMA X — Build APK"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: 'GitHub Release oluştur?'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────────────
      # 1. CHECKOUT & JDK
      # ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─────────────────────────────────────────────────────────────
      # 2. PROJE YAPISINI OLUŞTUR
      # ─────────────────────────────────────────────────────────────
      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/damax/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p gradle/wrapper

      # ─── build.gradle (root) ──────────────────────────────────
      - name: Write root build.gradle
        run: |
          cat > build.gradle << 'ROOT_GRADLE_EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          ROOT_GRADLE_EOF

      # ─── settings.gradle ───────────────────────────────────────
      - name: Write settings.gradle
        run: echo "include ':app'" > settings.gradle

      # ─── app/build.gradle ─────────────────────────────────────
      - name: Write app/build.gradle
        run: |
          cat > app/build.gradle << 'APP_GRADLE_EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.damax.game'
              compileSdk 34
              defaultConfig {
                  applicationId "com.damax.game"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.1.0"
              }
              buildFeatures { viewBinding true }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
          }
          APP_GRADLE_EOF

      # ─── AndroidManifest.xml ──────────────────────────────────
      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>
              <application
                  android:label="DAMA X"
                  android:theme="@style/Theme.MaterialComponents.DayNight.NoActionBar"
                  android:icon="@mipmap/ic_launcher"
                  android:hardwareAccelerated="true">
                  <activity android:name=".SplashActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".MainActivity" android:screenOrientation="portrait"/>
                  <activity android:name=".LobbyActivity" android:screenOrientation="portrait"/>
                  <activity android:name=".GameActivity" android:screenOrientation="portrait"/>
              </application>
          </manifest>
          MANIFEST_EOF

      # ─── TÜRK DAMASI MOTORU (GameEngine.java) ──────────────────
      - name: Write GameEngine.java
        run: |
          cat > app/src/main/java/com/damax/game/GameEngine.java << 'ENGINE_EOF'
          package com.damax.game;
          import java.util.*;

          /**
           * TÜRK DAMASI KURALLARI:
           * 1. Taşlar ileri, sağa ve sola gider (Çapraz gitmez).
           * 2. Geriye hamle ve geriye yeme yoktur (Dama hariç).
           * 3. Çok taş yeme zorunluluğu vardır.
           * 4. Dama olan taş her yöne sınırsız gider.
           */
          public class GameEngine {
              public static final int EMPTY = 0, P1 = 1, P2 = 2, P1D = 3, P2D = 4;
              public int[][] board = new int[8][8];
              public int turn = 1;
              public boolean active = true;

              public GameEngine() { initBoard(); }

              public void initBoard() {
                  for(int r=0; r<8; r++) for(int c=0; c<8; c++) board[r][c] = EMPTY;
                  // Türk Daması Dizilimi (2. ve 3. sıra vs 6. ve 7. sıra)
                  for(int c=0; c<8; c++) {
                      board[1][c] = P2; board[2][c] = P2; // Mavi
                      board[5][c] = P1; board[6][c] = P1; // Kırmızı
                  }
                  turn = 1; active = true;
              }

              public static class Move {
                  public int fr, fc, tr, tc;
                  public List<int[]> captured = new ArrayList<>();
                  public Move(int fr, int fc, int tr, int tc) { this.fr=fr; this.fc=fc; this.tr=tr; this.tc=tc; }
              }

              public List<Move> getValidMoves(int r, int c) {
                  List<Move> allMoves = new ArrayList<>();
                  int piece = board[r][c];
                  if(piece == EMPTY) return allMoves;

                  boolean isDama = (piece == P1D || piece == P2D);
                  int[][] dirs = {{0,1}, {0,-1}, {1,0}, {-1,0}};

                  // Önce Taş Yeme Kontrolü (Zorunlu)
                  for(int[] d : dirs) {
                      if(!isDama) {
                          // Normal taş geriye yiyemez ve gidemez
                          if(piece == P1 && d[0] == 1) continue;
                          if(piece == P2 && d[0] == -1) continue;
                      }
                      
                      // Basit atlama kontrolü (Gelişmiş Dama uçuşu hariç temel yapı)
                      int nr = r + d[0], nc = c + d[1];
                      int xr = r + 2*d[0], xc = c + 2*d[1];
                      
                      if(xr>=0 && xr<8 && xc>=0 && xc<8) {
                          int mid = board[nr][nc];
                          if(mid != EMPTY && isEnemy(piece, mid) && board[xr][xc] == EMPTY) {
                              Move m = new Move(r,c,xr,xc);
                              m.captured.add(new int[]{nr, nc});
                              allMoves.add(m);
                          }
                      }
                  }

                  // Eğer yeme yoksa normal hamleler
                  if(allMoves.isEmpty()) {
                      for(int[] d : dirs) {
                          if(piece == P1 && d[0] == 1) continue;
                          if(piece == P2 && d[0] == -1) continue;
                          
                          int nr = r + d[0], nc = c + d[1];
                          if(nr>=0 && nr<8 && nc>=0 && nc<8 && board[nr][nc] == EMPTY) {
                              allMoves.add(new Move(r,c,nr,nc));
                          }
                      }
                  }
                  return allMoves;
              }

              private boolean isEnemy(int me, int other) {
                  if((me==P1||me==P1D) && (other==P2||other==P2D)) return true;
                  return (me == P2 || me == P2D) && (other == P1 || other == P1D);
              }
          }
          ENGINE_EOF

      # ─── GERÇEKÇİ GÖRÜNÜM (BoardView.java) ─────────────────────
      - name: Write BoardView.java
        run: |
          cat > app/src/main/java/com/damax/game/BoardView.java << 'VIEW_EOF'
          package com.damax.game;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.MotionEvent;
          import android.view.View;
          import java.util.ArrayList;
          import java.util.List;

          public class BoardView extends View {
              private Paint pBoard = new Paint();
              private Paint pPiece = new Paint(Paint.ANTI_ALIAS_FLAG);
              private Paint pHighlight = new Paint(Paint.ANTI_ALIAS_FLAG);
              private GameEngine engine;
              private int selR = -1, selC = -1;
              private List<GameEngine.Move> validMoves = new ArrayList<>();
              public interface BoardListener { void onCellClick(int r, int c); }
              private BoardListener listener;

              public BoardView(Context ctx, AttributeSet attrs) { 
                  super(ctx, attrs);
                  pHighlight.setStyle(Paint.Style.STROKE);
                  pHighlight.setStrokeWidth(6);
              }
              
              public void setEngine(GameEngine e) { this.engine = e; invalidate(); }
              public void setListener(BoardListener l) { this.listener = l; }

              public void select(int r, int c, List<GameEngine.Move> moves) {
                  this.selR = r; this.selC = c; this.validMoves = moves;
                  invalidate();
              }

              @Override protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  if(engine == null) return;
                  float size = Math.min(getWidth(), getHeight());
                  float cell = size / 8f;

                  for(int r=0; r<8; r++) {
                      for(int c=0; c<8; c++) {
                          // Klasik Tahta Renkleri (Koyu Ahşap Tasarım)
                          pBoard.setColor((r+c)%2==0 ? 0xFFE0C097 : 0xFF2D2424);
                          canvas.drawRect(c*cell, r*cell, (c+1)*cell, (r+1)*cell, pBoard);

                          // Seçili hücre efekti
                          if(r == selR && c == selC) {
                              pHighlight.setColor(0xFFFFD700);
                              canvas.drawRect(c*cell+4, r*cell+4, (c+1)*cell-4, (r+1)*cell-4, pHighlight);
                          }

                          // Taşları Çiz
                          int piece = engine.board[r][c];
                          if(piece != GameEngine.EMPTY) drawPiece(canvas, r, c, cell, piece);
                      }
                  }
                  
                  // Hamle İpuçları (Neon Yeşil Noktalar)
                  pHighlight.setColor(0xFF39FF85);
                  pHighlight.setStyle(Paint.Style.FILL);
                  for(GameEngine.Move m : validMoves) {
                      canvas.drawCircle(m.tc*cell + cell/2, m.tr*cell + cell/2, cell*0.15f, pHighlight);
                  }
              }

              private void drawPiece(Canvas canvas, int r, int c, float cell, int type) {
                  float cx = c*cell + cell/2, cy = r*cell + cell/2;
                  float rad = cell * 0.42f;

                  // Dinamik Gölge
                  pPiece.setColor(0x60000000);
                  canvas.drawCircle(cx+5, cy+7, rad, pPiece);

                  // Taş Gövdesi
                  int color = (type==1||type==3) ? 0xFFCC0000 : 0xFF2244AA;
                  RadialGradient grad = new RadialGradient(cx-10, cy-10, rad*1.5f, 0xFFFFFFFF, color, Shader.TileMode.CLAMP);
                  pPiece.setShader(grad);
                  canvas.drawCircle(cx, cy, rad, pPiece);
                  pPiece.setShader(null);

                  // Dama Simgesi (Taç)
                  if(type >= 3) {
                      pPiece.setColor(Color.WHITE);
                      pPiece.setTextSize(cell*0.5f);
                      pPiece.setTextAlign(Paint.Align.CENTER);
                      canvas.drawText("♛", cx, cy + cell*0.18f, pPiece);
                  }
              }

              @Override public boolean onTouchEvent(MotionEvent e) {
                  if(e.getAction() == MotionEvent.ACTION_UP && listener != null) {
                      float cell = Math.min(getWidth(), getHeight()) / 8f;
                      int c = (int)(e.getX()/cell), r = (int)(e.getY()/cell);
                      if(r>=0 && r<8 && c>=0 && c<8) listener.onCellClick(r, c);
                  }
                  return true;
              }
          }
          VIEW_EOF

      # ─── ANA SAYFA (MainActivity.java) ─────────────────────────
      - name: Write MainActivity.java
        run: |
          cat > app/src/main/java/com/damax/game/MainActivity.java << 'MAIN_EOF'
          package com.damax.game;
          import android.content.Intent;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          import com.damax.game.databinding.ActivityMainBinding;

          public class MainActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  ActivityMainBinding b = ActivityMainBinding.inflate(getLayoutInflater());
                  setContentView(b.getRoot());

                  b.btnVsLocal.setOnClickListener(v -> {
                      Intent i = new Intent(this, GameActivity.class);
                      i.putExtra("mode", "local");
                      startActivity(i);
                  });

                  b.btnWifi.setOnClickListener(v -> {
                      startActivity(new Intent(this, LobbyActivity.class));
                  });
              }
          }
          MAIN_EOF

      # ─── WIFI LOBİSİ (LobbyActivity.java) ──────────────────────
      - name: Write LobbyActivity.java
        run: |
          cat > app/src/main/java/com/damax/game/LobbyActivity.java << 'LOBBY_EOF'
          package com.damax.game;
          import android.content.Intent;
          import android.net.format.Formatter;
          import android.net.wifi.WifiManager;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          import com.damax.game.databinding.ActivityLobbyBinding;

          public class LobbyActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  ActivityLobbyBinding b = ActivityLobbyBinding.inflate(getLayoutInflater());
                  setContentView(b.getRoot());

                  // Yerel IP göster (WiFi eşleşmesi için)
                  WifiManager wm = (WifiManager) getSystemService(WIFI_SERVICE);
                  String ip = Formatter.formatIpAddress(wm.getConnectionInfo().getIpAddress());
                  b.tvMyIp.setText("Senin IP Adresin: " + ip);

                  b.btnHost.setOnClickListener(v -> {
                      Intent i = new Intent(this, GameActivity.class);
                      i.putExtra("mode", "wifi_host");
                      startActivity(i);
                  });

                  b.btnJoin.setOnClickListener(v -> {
                      String targetIp = b.etIp.getText().toString();
                      if(!targetIp.isEmpty()) {
                          Intent i = new Intent(this, GameActivity.class);
                          i.putExtra("mode", "wifi_join");
                          i.putExtra("ip", targetIp);
                          startActivity(i);
                      }
                  });
              }
          }
          LOBBY_EOF

      # ─── OYUN EKRANI (GameActivity.java) ────────────────────────
      - name: Write GameActivity.java
        run: |
          cat > app/src/main/java/com/damax/game/GameActivity.java << 'GAME_EOF'
          package com.damax.game;
          import android.os.Bundle;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import com.damax.game.databinding.ActivityGameBinding;
          import java.util.List;

          public class GameActivity extends AppCompatActivity implements BoardView.BoardListener {
              private ActivityGameBinding b;
              private GameEngine engine;
              private int selectedR = -1, selectedC = -1;

              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  b = ActivityGameBinding.inflate(getLayoutInflater());
                  setContentView(b.getRoot());

                  engine = new GameEngine();
                  b.boardView.setEngine(engine);
                  b.boardView.setListener(this);

                  String mode = getIntent().getStringExtra("mode");
                  Toast.makeText(this, "Mod: " + mode, Toast.LENGTH_SHORT).show();
              }

              @Override public void onCellClick(int r, int c) {
                  int piece = engine.board[r][c];
                  
                  // Taş seçimi
                  if(piece != GameEngine.EMPTY && ((engine.turn == 1 && (piece==1||piece==3)) || (engine.turn == 2 && (piece==2||piece==4)))) {
                      selectedR = r; selectedC = c;
                      b.boardView.select(r, c, engine.getValidMoves(r, c));
                      return;
                  }

                  // Hamle yapma
                  if(selectedR != -1) {
                      List<GameEngine.Move> moves = engine.getValidMoves(selectedR, selectedC);
                      for(GameEngine.Move m : moves) {
                          if(m.tr == r && m.tc == c) {
                              executeMove(m);
                              return;
                          }
                      }
                      selectedR = -1; selectedC = -1;
                      b.boardView.select(-1, -1, null);
                  }
              }

              private void executeMove(GameEngine.Move m) {
                  engine.board[m.tr][m.tc] = engine.board[m.fr][m.fc];
                  engine.board[m.fr][m.fc] = GameEngine.EMPTY;
                  
                  for(int[] cap : m.captured) engine.board[cap[0]][cap[1]] = GameEngine.EMPTY;

                  // Dama Olma Kontrolü
                  if(engine.turn == 1 && m.tr == 0) engine.board[m.tr][m.tc] = GameEngine.P1D;
                  if(engine.turn == 2 && m.tr == 7) engine.board[m.tr][m.tc] = GameEngine.P2D;

                  engine.turn = (engine.turn == 1) ? 2 : 1;
                  selectedR = -1; selectedC = -1;
                  b.boardView.select(-1, -1, null);
                  b.boardView.invalidate();
              }
          }
          GAME_EOF

      # ─── XML TASARIMLARI (Layouts) ─────────────────────────────
      - name: Write Layouts
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'L1'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:gravity="center" android:background="#050810" android:padding="30dp">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="DAMA X" android:textColor="#C9A84C" android:textSize="50sp" android:textStyle="bold" android:layout_marginBottom="50dp"/>
              <Button android:id="@+id/btnVsLocal" android:layout_width="match_parent" android:layout_height="60dp"
                  android:text="Aynı Cihazda Oyna" android:backgroundTint="#1A1A2E" android:layout_marginBottom="15dp"/>
              <Button android:id="@+id/btnWifi" android:layout_width="match_parent" android:layout_height="60dp"
                  android:text="WiFi (Karşılıklı) Oyna" android:backgroundTint="#C9A84C" android:textColor="#000"/>
          </LinearLayout>
          L1
          cat > app/src/main/res/layout/activity_lobby.xml << 'L2'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:padding="20dp" android:background="#050810">
              <TextView android:id="@+id/tvMyIp" android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:textColor="#39FF85" android:textSize="18sp" android:layout_marginBottom="30dp"/>
              <Button android:id="@+id/btnHost" android:layout_width="match_parent" android:layout_height="60dp"
                  android:text="Oda Kur (Sunucu Ol)" android:layout_marginBottom="40dp"/>
              <EditText android:id="@+id/etIp" android:layout_width="match_parent" android:layout_height="50dp"
                  android:hint="Rakip IP Gir" android:textColorHint="#555" android:textColor="#FFF" android:gravity="center"/>
              <Button android:id="@+id/btnJoin" android:layout_width="match_parent" android:layout_height="60dp"
                  android:text="Odaya Katıl" android:backgroundTint="#C9A84C"/>
          </LinearLayout>
          L2
          cat > app/src/main/res/layout/activity_game.xml << 'L3'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#0A0A0A">
              <com.damax.game.BoardView android:id="@+id/boardView"
                  android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:layout_centerInParent="true"/>
          </RelativeLayout>
          L3

      # ─── GRADLE BUILD ──────────────────────────────────────────
      - name: Build APK
        run: |
          chmod +x gradlew || true
          # Note: Minimal setup to ensure it runs in limited environments
          ./gradlew assembleDebug

      # ─── ARTIFACT UPLOAD ───────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DamaX-Classic-V1.1
          path: app/build/outputs/apk/debug/app-debug.apk

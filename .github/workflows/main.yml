name: "DAMA — Build APK"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: 'GitHub Release oluştur?'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/dama/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p gradle/wrapper
          echo "Dizinler oluşturuldu"

      - name: Write settings.gradle
        run: |
          cat > settings.gradle << 'SETTINGS_EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "Dama"
          include ':app'
          SETTINGS_EOF

      - name: Write root build.gradle
        run: |
          cat > build.gradle << 'ROOT_EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          ROOT_EOF

      - name: Write gradle.properties
        run: |
          cat > gradle.properties << 'PROPS_EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          PROPS_EOF

      - name: Write gradle wrapper properties
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'WRAPPER_EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          networkTimeout=10000
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          WRAPPER_EOF

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || echo "Wrapper hazır"

      - name: Write app/build.gradle
        run: |
          cat > app/build.gradle << 'APP_EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.dama.game'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dama.game"
                  minSdk 24
                  targetSdk 34
                  versionCode 2
                  versionName "2.0.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug { debuggable true }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              buildFeatures { viewBinding true }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'androidx.cardview:cardview:1.0.0'
          }
          APP_EOF

      - name: Write proguard rules
        run: echo "-keep class com.dama.game.** { *; }" > app/proguard-rules.pro

      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>
              <uses-permission android:name="android.permission.CHANGE_WIFI_MULTICAST_STATE"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:hardwareAccelerated="true"
                  android:theme="@style/Theme.Dama"
                  xmlns:tools="http://schemas.android.com/tools"
                  tools:replace="android:icon,android:roundIcon">
                  <activity android:name=".SplashActivity"
                      android:exported="true"
                      android:screenOrientation="portrait"
                      android:theme="@style/Theme.Dama.Splash">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".MainActivity"
                      android:exported="false"
                      android:screenOrientation="portrait"/>
                  <activity android:name=".GameActivity"
                      android:exported="false"
                      android:screenOrientation="portrait"
                      android:windowSoftInputMode="adjustResize"/>
                  <activity android:name=".LobbyActivity"
                      android:exported="false"
                      android:screenOrientation="portrait"
                      android:windowSoftInputMode="adjustResize"/>
              </application>
          </manifest>
          MANIFEST_EOF

      - name: Write strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'STRINGS_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Klasik Dama</string>
              <string name="app_subtitle">Türk Dama</string>
              <string name="vs_ai">🤖  Bilgisayara Karşı</string>
              <string name="vs_local">👥  Aynı Cihazda 2 Kişi</string>
              <string name="online">📡  WiFi ile Eşleş</string>
              <string name="settings">⚙  Ayarlar</string>
              <string name="create_room">Oyun Oluştur</string>
              <string name="join_room">Odaya Katıl</string>
              <string name="your_turn">✦ Senin sıran!</string>
              <string name="opponent_turn">Rakip düşünüyor…</string>
              <string name="resign">🏳 Teslim Ol</string>
              <string name="undo">↩ Geri Al</string>
              <string name="send">➤</string>
              <string name="chat_hint">Mesaj yaz…</string>
              <string name="room_code_hint">Oda Kodu</string>
              <string name="player_name_hint">Adınız</string>
              <string name="game_over">Oyun Bitti</string>
              <string name="wins">Kazandı!</string>
              <string name="play_again">🔄 Tekrar Oyna</string>
              <string name="main_menu">🏠 Ana Menü</string>
              <string name="forced_capture">⚠ Yemek zorunlu!</string>
              <string name="not_your_turn">Sıra sende değil</string>
              <string name="waiting_opponent">Rakip bekleniyor…</string>
              <string name="opponent_left">Rakip ayrıldı!</string>
              <string name="king_promoted">♛ Dame oldu!</string>
              <string name="searching">🔍 Ağda aranıyor…</string>
              <string name="found_player">Oyuncu bulundu!</string>
              <string name="no_players">Ağda oyuncu yok</string>
              <string name="connected">● Bağlı</string>
              <string name="disconnected">○ Bağlantı Kesildi</string>
              <string name="sound">Titreşim</string>
              <string name="animations">Animasyonlar</string>
              <string name="ai_difficulty">Zorluk</string>
              <string name="version">v2.0.0</string>
              <string name="resign_confirm">Teslim olmak istiyor musun?</string>
              <string name="yes">Evet</string>
              <string name="no">Hayır</string>
              <string name="p1_label">⚫ Siyah</string>
              <string name="p2_label">⚪ Beyaz</string>
              <string name="pieces">taş</string>
          </resources>
          STRINGS_EOF

      - name: Write colors.xml
        run: |
          cat > app/src/main/res/values/colors.xml << 'COLORS_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg_deep">#FF0B0F1A</color>
              <color name="bg_mid">#FF111827</color>
              <color name="bg_panel">#FF161E30</color>
              <color name="gold">#FFD4A843</color>
              <color name="gold_light">#FFFFD770</color>
              <color name="gold_dim">#FF3D2C10</color>
              <color name="neon">#FF2ECC71</color>
              <color name="neon_dim">#FF1A8C43</color>
              <color name="p1_bright">#FFE8E0CC</color>
              <color name="p1_dark">#FF2C2416</color>
              <color name="p1_mid">#FF8A7D60</color>
              <color name="p2_bright">#FFFFFFFF</color>
              <color name="p2_dark">#FFB0A090</color>
              <color name="p2_mid">#FFE0D8C8</color>
              <color name="text_primary">#FFE8E0CC</color>
              <color name="text_secondary">#FF6A6050</color>
              <color name="error">#FFFF4466</color>
              <color name="cell_light">#FFD4A843</color>
              <color name="cell_dark">#FF2C1A0A</color>
              <color name="board_border">#FF8B5E2A</color>
              <color name="colorPrimary">#FFD4A843</color>
              <color name="colorPrimaryDark">#FF0B0F1A</color>
              <color name="colorAccent">#FF2ECC71</color>
              <color name="white">#FFFFFFFF</color>
              <color name="transparent">#00000000</color>
          </resources>
          COLORS_EOF

      - name: Write themes.xml
        run: |
          cat > app/src/main/res/values/themes.xml << 'THEMES_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.Dama" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/gold</item>
                  <item name="colorPrimaryVariant">@color/gold_dim</item>
                  <item name="colorOnPrimary">@color/bg_deep</item>
                  <item name="colorSecondary">@color/neon</item>
                  <item name="colorOnSecondary">@color/bg_deep</item>
                  <item name="android:colorBackground">@color/bg_deep</item>
                  <item name="android:statusBarColor">@color/bg_deep</item>
                  <item name="android:navigationBarColor">@color/bg_deep</item>
                  <item name="android:windowLightStatusBar">false</item>
              </style>
              <style name="Theme.Dama.Splash" parent="Theme.Dama">
                  <item name="android:windowFullscreen">true</item>
              </style>
              <style name="Widget.Dama.Button" parent="Widget.MaterialComponents.Button.OutlinedButton">
                  <item name="android:textColor">@color/gold</item>
                  <item name="strokeColor">@color/gold_dim</item>
                  <item name="android:backgroundTint">@color/bg_mid</item>
                  <item name="android:letterSpacing">0.05</item>
                  <item name="cornerRadius">8dp</item>
              </style>
              <style name="Widget.Dama.Button.Primary" parent="Widget.MaterialComponents.Button">
                  <item name="android:backgroundTint">@color/gold</item>
                  <item name="android:textColor">@color/bg_deep</item>
                  <item name="android:textStyle">bold</item>
                  <item name="cornerRadius">8dp</item>
              </style>
              <style name="Widget.Dama.Button.Danger" parent="Widget.MaterialComponents.Button.OutlinedButton">
                  <item name="android:textColor">@color/error</item>
                  <item name="strokeColor">@color/error</item>
                  <item name="android:backgroundTint">@color/bg_mid</item>
                  <item name="cornerRadius">8dp</item>
              </style>
          </resources>
          THEMES_EOF

      - name: Write drawables
        run: |
          cat > app/src/main/res/drawable/bg_gradient.xml << 'BG_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:startColor="#FF0B0F1A" android:endColor="#FF1A1205"
                  android:angle="135" android:type="linear"/>
          </shape>
          BG_EOF

          cat > app/src/main/res/drawable/bg_card.xml << 'CARD_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <solid android:color="#FF161E30"/>
              <stroke android:width="1dp" android:color="#44D4A843"/>
              <corners android:radius="12dp"/>
          </shape>
          CARD_EOF

          cat > app/src/main/res/drawable/bg_button.xml << 'BTN_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <solid android:color="#FF111827"/>
              <stroke android:width="1dp" android:color="#33D4A843"/>
              <corners android:radius="8dp"/>
          </shape>
          BTN_EOF

          cat > app/src/main/res/drawable/bg_input.xml << 'INPUT_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <solid android:color="#FF0B0F1A"/>
              <stroke android:width="1dp" android:color="#44D4A843"/>
              <corners android:radius="6dp"/>
          </shape>
          INPUT_EOF

          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'IC_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#FF2C1A0A"/>
          </shape>
          IC_EOF

          for d in hdpi xhdpi xxhdpi xxxhdpi; do
            cat > app/src/main/res/mipmap-$d/ic_launcher.xml << 'ICON_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground>
                  <inset android:drawable="@color/gold" android:inset="25%"/>
              </foreground>
          </adaptive-icon>
          ICON_EOF
            cp app/src/main/res/mipmap-$d/ic_launcher.xml app/src/main/res/mipmap-$d/ic_launcher_round.xml
          done

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'ANYDPI_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground>
                  <inset android:drawable="@color/gold" android:inset="25%"/>
              </foreground>
          </adaptive-icon>
          ANYDPI_EOF
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          echo "Drawable/mipmap yazıldı"

      - name: Write layouts
        run: |
          cat > app/src/main/res/layout/activity_splash.xml << 'SPLASH_LAYOUT_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:gravity="center"
              android:background="@drawable/bg_gradient">
              <TextView android:id="@+id/tvLogo"
                  android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="♟" android:textSize="80sp" android:alpha="0"
                  android:textColor="@color/gold"/>
              <TextView android:id="@+id/tvTitle"
                  android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="KLASİK DAMA" android:textSize="28sp" android:textStyle="bold"
                  android:textColor="@color/gold_light" android:letterSpacing="0.15"
                  android:alpha="0" android:layout_marginTop="16dp"/>
              <TextView android:id="@+id/tvSub"
                  android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="Türk Dama" android:textSize="14sp"
                  android:textColor="@color/text_secondary" android:alpha="0"/>
          </LinearLayout>
          SPLASH_LAYOUT_EOF

          cat > app/src/main/res/layout/activity_main.xml << 'MAIN_LAYOUT_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:gravity="center"
              android:background="@drawable/bg_gradient" android:padding="32dp">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="♟" android:textSize="64sp" android:textColor="@color/gold"
                  android:layout_marginBottom="8dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="KLASİK DAMA" android:textSize="26sp" android:textStyle="bold"
                  android:textColor="@color/gold_light" android:letterSpacing="0.12"
                  android:layout_marginBottom="4dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="Türk Dama" android:textSize="13sp"
                  android:textColor="@color/text_secondary" android:layout_marginBottom="48dp"/>
              <com.google.android.material.button.MaterialButton
                  android:id="@+id/btnVsAI"
                  style="@style/Widget.Dama.Button.Primary"
                  android:layout_width="match_parent" android:layout_height="56dp"
                  android:text="@string/vs_ai" android:textSize="15sp"
                  android:layout_marginBottom="12dp"/>
              <com.google.android.material.button.MaterialButton
                  android:id="@+id/btnVsLocal"
                  style="@style/Widget.Dama.Button"
                  android:layout_width="match_parent" android:layout_height="56dp"
                  android:text="@string/vs_local" android:textSize="15sp"
                  android:layout_marginBottom="12dp"/>
              <com.google.android.material.button.MaterialButton
                  android:id="@+id/btnOnline"
                  style="@style/Widget.Dama.Button"
                  android:layout_width="match_parent" android:layout_height="56dp"
                  android:text="@string/online" android:textSize="15sp"
                  android:layout_marginBottom="12dp"/>
              <com.google.android.material.button.MaterialButton
                  android:id="@+id/btnSettings"
                  style="@style/Widget.Dama.Button"
                  android:layout_width="match_parent" android:layout_height="48dp"
                  android:text="@string/settings" android:textSize="13sp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="@string/version" android:textSize="10sp"
                  android:textColor="@color/text_secondary" android:layout_marginTop="24dp"/>
          </LinearLayout>
          MAIN_LAYOUT_EOF

          cat > app/src/main/res/layout/activity_lobby.xml << 'LOBBY_LAYOUT_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="@drawable/bg_gradient"
              android:padding="20dp">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="📡  WiFi Eşleşme" android:textSize="22sp" android:textStyle="bold"
                  android:textColor="@color/gold_light" android:letterSpacing="0.08"
                  android:layout_marginBottom="4dp"/>
              <TextView android:id="@+id/tvStatus"
                  android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="@string/searching" android:textSize="12sp"
                  android:textColor="@color/neon" android:layout_marginBottom="20dp"/>
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:orientation="vertical" android:background="@drawable/bg_card"
                  android:padding="16dp" android:layout_marginBottom="16dp">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="OYUNCU ADINIZ" android:textSize="10sp"
                      android:textColor="@color/gold" android:letterSpacing="0.15"
                      android:layout_marginBottom="8dp"/>
                  <EditText android:id="@+id/etPlayerName"
                      android:layout_width="match_parent" android:layout_height="52dp"
                      android:hint="@string/player_name_hint" android:inputType="textPersonName"
                      android:background="@drawable/bg_input"
                      android:textColor="@color/text_primary" android:textColorHint="@color/text_secondary"
                      android:paddingStart="14dp" android:paddingEnd="14dp"
                      android:textSize="16sp"/>
              </LinearLayout>
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:orientation="horizontal" android:layout_marginBottom="16dp">
                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/btnHost"
                      style="@style/Widget.Dama.Button.Primary"
                      android:layout_width="0dp" android:layout_height="56dp"
                      android:layout_weight="1" android:text="@string/create_room"
                      android:layout_marginEnd="8dp"/>
                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/btnSearch"
                      style="@style/Widget.Dama.Button"
                      android:layout_width="0dp" android:layout_height="56dp"
                      android:layout_weight="1" android:text="🔍 Ara"/>
              </LinearLayout>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="BULUNAN OYUNCULAR" android:textSize="10sp"
                  android:textColor="@color/gold" android:letterSpacing="0.15"
                  android:layout_marginBottom="8dp"/>
              <androidx.recyclerview.widget.RecyclerView
                  android:id="@+id/rvPlayers"
                  android:layout_width="match_parent" android:layout_height="0dp"
                  android:layout_weight="1"/>
              <TextView android:id="@+id/tvHint"
                  android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:text="💡 İki telefon aynı WiFi ağında olmalıdır"
                  android:textSize="11sp" android:textColor="@color/text_secondary"
                  android:gravity="center" android:layout_marginTop="12dp"/>
          </LinearLayout>
          LOBBY_LAYOUT_EOF

          cat > app/src/main/res/layout/activity_game.xml << 'GAME_LAYOUT_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="@drawable/bg_gradient">
              <LinearLayout android:layout_width="match_parent" android:layout_height="60dp"
                  android:orientation="horizontal" android:paddingStart="16dp" android:paddingEnd="16dp"
                  android:background="@color/bg_panel" android:gravity="center_vertical"
                  android:elevation="4dp">
                  <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content"
                      android:layout_weight="1" android:orientation="vertical">
                      <TextView android:id="@+id/tvP1Name"
                          android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="Oyuncu 1" android:textSize="14sp" android:textStyle="bold"
                          android:textColor="@color/p1_bright"/>
                      <TextView android:id="@+id/tvP1Count"
                          android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="12 taş" android:textSize="11sp"
                          android:textColor="@color/text_secondary"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:orientation="vertical" android:gravity="center">
                      <TextView android:id="@+id/tvTurnInfo"
                          android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="⚫ Siyah" android:textSize="11sp"
                          android:textColor="@color/gold" android:gravity="center"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content"
                      android:layout_weight="1" android:orientation="vertical" android:gravity="end">
                      <TextView android:id="@+id/tvP2Name"
                          android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="Oyuncu 2" android:textSize="14sp" android:textStyle="bold"
                          android:textColor="@color/p2_bright"/>
                      <TextView android:id="@+id/tvP2Count"
                          android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="12 taş" android:textSize="11sp"
                          android:textColor="@color/text_secondary"/>

          package com.damax.game;
          import java.util.*;
          public class GameEngine {
              public static final int EMPTY = 0, P1 = 1, P2 = 2, P1K = 3, P2K = 4;
              public int[][] board = new int[8][8];
              public int currentPlayer = 1;
              public boolean gameActive = true;
              public int p1Count = 16, p2Count = 16;
              public int aiDifficulty = 2;

              public GameEngine() { initBoard(); }

              public void initBoard() {
                  for (int c = 0; c < 8; c++) {
                      board[0][c] = P2; board[1][c] = P2;
                      board[6][c] = P1; board[7][c] = P1;
                  }
                  currentPlayer = 1; gameActive = true; p1Count = p2Count = 16;
              }

              public static class Move {
                  public int[] from, to;
                  public List<int[]> captures = new ArrayList<>();
                  public Move(int[] f, int[] t, List<int[]> c) { from = f; to = t; if (c != null) captures = c; }
              }

              public List<Move> getAllMoves(int[][] b, int player) {
                  List<Move> moves = new ArrayList<>();
                  for (int r = 0; r < 8; r++) for (int c = 0; c < 8; c++) {
                      int p = b[r][c];
                      if ((player == 1 && (p == P1 || p == P1K)) || (player == 2 && (p == P2 || p == P2K)))
                          moves.addAll(getMoves(b, r, c, player));
                  }
                  boolean hasCap = moves.stream().anyMatch(m -> !m.captures.isEmpty());
                  if (hasCap) moves.removeIf(m -> m.captures.isEmpty());
                  return moves;
              }

              public List<Move> getMoves(int[][] b, int r, int c, int player) {
                  List<Move> caps = getCaptures(b, r, c, player);
                  if (!caps.isEmpty()) return caps;
                  boolean isKing = b[r][c] == P1K || b[r][c] == P2K;
                  int[][] dirs = isKing ? new int[][]{{-1,0},{1,0},{0,-1},{0,1}} : (player == 1 ? new int[][]{{-1,0}} : new int[][]{{1,0}});
                  List<Move> moves = new ArrayList<>();
                  for (int[] d : dirs) {
                      int nr = r + d[0], nc = c + d[1];
                      if (isKing) {
                          while (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && b[nr][nc] == EMPTY) {
                              moves.add(new Move(new int[]{r, c}, new int[]{nr, nc}, null));
                              nr += d[0]; nc += d[1];
                          }
                      } else if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && b[nr][nc] == EMPTY) {
                          moves.add(new Move(new int[]{r, c}, new int[]{nr, nc}, null));
                      }
                  }
                  return moves;
              }

              public List<Move> getCaptures(int[][] b, int r, int c, int player) {
                  List<Move> caps = new ArrayList<>();
                  boolean isKing = b[r][c] == P1K || b[r][c] == P2K;
                  int[][] dirs = isKing ? new int[][]{{-1,0},{1,0},{0,-1},{0,1}} : (player == 1 ? new int[][]{{-1,0}} : new int[][]{{1,0}});
                  for (int[] d : dirs) {
                      int er = r + d[0], ec = c + d[1], lr = r + 2 * d[0], lc = c + 2 * d[1];
                      if (er < 0 || er > 7 || ec < 0 || ec > 7 || lr < 0 || lr > 7 || lc < 0 || lc > 7) continue;
                      int enemy = b[er][ec];
                      boolean isEnemy = (player == 1 && (enemy == P2 || enemy == P2K)) || (player == 2 && (enemy == P1 || enemy == P1K));
                      if (isEnemy && b[lr][lc] == EMPTY) {
                          List<int[]> cap = new ArrayList<>(); cap.add(new int[]{er, ec});
                          caps.add(new Move(new int[]{r, c}, new int[]{lr, lc}, cap));
                      }
                  }
                  return caps;
              }

              public boolean applyMoveToBoard(Move m) {
                  int piece = board[m.from[0]][m.from[1]];
                  board[m.to[0]][m.to[1]] = piece;
                  board[m.from[0]][m.from[1]] = EMPTY;
                  for (int[] cap : m.captures) {
                      board[cap[0]][cap[1]] = EMPTY;
                      if (currentPlayer == 1) p2Count--; else p1Count--;
                  }
                  boolean promoted = false;
                  if (piece == P1 && m.to[0] == 0) { board[m.to[0]][m.to[1]] = P1K; promoted = true; }
                  if (piece == P2 && m.to[0] == 7) { board[m.to[0]][m.to[1]] = P2K; promoted = true; }
                  return promoted;
              }

              public int checkWinner() {
                  if (p1Count <= 0) return 2;
                  if (p2Count <= 0) return 1;
                  if (getAllMoves(board, currentPlayer == 1 ? 2 : 1).isEmpty()) return currentPlayer;
                  return 0;
              }

              public Move getAIMove() {
                  List<Move> moves = getAllMoves(board, 2);
                  if (moves.isEmpty()) return null;
                  if (aiDifficulty == 1) return moves.get(new Random().nextInt(moves.size()));
                  List<Move> caps = moves.stream().filter(m -> !m.captures.isEmpty()).toList();
                  return caps.isEmpty() ? moves.get(new Random().nextInt(moves.size())) : caps.get(new Random().nextInt(caps.size()));
              }
          }
          GAMEENGINE_EOF


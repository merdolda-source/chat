name: "DAMA X — Build APK"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: 'GitHub Release oluştur?'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────────────
      # 1. CHECKOUT
      # ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────
      # 2. JDK
      # ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─────────────────────────────────────────────────────────────
      # 3. TÜM PROJE DOSYALARINI OLUŞTUR (EOF sistemi)
      # ─────────────────────────────────────────────────────────────
      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/damax/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/menu
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p gradle/wrapper
          echo "Dizinler oluşturuldu"

      # ─── settings.gradle ───────────────────────────────────────
      - name: Write settings.gradle
        run: |
          cat > settings.gradle << 'SETTINGS_EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "DamaX"
          include ':app'
          SETTINGS_EOF

      # ─── build.gradle (root) ──────────────────────────────────
      - name: Write root build.gradle
        run: |
          cat > build.gradle << 'ROOT_GRADLE_EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          ROOT_GRADLE_EOF

      # ─── gradle.properties ────────────────────────────────────
      - name: Write gradle.properties
        run: |
          cat > gradle.properties << 'GRADLE_PROPS_EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          GRADLE_PROPS_EOF

      # ─── gradle wrapper properties ────────────────────────────
      - name: Write gradle wrapper
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'WRAPPER_EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          networkTimeout=10000
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          WRAPPER_EOF

      # ─── Download gradle wrapper jar ──────────────────────────
      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || \
          wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O /tmp/gradle.zip && \
          echo "Wrapper hazır"

      # ─── gradlew script ───────────────────────────────────────
      - name: Write gradlew
        run: |
          cat > gradlew << 'GRADLEW_EOF'
          #!/bin/sh
          GRADLE_OPTS="${GRADLE_OPTS:-}" exec "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" "$@" 2>/dev/null || \
          gradle "$@"
          GRADLEW_EOF
          chmod +x gradlew

      # ─── app/build.gradle ─────────────────────────────────────
      - name: Write app/build.gradle
        run: |
          cat > app/build.gradle << 'APP_GRADLE_EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.damax.game'
              compileSdk 34
              defaultConfig {
                  applicationId "com.damax.game"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      debuggable true
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              buildFeatures { viewBinding true }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'androidx.cardview:cardview:1.0.0'
          }
          APP_GRADLE_EOF

      # ─── proguard-rules.pro ───────────────────────────────────
      - name: Write proguard rules
        run: echo "-keep class com.damax.game.** { *; }" > app/proguard-rules.pro

      # ─── AndroidManifest.xml ──────────────────────────────────
      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:hardwareAccelerated="true"
                  android:theme="@style/Theme.DamaX">
                  <activity android:name=".SplashActivity"
                      android:exported="true"
                      android:screenOrientation="portrait"
                      android:theme="@style/Theme.DamaX.Splash">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".MainActivity"
                      android:exported="false"
                      android:screenOrientation="portrait"/>
                  <activity android:name=".GameActivity"
                      android:exported="false"
                      android:screenOrientation="portrait"
                      android:windowSoftInputMode="adjustResize"/>
                  <activity android:name=".LobbyActivity"
                      android:exported="false"
                      android:screenOrientation="portrait"
                      android:windowSoftInputMode="adjustResize"/>
              </application>
          </manifest>
          MANIFEST_EOF

      # ─── res/values/strings.xml ───────────────────────────────
      - name: Write strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'STRINGS_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">DAMA X</string>
              <string name="app_subtitle">Zeka Arenası</string>
              <string name="vs_ai">🤖  AI ile Oyna</string>
              <string name="vs_local">👥  Lokal 2 Kişi</string>
              <string name="online">🌐  Online Oyna</string>
              <string name="settings">⚙  Ayarlar</string>
              <string name="create_room">Oda Oluştur</string>
              <string name="join_room">Odaya Katıl</string>
              <string name="your_turn">✦ Senin Sıran!</string>
              <string name="opponent_turn">Rakip düşünüyor…</string>
              <string name="resign">🏳 Teslim Ol</string>
              <string name="undo">↩ Geri Al</string>
              <string name="send">➤</string>
              <string name="chat_hint">Mesaj yazın…</string>
              <string name="room_code_hint">Oda Kodu (örn: ABC123)</string>
              <string name="player_name_hint">Kullanıcı Adınız</string>
              <string name="server_ip_hint">Sunucu IP (örn: 192.168.1.5)</string>
              <string name="easy">Kolay</string>
              <string name="medium">Orta</string>
              <string name="hard">Zor</string>
              <string name="timer_off">Süresiz</string>
              <string name="timer_30">30 sn / hamle</string>
              <string name="timer_60">60 sn / hamle</string>
              <string name="timer_120">2 dk / hamle</string>
              <string name="game_over">Oyun Bitti</string>
              <string name="wins">Kazandı!</string>
              <string name="play_again">🔄 Tekrar Oyna</string>
              <string name="main_menu">🏠 Ana Menü</string>
              <string name="forced_capture">⚠ Zorunlu yeme var!</string>
              <string name="not_your_turn">Sıra sende değil</string>
              <string name="waiting_opponent">Rakip bekleniyor…</string>
              <string name="opponent_left">Rakip oyundan ayrıldı!</string>
              <string name="king_promoted">♛ Dame oldu!</string>
              <string name="connect">Bağlan</string>
              <string name="connecting">Bağlanılıyor…</string>
              <string name="connected">● Bağlı</string>
              <string name="disconnected">○ Bağlantı Kesildi</string>
              <string name="sound">Ses Efektleri</string>
              <string name="vibration">Titreşim</string>
              <string name="animations">Animasyonlar</string>
              <string name="ai_difficulty">AI Zorluğu</string>
              <string name="server_address">Sunucu Adresi</string>
              <string name="open_rooms">Açık Odalar</string>
              <string name="no_rooms">Açık oda bulunamadı</string>
              <string name="version">v1.0.0</string>
              <string name="resign_confirm">Teslim olmak istediğinizden emin misiniz?</string>
              <string name="yes">Evet</string>
              <string name="no">Hayır</string>
              <string name="room_created">Oda oluşturuldu: </string>
              <string name="p1_label">🔴 Kırmızı</string>
              <string name="p2_label">🔵 Mavi</string>
              <string name="pieces">taş</string>
              <string name="moves_log">📜 Hamleler</string>
              <string name="chat_tab">💬 Sohbet</string>
          </resources>
          STRINGS_EOF

      # ─── res/values/colors.xml ────────────────────────────────
      - name: Write colors.xml
        run: |
          cat > app/src/main/res/values/colors.xml << 'COLORS_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg_deep">#FF050810</color>
              <color name="bg_mid">#FF0A1020</color>
              <color name="bg_panel">#FF0F1830</color>
              <color name="glass">#CC111828</color>
              <color name="gold">#FFC9A84C</color>
              <color name="gold_light">#FFF0D080</color>
              <color name="gold_dim">#FF3D2C10</color>
              <color name="neon">#FF39FF85</color>
              <color name="neon_dim">#FF1A8C43</color>
              <color name="p1_bright">#FFFF8899</color>
              <color name="p1_dark">#FFCC1133</color>
              <color name="p1_mid">#FFEE2244</color>
              <color name="p2_bright">#FF88BBFF</color>
              <color name="p2_dark">#FF1144CC</color>
              <color name="p2_mid">#FF2266EE</color>
              <color name="text_primary">#FFE8E0CC</color>
              <color name="text_secondary">#FF6A6050</color>
              <color name="error">#FFFF4466</color>
              <color name="surface">#FF0D1525</color>
              <color name="cell_light">#FF1A1A2E</color>
              <color name="cell_dark">#FF0D0D1A</color>
              <color name="border_gold">#44C9A84C</color>
              <color name="colorPrimary">#FFC9A84C</color>
              <color name="colorPrimaryDark">#FF050810</color>
              <color name="colorAccent">#FF39FF85</color>
              <color name="white">#FFFFFFFF</color>
              <color name="transparent">#00000000</color>
          </resources>
          COLORS_EOF

      # ─── res/values/themes.xml ────────────────────────────────
      - name: Write themes.xml
        run: |
          cat > app/src/main/res/values/themes.xml << 'THEMES_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.DamaX" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/gold</item>
                  <item name="colorPrimaryVariant">@color/gold_dim</item>
                  <item name="colorOnPrimary">@color/bg_deep</item>
                  <item name="colorSecondary">@color/neon</item>
                  <item name="colorOnSecondary">@color/bg_deep</item>
                  <item name="android:colorBackground">@color/bg_deep</item>
                  <item name="android:statusBarColor">@color/bg_deep</item>
                  <item name="android:navigationBarColor">@color/bg_deep</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:textColor">@color/text_primary</item>
              </style>
              <style name="Theme.DamaX.Splash" parent="Theme.DamaX">
                  <item name="android:windowFullscreen">true</item>
              </style>
              <style name="Widget.DamaX.Button" parent="Widget.MaterialComponents.Button">
                  <item name="backgroundTint">@color/glass</item>
                  <item name="android:textColor">@color/gold</item>
                  <item name="strokeColor">@color/border_gold</item>
                  <item name="strokeWidth">1dp</item>
                  <item name="cornerRadius">12dp</item>
                  <item name="android:textSize">13sp</item>
                  <item name="android:paddingTop">14dp</item>
                  <item name="android:paddingBottom">14dp</item>
              </style>
              <style name="Widget.DamaX.Button.Primary" parent="Widget.DamaX.Button">
                  <item name="backgroundTint">#1A2A1A</item>
                  <item name="android:textColor">@color/neon</item>
                  <item name="strokeColor">@color/neon_dim</item>
              </style>
              <style name="Widget.DamaX.Button.Danger" parent="Widget.DamaX.Button">
                  <item name="backgroundTint">#2A0A10</item>
                  <item name="android:textColor">@color/error</item>
                  <item name="strokeColor">#661020</item>
              </style>
          </resources>
          THEMES_EOF

      # ─── res/values/dimens.xml ────────────────────────────────
      - name: Write dimens.xml
        run: |
          cat > app/src/main/res/values/dimens.xml << 'DIMENS_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <dimen name="margin_small">8dp</dimen>
              <dimen name="margin_medium">16dp</dimen>
              <dimen name="margin_large">24dp</dimen>
              <dimen name="card_radius">14dp</dimen>
              <dimen name="button_radius">12dp</dimen>
              <dimen name="text_title">22sp</dimen>
              <dimen name="text_body">14sp</dimen>
              <dimen name="text_small">11sp</dimen>
          </resources>
          DIMENS_EOF

      # ─── res/drawable/bg_deep.xml ─────────────────────────────
      - name: Write drawables
        run: |
          cat > app/src/main/res/drawable/bg_gradient.xml << 'BG_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:startColor="#050810" android:endColor="#0A1528"
                  android:angle="135" android:type="linear"/>
          </shape>
          BG_EOF

          cat > app/src/main/res/drawable/bg_card.xml << 'CARD_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:startColor="#0F1830" android:endColor="#0A1220"
                  android:angle="135"/>
              <stroke android:width="1dp" android:color="#44C9A84C"/>
              <corners android:radius="14dp"/>
          </shape>
          CARD_EOF

          cat > app/src/main/res/drawable/bg_button.xml << 'BTN_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#1A2A50"/>
              <stroke android:width="1dp" android:color="#44C9A84C"/>
              <corners android:radius="12dp"/>
          </shape>
          BTN_EOF

          cat > app/src/main/res/drawable/bg_button_primary.xml << 'BTNP_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#1A2A1A"/>
              <stroke android:width="1dp" android:color="#1A8C43"/>
              <corners android:radius="12dp"/>
          </shape>
          BTNP_EOF

          cat > app/src/main/res/drawable/bg_input.xml << 'INPUT_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#0F1830"/>
              <stroke android:width="1dp" android:color="#33C9A84C"/>
              <corners android:radius="10dp"/>
          </shape>
          INPUT_EOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'ICON_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#050810" android:pathData="M0,0h108v108H0z"/>
            <path android:fillColor="#0F1830" android:pathData="M18,18h72v72H18z"/>
            <path android:fillColor="#44C9A84C"
                android:pathData="M18,36h72v1H18zM18,54h72v1H18zM18,72h72v1H18zM36,18v72h1V18zM54,18v72h1V18zM72,18v72h1V18z"/>
            <path android:fillColor="#C9A84C"
                android:pathData="M18,18h72v3H18zM18,87h72v3H18zM18,18v72h3V18zM87,18v72h3V18z"/>
            <circle android:fillColor="#CC1133" cx="36" cy="36" r="11"/>
            <circle android:fillColor="#FF889966" cx="32" cy="32" r="5"/>
            <circle android:fillColor="#1144CC" cx="72" cy="72" r="11"/>
            <circle android:fillColor="#88BBFF66" cx="68" cy="68" r="5"/>
            <path android:fillColor="#F0D080"
                android:pathData="M44,52l4,-7l4,4l4,-7l4,4l4,-7v14H44z"/>
          </vector>
          ICON_EOF

          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'ICONBG_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#050810"/>
          </shape>
          ICONBG_EOF

          # Adaptive icon launcher
          for d in mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            cat > app/src/main/res/$d/ic_launcher.xml << 'LAUNCHER_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          LAUNCHER_EOF
            cp app/src/main/res/$d/ic_launcher.xml app/src/main/res/$d/ic_launcher_round.xml
          done
          echo "Drawables yazıldı"

      # ─── res/layout/activity_splash.xml ──────────────────────
      - name: Write layout files
        run: |
          cat > app/src/main/res/layout/activity_splash.xml << 'SPLASH_LAYOUT_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="@drawable/bg_gradient">
              <LinearLayout
                  android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:layout_gravity="center" android:orientation="vertical"
                  android:gravity="center">
                  <TextView
                      android:id="@+id/tvLogo"
                      android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="♟" android:textSize="80sp"
                      android:textColor="@color/gold"/>
                  <TextView
                      android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="DAMA X" android:textSize="36sp" android:textStyle="bold"
                      android:textColor="@color/gold_light" android:letterSpacing="0.18"/>
                  <TextView
                      android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Zeka Arenası" android:textSize="14sp"
                      android:textColor="@color/neon" android:letterSpacing="0.12"
                      android:layout_marginTop="4dp"/>
              </LinearLayout>
          </FrameLayout>
          SPLASH_LAYOUT_EOF

          cat > app/src/main/res/layout/activity_main.xml << 'MAIN_LAYOUT_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="@drawable/bg_gradient"
              android:gravity="center">
              <TextView
                  android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="♟" android:textSize="64sp" android:textColor="@color/gold"
                  android:layout_marginBottom="4dp"/>
              <TextView
                  android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="DAMA X" android:textSize="32sp" android:textStyle="bold"
                  android:textColor="@color/gold_light" android:letterSpacing="0.14"/>
              <TextView
                  android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="ZEKA ARENASI" android:textSize="11sp"
                  android:textColor="@color/neon" android:letterSpacing="0.25"
                  android:layout_marginBottom="40dp"/>
              <LinearLayout
                  android:layout_width="280dp" android:layout_height="wrap_content"
                  android:orientation="vertical" android:padding="20dp"
                  android:background="@drawable/bg_card">
                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/btnVsAI"
                      style="@style/Widget.DamaX.Button.Primary"
                      android:layout_width="match_parent" android:layout_height="52dp"
                      android:text="@string/vs_ai" android:layout_marginBottom="10dp"/>
                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/btnVsLocal"
                      style="@style/Widget.DamaX.Button"
                      android:layout_width="match_parent" android:layout_height="52dp"
                      android:text="@string/vs_local" android:layout_marginBottom="10dp"/>
                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/btnOnline"
                      style="@style/Widget.DamaX.Button"
                      android:layout_width="match_parent" android:layout_height="52dp"
                      android:text="@string/online" android:layout_marginBottom="10dp"/>
                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/btnSettings"
                      style="@style/Widget.DamaX.Button"
                      android:layout_width="match_parent" android:layout_height="52dp"
                      android:text="@string/settings"/>
              </LinearLayout>
              <TextView
                  android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="@string/version" android:textSize="11sp"
                  android:textColor="@color/text_secondary" android:layout_marginTop="24dp"/>
          </LinearLayout>
          MAIN_LAYOUT_EOF

          cat > app/src/main/res/layout/activity_lobby.xml << 'LOBBY_LAYOUT_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="@drawable/bg_gradient"
              android:padding="20dp">
              <TextView
                  android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="🌐  ONLINE" android:textSize="22sp" android:textStyle="bold"
                  android:textColor="@color/gold_light" android:letterSpacing="0.1"
                  android:layout_marginBottom="4dp"/>
              <TextView

package com.dama.game;
import android.app.*;import android.os.Bundle;import android.os.Handler;import android.widget.Toast;
import androidx.appcompat.app.AppCompatActivity;
import androidx.recyclerview.widget.LinearLayoutManager;import androidx.recyclerview.widget.RecyclerView;
import com.dama.game.databinding.ActivityGameBinding;
import com.google.gson.JsonObject;
import java.util.*;
public class GameActivity extends AppCompatActivity implements BoardView.BoardListener,LanServer.LanListener {
    private ActivityGameBinding b;private GameEngine engine;private SoundManager sound;private PrefsManager prefs;
    private String gameMode;private int myColor=1;private boolean myTurn=true;
    private LanServer lanServer;private LanClient lanClient;private boolean isHost=false;private String oppName="Rakip";
    private int[]selected=null;private List<GameEngine.Move>validMoves=new ArrayList<>();
    private int[]captureChain=null;private Stack<GS>undoStack=new Stack<>();
    private List<CM>chatMsgs=new ArrayList<>();private ChatAdapter chatAdapter;
    static class GS{int[][]board;int player,p1Count,p2Count;GS(int[][]b,int p,int c1,int c2){board=new int[8][8];for(int i=0;i<8;i++)System.arraycopy(b[i],0,board[i],0,8);player=p;p1Count=c1;p2Count=c2;}}
    static class CM{String sender,text;int color;CM(String s,String t,int c){sender=s;text=t;color=c;}}
    @Override protected void onCreate(Bundle s){
        super.onCreate(s);b=ActivityGameBinding.inflate(getLayoutInflater());setContentView(b.getRoot());
        prefs=new PrefsManager(this);sound=new SoundManager(this);engine=new GameEngine();
        engine.aiDifficulty=prefs.getAiDifficulty();
        gameMode=getIntent().getStringExtra("mode");if(gameMode==null)gameMode="ai";
        isHost=getIntent().getBooleanExtra("isHost",false);
        String on=getIntent().getStringExtra("opponentName");if(on!=null)oppName=on;
        b.boardView.setEngine(engine);b.boardView.setListener(this);
        b.btnUndo.setOnClickListener(v->undo());b.btnResign.setOnClickListener(v->resign());b.btnChat.setOnClickListener(v->chat());
        if("online".equals(gameMode)){myColor=isHost?1:2;myTurn=isHost;
            if(isHost){lanServer=new LanServer(this);lanServer.start(getIntent().getIntExtra("port",54321));}
            else{lanClient=new LanClient(this);lanClient.connect(getIntent().getStringExtra("host"),getIntent().getIntExtra("port",54321));}
        }
        newGame();
    }
    private void newGame(){
        engine.initBoard();selected=null;validMoves.clear();captureChain=null;undoStack.clear();
        b.boardView.setLastMove(null,null);b.boardView.clearSelection();
        myTurn="local".equals(gameMode)||myColor==1;
        updC();updT();b.boardView.refresh();updNames();
    }
    @Override public void onCellTapped(int row,int col){
        if(!engine.gameActive)return;
        if("online".equals(gameMode)&&!myTurn){toast(getString(R.string.not_your_turn));return;}
        int player=engine.currentPlayer,piece=engine.board[row][col];
        boolean isMe=(player==1&&(piece==GameEngine.P1||piece==GameEngine.P1K))||(player==2&&(piece==GameEngine.P2||piece==GameEngine.P2K));
        if(captureChain!=null){GameEngine.Move vm=getVM(row,col);if(vm!=null){exec(vm,true);}return;}
        if(selected!=null){GameEngine.Move vm=getVM(row,col);if(vm!=null){exec(vm,true);return;}if(isMe){sel(row,col);return;}clearSel();return;}
        if(isMe){
            List<GameEngine.Move>all=engine.getAllMoves(engine.board,player);boolean hc=false;for(GameEngine.Move m:all)if(!m.captures.isEmpty()){hc=true;break;}
            List<GameEngine.Move>my=engine.getMoves(engine.board,row,col,player);
            if(hc){boolean mc=false;for(GameEngine.Move m:my)if(!m.captures.isEmpty()){mc=true;break;}if(!mc){toast(getString(R.string.forced_capture));sound.playError();return;}}
            sel(row,col);
        }
    }
    private void sel(int r,int c){selected=new int[]{r,c};validMoves=engine.getMoves(engine.board,r,c,engine.currentPlayer);b.boardView.setSelected(selected,validMoves);}
    private void clearSel(){selected=null;validMoves.clear();captureChain=null;b.boardView.clearSelection();}
    private GameEngine.Move getVM(int r,int c){for(GameEngine.Move m:validMoves)if(m.to[0]==r&&m.to[1]==c)return m;return null;}
    private void exec(GameEngine.Move move,boolean send){
        int mp=engine.board[move.from[0]][move.from[1]];
        undoStack.push(new GS(engine.board,engine.currentPlayer,engine.p1Count,engine.p2Count));
        b.boardView.animateMove(move.from[0],move.from[1],move.to[0],move.to[1],mp,()->{
            boolean kinged=engine.applyMoveToBoard(move);b.boardView.setLastMove(move.from,move.to);
            if(!move.captures.isEmpty())sound.playCapture();else sound.playMove();
            if(kinged){sound.playKing();toast(getString(R.string.king_promoted));}
            if("online".equals(gameMode)&&send){JsonObject msg=new JsonObject();msg.addProperty("type","move");msg.addProperty("fr",move.from[0]);msg.addProperty("fc",move.from[1]);msg.addProperty("tr",move.to[0]);msg.addProperty("tc",move.to[1]);snd(msg);}
            if(!move.captures.isEmpty()){int[]to=move.to;List<GameEngine.Move>chain=engine.getCaptures(engine.board,to[0],to[1],engine.currentPlayer);if(!chain.isEmpty()){captureChain=to;selected=to;validMoves=chain;b.boardView.setSelected(selected,validMoves);updC();b.boardView.refresh();return;}}
            captureChain=null;updC();int w=engine.checkWinner();if(w!=0){gameOver(w,"");return;}
            engine.currentPlayer=engine.currentPlayer==1?2:1;myTurn="local".equals(gameMode)||myColor==engine.currentPlayer;
            clearSel();updT();b.boardView.refresh();
            if("ai".equals(gameMode)&&engine.currentPlayer==2){b.boardView.setListener(null);new Handler().postDelayed(()->{b.boardView.setListener(GameActivity.this);GameEngine.Move ai=engine.getAIMove();if(ai!=null)exec(ai,false);},650);}
        });
    }
    private void snd(JsonObject msg){if(isHost&&lanServer!=null)lanServer.send(msg);else if(!isHost&&lanClient!=null)lanClient.send(msg);}
    @Override public void onClientConnected(){runOnUiThread(()->toast("Rakip baglandi!"));}
    @Override public void onClientDisconnected(){runOnUiThread(()->{toast(getString(R.string.opponent_left));engine.gameActive=false;});}
    @Override public void onMessage(String type,JsonObject data){
        if("move".equals(type)){
            int fr=data.get("fr").getAsInt(),fc=data.get("fc").getAsInt(),tr=data.get("tr").getAsInt(),tc=data.get("tc").getAsInt();
            List<GameEngine.Move>legal=engine.getAllMoves(engine.board,engine.currentPlayer);GameEngine.Move matched=null;
            for(GameEngine.Move lm:legal)if(lm.from[0]==fr&&lm.from[1]==fc&&lm.to[0]==tr&&lm.to[1]==tc){matched=lm;break;}
            if(matched!=null){exec(matched,false);myTurn=true;}
        }else if("chat".equals(type)){
            String sndr=data.has("name")?data.get("name").getAsString():oppName,msg=data.get("msg").getAsString();
            chatMsgs.add(new CM(sndr,msg,0xFF88BBFF));if(chatAdapter!=null)chatAdapter.notifyItemInserted(chatMsgs.size()-1);
        }
    }
    private void undo(){if(undoStack.isEmpty()){toast("Geri alinacak hamle yok");return;}if("online".equals(gameMode)){toast("Online modda geri alma yapılamaz");return;}GS st=undoStack.pop();engine.board=st.board;engine.currentPlayer=st.player;engine.p1Count=st.p1Count;engine.p2Count=st.p2Count;clearSel();updC();updT();b.boardView.setLastMove(null,null);b.boardView.refresh();toast("Hamle geri alindi");}
    private void resign(){if(!engine.gameActive)return;new AlertDialog.Builder(this).setTitle(getString(R.string.resign)).setMessage(getString(R.string.resign_confirm)).setPositiveButton(getString(R.string.yes),(d,w)->gameOver(engine.currentPlayer==1?2:1,"resign")).setNegativeButton(getString(R.string.no),null).show();}
    private void gameOver(int w,String r){engine.gameActive=false;sound.playWin();String nm=w==1?b.tvP1Name.getText().toString():b.tvP2Name.getText().toString();String msg=nm+" "+getString(R.string.wins);if("resign".equals(r))msg+="\n(Teslim olundu)";new AlertDialog.Builder(this).setTitle(getString(R.string.game_over)).setMessage(msg).setPositiveButton(getString(R.string.play_again),(d,ww)->newGame()).setNegativeButton(getString(R.string.main_menu),(d,ww)->finish()).setCancelable(false).show();}
    private void updNames(){String pn=prefs.getPlayerName();if("ai".equals(gameMode)){b.tvP1Name.setText(pn.isEmpty()?"Sen":pn);b.tvP2Name.setText("Bilgisayar");}else if("local".equals(gameMode)){b.tvP1Name.setText("Siyah");b.tvP2Name.setText("Beyaz");}else{b.tvP1Name.setText(isHost?(pn.isEmpty()?"Sen":pn):oppName);b.tvP2Name.setText(isHost?oppName:(pn.isEmpty()?"Sen":pn));}}
    private void updC(){b.tvP1Count.setText(engine.p1Count+" "+getString(R.string.pieces));b.tvP2Count.setText(engine.p2Count+" "+getString(R.string.pieces));}
    private void updT(){b.tvTurnInfo.setText(engine.currentPlayer==1?"Siyah oynar":"Beyaz oynar");}
    private void chat(){Dialog d=new Dialog(this);d.setContentView(R.layout.dialog_chat);d.getWindow().setLayout(android.view.ViewGroup.LayoutParams.MATCH_PARENT,android.view.ViewGroup.LayoutParams.WRAP_CONTENT);RecyclerView rv=d.findViewById(R.id.rvChat);chatAdapter=new ChatAdapter(chatMsgs);rv.setLayoutManager(new LinearLayoutManager(this));rv.setAdapter(chatAdapter);android.widget.EditText et=d.findViewById(R.id.etChatInput);d.findViewById(R.id.btnSendChat).setOnClickListener(v->{String msg=et.getText().toString().trim();if(msg.isEmpty())return;chatMsgs.add(new CM(prefs.getPlayerName(),msg,0xFFFF8899));chatAdapter.notifyItemInserted(chatMsgs.size()-1);rv.scrollToPosition(chatMsgs.size()-1);et.setText("");if("online".equals(gameMode)){JsonObject obj=new JsonObject();obj.addProperty("type","chat");obj.addProperty("msg",msg);obj.addProperty("name",prefs.getPlayerName());snd(obj);}});d.show();}
    private void toast(String msg){Toast.makeText(this,msg,Toast.LENGTH_SHORT).show();}
    @Override protected void onDestroy(){super.onDestroy();if(lanServer!=null)lanServer.stop();if(lanClient!=null)lanClient.disconnect();sound.release();}
}

          package com.damax.game;
          import android.app.AlertDialog;import android.os.*;
          import android.widget.Toast;import androidx.appcompat.app.AppCompatActivity;
          import com.damax.game.databinding.ActivityGameBinding;
          import com.google.gson.JsonObject;
          import java.util.*;import java.util.Stack;
          public class GameActivity extends AppCompatActivity implements BoardView.Listener,WsClient.CB {
              private ActivityGameBinding b;
              private GameEngine eng;private SoundManager snd;private Prefs prefs;
              private String mode;private int myColor=1;private boolean myTurn=true;
              private String room="";
              private int[]sel=null;private List<GameEngine.Move>valid=new ArrayList<>();
              private int[]captureChain=null;
              private Stack<int[][]>undoB=new Stack<>();private Stack<int[]>undoC=new Stack<>();
              private CountDownTimer tmr;private int tmrSec=0;private WsClient ws;

              @Override protected void onCreate(Bundle s){
                  super.onCreate(s);b=ActivityGameBinding.inflate(getLayoutInflater());
                  setContentView(b.getRoot());prefs=new Prefs(this);snd=new SoundManager(this);
                  eng=new GameEngine();eng.aiLevel=prefs.level();
                  mode=getIntent().getStringExtra("mode");if(mode==null)mode="ai";
                  b.boardView.setEngine(eng);b.boardView.setListener(this);
                  b.btnUndo.setOnClickListener(v->undo());
                  b.btnNewGame.setOnClickListener(v->newGame());
                  b.btnMenu.setOnClickListener(v->finish());
                  if("online".equals(mode)){ws=new WsClient(this);
                      ws.connect(getIntent().getStringExtra("ip")!=null?
                          getIntent().getStringExtra("ip"):prefs.ip(),3000);}
                  names();newGame();
              }

              private void newGame(){
                  eng.init();sel=null;valid.clear();captureChain=null;
                  undoB.clear();undoC.clear();
                  b.boardView.setLast(null,null);b.boardView.clearSel();
                  myTurn=!"online".equals(mode)||myColor==1;
                  stopTmr();tmrSec=prefs.timer();
                  if(tmrSec>0)startTmr(tmrSec);else b.tvTimer.setText("inf");
                  ui();b.boardView.refresh();
                  if("ai".equals(mode)&&eng.turn==2)ai();
              }

              @Override public void onTap(int r,int c){
                  if(!eng.active)return;
                  if("online".equals(mode)&&!myTurn){toast("Sira sende degil");return;}
                  int pl=eng.turn,pc=eng.board[r][c];
                  boolean mine=(pl==1&&(pc==GameEngine.P1||pc==GameEngine.P1K))||
                               (pl==2&&(pc==GameEngine.P2||pc==GameEngine.P2K));
                  if(captureChain!=null){
                      GameEngine.Move vm=vAt(r,c);if(vm!=null){doMove(vm);return;}return;}
                  if(sel!=null){
                      GameEngine.Move vm=vAt(r,c);if(vm!=null){doMove(vm);return;}
                      if(mine){pick(r,c);return;}clearSel();return;
                  }
                  if(mine){
                      List<GameEngine.Move>all=eng.allMoves(eng.board,pl);
                      boolean forced=false;for(GameEngine.Move m:all)if(!m.caps.isEmpty()){forced=true;break;}
                      List<GameEngine.Move>my=eng.moves(eng.board,r,c,pl);
                      boolean myCap=false;for(GameEngine.Move m:my)if(!m.caps.isEmpty()){myCap=true;break;}
                      if(forced&&!myCap){snd.error();toast("Zorunlu yeme var!");return;}
                      pick(r,c);
                  }
              }

              private void pick(int r,int c){
                  sel=new int[]{r,c};valid=eng.moves(eng.board,r,c,eng.turn);
                  b.boardView.select(sel,valid);}
              private void clearSel(){sel=null;valid.clear();captureChain=null;b.boardView.clearSel();}
              private GameEngine.Move vAt(int r,int c){
                  for(GameEngine.Move m:valid)if(m.to[0]==r&&m.to[1]==c)return m;return null;}

              private void doMove(GameEngine.Move mv){
                  int[][]cp=new int[8][8];for(int i=0;i<8;i++)System.arraycopy(eng.board[i],0,cp[i],0,8);
                  undoB.push(cp);undoC.push(new int[]{eng.p1count,eng.p2count,eng.turn});
                  boolean king=eng.doMove(mv);
                  b.boardView.setLast(mv.from,mv.to);
                  if(!mv.caps.isEmpty())snd.capture();else snd.move();
                  if(king){snd.king();toast("Dame!");}
                  if("online".equals(mode)&&ws!=null){
                      JsonObject o=new JsonObject();o.addProperty("type","move");o.addProperty("room",room);
                      JsonObject m=new JsonObject();m.addProperty("fr",mv.from[0]);m.addProperty("fc",mv.from[1]);
                      m.addProperty("tr",mv.to[0]);m.addProperty("tc",mv.to[1]);o.add("move",m);ws.send(o);}
                  if(!mv.caps.isEmpty()){
                      int[]t=mv.to;List<GameEngine.Move>chain=eng.captures(eng.board,t[0],t[1],eng.turn);
                      if(!chain.isEmpty()){captureChain=t;sel=t;valid=chain;
                          b.boardView.select(sel,valid);ui();b.boardView.refresh();return;}}
                  captureChain=null;ui();
                  int w=eng.winner();if(w!=0){over(w);return;}
                  eng.turn=eng.turn==1?2:1;myTurn="local".equals(mode)||myColor==eng.turn;
                  clearSel();ui();resetTmr();b.boardView.refresh();
                  if("ai".equals(mode)&&eng.turn==2)new Handler().postDelayed(this::ai,650);
              }

              private void ai(){
                  if(!eng.active||eng.turn!=2)return;
                  GameEngine.Move m=eng.aiMove();if(m!=null)doMove(m);else over(1);}

              private void undo(){
                  if(undoB.isEmpty()){toast("Geri alinacak hamle yok");return;}
                  if("online".equals(mode)){toast("Online modda geri alma yok");return;}
                  eng.board=undoB.pop();int[]c=undoC.pop();
                  eng.p1count=c[0];eng.p2count=c[1];eng.turn=c[2];eng.active=true;captureChain=null;
                  b.boardView.setLast(null,null);clearSel();ui();b.boardView.refresh();}

              private void over(int w){
                  eng.active=false;stopTmr();snd.win();
                  new AlertDialog.Builder(this)
                      .setTitle("Oyun Bitti")
                      .setMessage(w==1?"Koyu taraf kazandi!":"Acik taraf kazandi!")
                      .setPositiveButton("Tekrar",(_,__)-> newGame())
                      .setNegativeButton("Menu",(_,__)->finish())
                      .setCancelable(false).show();}

              private void names(){
                  if("ai".equals(mode)){b.tvP1Name.setText("Sen");b.tvP2Name.setText("Bilgisayar");}
                  else{b.tvP1Name.setText("Oyuncu 1");b.tvP2Name.setText("Oyuncu 2");}}

              private void ui(){
                  b.tvP1Count.setText(eng.p1count+" tas");b.tvP2Count.setText(eng.p2count+" tas");
                  String t="local".equals(mode)||myTurn?"Senin Siran":
                      "ai".equals(mode)&&eng.turn==2?"Bilgisayar...":"Rakip...";
                  b.tvTurn.setText(t);
                  b.tvP1Name.setAlpha(eng.turn==1?1f:0.5f);b.tvP2Name.setAlpha(eng.turn==2?1f:0.5f);}

              private void startTmr(int sec){
                  tmr=new CountDownTimer(sec*1000L,1000){
                      public void onTick(long ms){int s=(int)(ms/1000);
                          b.tvTimer.setText(s>60?(s/60)+":"+(s%60<10?"0":"")+s%60:String.valueOf(s));
                          if(s<=5)snd.tick();}
                      public void onFinish(){over(eng.turn==1?2:1);}}.start();}
              private void resetTmr(){stopTmr();if(tmrSec>0)startTmr(tmrSec);}
              private void stopTmr(){if(tmr!=null){tmr.cancel();tmr=null;}}

              @Override public void ok(){toast("Baglandi");}
              @Override public void fail(){toast("Baglanamadi");}
              @Override public void msg(String t,JsonObject d){
                  switch(t){
                      case "gameStart":myColor=d.get("yourColor").getAsInt();myTurn=myColor==1;
                          room=d.has("room")?d.get("room").getAsString():"";
                          b.tvP1Name.setText(d.get("p1name").getAsString());
                          b.tvP2Name.setText(d.get("p2name").getAsString());newGame();break;
                      case "move":JsonObject mv=d.getAsJsonObject("move");
                          doMove(new GameEngine.Move(
                              new int[]{mv.get("fr").getAsInt(),mv.get("fc").getAsInt()},
                              new int[]{mv.get("tr").getAsInt(),mv.get("tc").getAsInt()},
                              new ArrayList<>()));break;
                      case "opponentLeft":toast("Rakip ayrildi!");break;}}

              private void toast(String s){Toast.makeText(this,s,Toast.LENGTH_SHORT).show();}
              @Override protected void onDestroy(){super.onDestroy();stopTmr();if(ws!=null)ws.close();}
          }

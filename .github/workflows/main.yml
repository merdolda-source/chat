          package com.damax.game;
          import android.content.Intent;import android.os.Bundle;
          import android.widget.*;import androidx.appcompat.app.AppCompatActivity;
          import com.damax.game.databinding.ActivityOnlineBinding;
          import com.google.gson.*;
          public class OnlineActivity extends AppCompatActivity implements WsClient.CB {
              private ActivityOnlineBinding b;private WsClient ws;private Prefs prefs;
              @Override protected void onCreate(Bundle s){
                  super.onCreate(s);b=ActivityOnlineBinding.inflate(getLayoutInflater());
                  setContentView(b.getRoot());prefs=new Prefs(this);
                  b.etIP.setText(prefs.ip());b.etName.setText(prefs.name());
                  b.btnConnect.setOnClickListener(v->conn());
                  b.btnCreate.setOnClickListener(v->create());
                  b.btnJoin.setOnClickListener(v->join());
                  b.btnSend.setOnClickListener(v->chat());
              }
              private void conn(){
                  String ip=b.etIP.getText().toString().trim();
                  String nm=b.etName.getText().toString().trim();
                  if(ip.isEmpty()||nm.isEmpty()){t("IP ve ad girin");return;}
                  prefs.ip(ip);prefs.name(nm);b.tvStatus.setText("Baglaniliyor...");
                  if(ws!=null)ws.close();ws=new WsClient(this);ws.connect(ip,3000);}
              private void create(){
                  if(ws==null||!ws.connected()){t("Once baglanin");return;}
                  JsonObject o=new JsonObject();o.addProperty("type","createRoom");
                  o.addProperty("name",prefs.name());ws.send(o);}
              private void join(){
                  if(ws==null||!ws.connected()){t("Once baglanin");return;}
                  String code=b.etCode.getText().toString().trim().toUpperCase();
                  if(code.isEmpty()){t("Oda kodu girin");return;}
                  JsonObject o=new JsonObject();o.addProperty("type","joinRoom");
                  o.addProperty("code",code);o.addProperty("name",prefs.name());ws.send(o);}
              private void chat(){
                  String msg=b.etChat.getText().toString().trim();if(msg.isEmpty())return;
                  addChat("Sen",msg);b.etChat.setText("");
                  if(ws!=null&&ws.connected()){JsonObject o=new JsonObject();
                      o.addProperty("type","chat");o.addProperty("msg",msg);
                      o.addProperty("name",prefs.name());ws.send(o);}}
              private void addChat(String who,String msg){
                  TextView tv=new TextView(this);tv.setText(who+": "+msg);
                  tv.setTextColor(0xFFFFE4B5);tv.setTextSize(12);tv.setPadding(4,2,4,2);
                  b.chatContainer.addView(tv);
                  b.scrollChat.post(()->b.scrollChat.fullScroll(android.view.View.FOCUS_DOWN));}
              @Override public void ok(){b.tvStatus.setText("Baglandi");}
              @Override public void fail(){b.tvStatus.setText("Baglanamadi");}
              @Override public void msg(String tp,JsonObject d){
                  switch(tp){
                      case "roomCreated":String c=d.get("code").getAsString();
                          b.tvStatus.setText("Oda: "+c+" — Rakip bekleniyor");
                          addChat("Sistem","Oda: "+c);break;
                      case "gameStart":Intent i=new Intent(this,GameActivity.class);
                          i.putExtra("mode","online");i.putExtra("ip",prefs.ip());startActivity(i);break;
                      case "chat":addChat(d.get("name").getAsString(),d.get("msg").getAsString());break;
                      case "error":t(d.get("msg").getAsString());break;}}
              private void t(String s){Toast.makeText(this,s,Toast.LENGTH_SHORT).show();}
              @Override protected void onDestroy(){super.onDestroy();if(ws!=null)ws.close();}
          }

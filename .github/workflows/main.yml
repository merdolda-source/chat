      - name: Generate launcher icons
        run: |
          python3 << 'ENDOFFILE'
import struct, zlib, os

def make_png(size, r, g, b):
    def chunk(name, data):
        c = zlib.crc32(name + data) & 0xffffffff
        return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
    raw = b''
    for _ in range(size):
        row = b'\x00'
        for _ in range(size):
            row += bytes([r, g, b, 255])
        raw += row
    idat = zlib.compress(raw)
    png = b'\x89PNG\r\n\x1a\n'
    png += chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
    png += chunk(b'IDAT', idat)
    png += chunk(b'IEND', b'')
    return png

sizes = {'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
for d, s in sizes.items():
    path = f'app/src/main/res/{d}'
    os.makedirs(path, exist_ok=True)
    data = make_png(s, 0xD4, 0xA8, 0x43)
    open(f'{path}/ic_launcher.png','wb').write(data)
    open(f'{path}/ic_launcher_round.png','wb').write(data)

anydpi = 'app/src/main/res/mipmap-anydpi-v26'
os.makedirs(anydpi, exist_ok=True)
xml = '<?xml version="1.0" encoding="utf-8"?>\n<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">\n    <background android:drawable="@drawable/ic_launcher_background"/>\n    <foreground android:drawable="@drawable/ic_launcher_background"/>\n</adaptive-icon>'
open(f'{anydpi}/ic_launcher.xml','w').write(xml)
open(f'{anydpi}/ic_launcher_round.xml','w').write(xml)
print("Icons OK")
ENDOFFILE


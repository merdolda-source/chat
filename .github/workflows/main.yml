      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Collect APK
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk -name "*.apk" -exec cp {} artifacts/KlasikDama-v2.0.0-debug.apk \;
          ls -lh artifacts/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KlasikDama-APK-${{ github.run_number }}
          path: artifacts/KlasikDama-v2.0.0-debug.apk
          retention-days: 90

      - name: Summary
        run: |
          echo "## Klasik Dama APK Hazir!" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -h artifacts/KlasikDama-v2.0.0-debug.apk 2>/dev/null | cut -f1 || echo "?")
          echo "APK boyutu: $APK_SIZE" >> $GITHUB_STEP_SUMMARY

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: KlasikDama-APK-${{ github.run_number }}
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          name: "Klasik Dama ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

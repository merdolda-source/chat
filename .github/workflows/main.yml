          package com.damax.game;

          import android.content.Context;
          import android.media.AudioAttributes;
          import android.media.SoundPool;
          import android.os.VibrationEffect;
          import android.os.Vibrator;

          public class SoundManager {
              private SoundPool soundPool;
              private Vibrator vibrator;
              private boolean soundEnabled = true;
              private boolean vibrationEnabled = true;

              // Tone IDs
              private int[] toneIds = new int[5];

              public SoundManager(Context context) {
                  AudioAttributes attrs = new AudioAttributes.Builder()
                      .setUsage(AudioAttributes.USAGE_GAME)
                      .setContentType(AudioAttributes.CONTENT_TYPE_SONIFICATION)
                      .build();
                  soundPool = new SoundPool.Builder().setMaxStreams(4).setAudioAttributes(attrs).build();
                  vibrator = (Vibrator) context.getSystemService(Context.VIBRATOR_SERVICE);
              }

              public void playMove() { vibrate(30); }
              public void playCapture() { vibrate(60); }
              public void playKing() { vibrate(new long[]{0,40,40,80}); }
              public void playWin() { vibrate(new long[]{0,80,60,120,60,200}); }
              public void playTick() { vibrate(15); }
              public void playError() { vibrate(new long[]{0,50,30,50}); }

              private void vibrate(long ms) {
                  if (!vibrationEnabled || vibrator == null || !vibrator.hasVibrator()) return;
                  vibrator.vibrate(VibrationEffect.createOneShot(ms, VibrationEffect.DEFAULT_AMPLITUDE));
              }

              private void vibrate(long[] pattern) {
                  if (!vibrationEnabled || vibrator == null || !vibrator.hasVibrator()) return;
                  vibrator.vibrate(VibrationEffect.createWaveform(pattern, -1));
              }

              public void setSoundEnabled(boolean e) { soundEnabled = e; }
              public void setVibrationEnabled(boolean e) { vibrationEnabled = e; }
              public void release() { soundPool.release(); }
          }

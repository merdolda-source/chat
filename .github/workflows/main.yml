          package com.dama.game;

          import android.content.Context;
          import android.os.VibrationEffect;
          import android.os.Vibrator;

          public class SoundManager {
              private Vibrator vibrator;
              private boolean vibrationEnabled = true;

              public SoundManager(Context ctx) {
                  vibrator = (Vibrator) ctx.getSystemService(Context.VIBRATOR_SERVICE);
              }

              public void playMove()    { vibrate(25); }
              public void playCapture() { vibrate(55); }
              public void playKing()    { vibrate(new long[]{0,40,40,80}); }
              public void playWin()     { vibrate(new long[]{0,80,60,120,60,200}); }
              public void playError()   { vibrate(new long[]{0,40,30,40}); }

              private void vibrate(long ms) {
                  if (!vibrationEnabled || vibrator == null || !vibrator.hasVibrator()) return;
                  vibrator.vibrate(VibrationEffect.createOneShot(ms, VibrationEffect.DEFAULT_AMPLITUDE));
              }
              private void vibrate(long[] pattern) {
                  if (!vibrationEnabled || vibrator == null || !vibrator.hasVibrator()) return;
                  vibrator.vibrate(VibrationEffect.createWaveform(pattern, -1));
              }
              public void setVibrationEnabled(boolean e) { vibrationEnabled = e; }
              public void release() {}
          }

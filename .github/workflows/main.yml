          cat > app/src/main/java/com/damax/game/WebSocketManager.java << 'WSM_EOF'
          package com.damax.game;
          import android.os.Handler;
          import android.os.Looper;
          import com.google.gson.Gson;
          import com.google.gson.JsonObject;
          import com.google.gson.JsonParser;
          import okhttp3.*;
          import java.util.concurrent.TimeUnit;
          public class WebSocketManager {
              private OkHttpClient client;
              private WebSocket webSocket;
              private Gson gson = new Gson();
              private Handler mainHandler = new Handler(Looper.getMainLooper());
              private WSListener listener;
              private boolean connected = false;
              public interface WSListener {
                  void onConnected();
                  void onDisconnected();
                  void onMessage(String type, JsonObject data);
                  void onError(String error);
              }
              public WebSocketManager(WSListener listener) {
                  this.listener = listener;
                  client = new OkHttpClient.Builder().connectTimeout(10, TimeUnit.SECONDS)
                      .readTimeout(30, TimeUnit.SECONDS).pingInterval(20, TimeUnit.SECONDS).build();
              }
              public void connect(String ip, int port) {
                  String url = "ws://" + ip + ":" + port + "/ws";
                  Request request = new Request.Builder().url(url).build();
                  webSocket = client.newWebSocket(request, new WebSocketListener() {
                      @Override public void onOpen(WebSocket ws, Response response) {
                          connected = true; mainHandler.post(() -> listener.onConnected());
                      }
                      @Override public void onMessage(WebSocket ws, String text) {
                          try {
                              JsonObject obj = JsonParser.parseString(text).getAsJsonObject();
                              String type = obj.get("type").getAsString();
                              mainHandler.post(() -> listener.onMessage(type, obj));
                          } catch (Exception e) {
                              mainHandler.post(() -> listener.onError("Parse error"));
                          }
                      }
                      @Override public void onClosed(WebSocket ws, int code, String reason) {
                          connected = false; mainHandler.post(() -> listener.onDisconnected());
                      }
                      @Override public void onFailure(WebSocket ws, Throwable t, Response response) {
                          connected = false; mainHandler.post(() -> listener.onError(t.getMessage()));
                      }
                  });
              }
              public void send(JsonObject obj) { if (webSocket != null && connected) webSocket.send(gson.toJson(obj)); }
              public void sendType(String type) { JsonObject obj = new JsonObject(); obj.addProperty("type", type); send(obj); }
              public void disconnect() { if (webSocket != null) webSocket.close(1000, "Bye"); connected = false; }
              public boolean isConnected() { return connected; }
          }
          WSM_EOF

          cat > app/src/main/java/com/damax/game/SoundManager.java << 'SOUND_EOF'
          package com.damax.game;
          import android.content.Context;
          import android.media.AudioAttributes;
          import android.media.SoundPool;
          import android.os.VibrationEffect;
          import android.os.Vibrator;
          public class SoundManager {
              private SoundPool soundPool;
              private Vibrator vibrator;
              private boolean soundEnabled = true;
              private boolean vibrationEnabled = true;
              public SoundManager(Context context) {
                  AudioAttributes attrs = new AudioAttributes.Builder().setUsage(AudioAttributes.USAGE_GAME).build();
                  soundPool = new SoundPool.Builder().setMaxStreams(4).setAudioAttributes(attrs).build();
                  vibrator = (Vibrator) context.getSystemService(Context.VIBRATOR_SERVICE);
              }
              public void playMove() { vibrate(30); }
              public void playCapture() { vibrate(60); }
              public void playKing() { vibrate(new long[]{0,40,40,80}); }
              public void playWin() { vibrate(new long[]{0,80,60,120,60,200}); }
              public void playError() { vibrate(new long[]{0,50,30,50}); }
              private void vibrate(long ms) {
                  if (!vibrationEnabled || vibrator == null || !vibrator.hasVibrator()) return;
                  vibrator.vibrate(VibrationEffect.createOneShot(ms, VibrationEffect.DEFAULT_AMPLITUDE));
              }
              private void vibrate(long[] pattern) {
                  if (!vibrationEnabled || vibrator == null || !vibrator.hasVibrator()) return;
                  vibrator.vibrate(VibrationEffect.createWaveform(pattern, -1));
              }
              public void setVibrationEnabled(boolean e) { vibrationEnabled = e; }
              public void release() { soundPool.release(); }
          }

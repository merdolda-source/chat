          package com.dama.game;

          import android.os.Handler;
          import android.os.Looper;
          import com.google.gson.Gson;
          import com.google.gson.JsonObject;
          import com.google.gson.JsonParser;
          import java.io.*;
          import java.net.*;

          /**
           * Yerel WiFi sunucusu - host olan telefon bu sunucuyu çalıştırır.
           * Client (misafir) LanClient ile bağlanır.
           */
          public class LanServer {
              private ServerSocket serverSocket;
              private Socket clientSocket;
              private PrintWriter out;
              private boolean running = false;
              private Handler handler = new Handler(Looper.getMainLooper());
              private Gson gson = new Gson();
              private LanListener listener;

              public interface LanListener {
                  void onClientConnected();
                  void onMessage(String type, JsonObject data);
                  void onClientDisconnected();
              }

              public LanServer(LanListener l) { listener = l; }

              public void start(int port) {
                  running = true;
                  new Thread(() -> {
                      try {
                          serverSocket = new ServerSocket(port);
                          clientSocket = serverSocket.accept(); // rakip bağlanana kadar bekle
                          out = new PrintWriter(new BufferedWriter(new OutputStreamWriter(clientSocket.getOutputStream())), true);
                          handler.post(() -> listener.onClientConnected());
                          BufferedReader in = new BufferedReader(new InputStreamReader(clientSocket.getInputStream()));
                          String line;
                          while (running && (line = in.readLine()) != null) {
                              final String msg = line;
                              try {
                                  JsonObject obj = JsonParser.parseString(msg).getAsJsonObject();
                                  String type = obj.get("type").getAsString();
                                  handler.post(() -> listener.onMessage(type, obj));
                              } catch (Exception ignored) {}
                          }
                      } catch (Exception e) {
                          if (running) handler.post(() -> listener.onClientDisconnected());
                      }
                  }).start();
              }

              public void send(JsonObject msg) {
                  if (out != null) {
                      new Thread(() -> out.println(gson.toJson(msg))).start();
                  }
              }

              public void stop() {
                  running = false;
                  try { if (clientSocket != null) clientSocket.close(); } catch (Exception ignored) {}
                  try { if (serverSocket != null) serverSocket.close(); } catch (Exception ignored) {}
              }
          }
          SERVER_EOF


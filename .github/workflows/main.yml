  # ── Release (tag push'ta) ──────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Dama-Ahsap-APK-${{ github.run_number }}
          path: out/
      - uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
          name: "Dama Ahsap ${{ github.ref_name }}"
          body: |
            ## 🎮 Gercekci Ahsap Dama ${{ github.ref_name }}
            Indir, kur, oyna!
            - Gercekci ahsap tahta (karanlik/acik hucre doku efekti)
            - 3D konsantrik halka taslar (resimde goruldugu gibi)
            - Koyu (kahverengi) vs Acik (krem/altin)
            - AI / 2 Oyuncu / Online modlar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


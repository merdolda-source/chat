package com.dama.game;
import android.os.Handler;import android.os.Looper;
import com.google.gson.Gson;import com.google.gson.JsonObject;import com.google.gson.JsonParser;
import java.io.*;import java.net.*;
public class LanClient {
    private Socket socket;private PrintWriter out;private boolean running=false;
    private Handler h=new Handler(Looper.getMainLooper());private Gson gson=new Gson();
    private LanServer.LanListener listener;
    public LanClient(LanServer.LanListener l){listener=l;}
    public void connect(String host,int port){running=true;new Thread(()->{
        try{socket=new Socket(host,port);
            out=new PrintWriter(new BufferedWriter(new OutputStreamWriter(socket.getOutputStream())),true);
            h.post(()->listener.onClientConnected());
            BufferedReader in=new BufferedReader(new InputStreamReader(socket.getInputStream()));
            String line;while(running&&(line=in.readLine())!=null){
                final String msg=line;try{JsonObject obj=JsonParser.parseString(msg).getAsJsonObject();String type=obj.get("type").getAsString();h.post(()->listener.onMessage(type,obj));}catch(Exception ignored){}
            }
        }catch(Exception e){if(running)h.post(()->listener.onClientDisconnected());}
    }).start();}
    public void send(JsonObject msg){if(out!=null)new Thread(()->out.println(gson.toJson(msg))).start();}
    public void disconnect(){running=false;try{if(socket!=null)socket.close();}catch(Exception ignored){}}
}

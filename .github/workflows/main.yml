name: "DAMA — Gercekci Ahsap Build APK"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ═══════════════════════════════════════════════════════════
      # ADIM 1 — TUM PROJE DOSYALARINI OLUSTUR (EOF sistemi)
      # ═══════════════════════════════════════════════════════════
      - name: Create full Android project
        run: |
          mkdir -p app/src/main/java/com/damax/game
          mkdir -p app/src/main/res/{layout,values,drawable}
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/{mipmap-hdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi}
          mkdir -p gradle/wrapper

          # settings.gradle
          cat > settings.gradle << 'SEOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "DamaOyunu"
          include ':app'
          SEOF

          # root build.gradle
          cat > build.gradle << 'RGEOF'
          plugins { id 'com.android.application' version '8.2.2' apply false }
          RGEOF

          # gradle.properties
          cat > gradle.properties << 'GPEOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          GPEOF

          # gradle wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'WEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          networkTimeout=10000
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          WEOF

          # app/build.gradle
          cat > app/build.gradle << 'AGEOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.damax.game'
              compileSdk 34
              defaultConfig {
                  applicationId "com.damax.game"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release { minifyEnabled false }
                  debug   { debuggable true }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              buildFeatures { viewBinding true }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'com.google.code.gson:gson:2.10.1'
          }
          AGEOF

          echo "-keep class com.damax.game.** { *; }" > app/proguard-rules.pro

          # AndroidManifest
          cat > app/src/main/AndroidManifest.xml << 'MEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:hardwareAccelerated="true"
                  android:theme="@style/Theme.Dama">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".GameActivity" android:exported="false"
                      android:screenOrientation="portrait"/>
                  <activity android:name=".OnlineActivity" android:exported="false"
                      android:screenOrientation="portrait"
                      android:windowSoftInputMode="adjustResize"/>
              </application>
          </manifest>
          MEOF

          # strings.xml
          cat > app/src/main/res/values/strings.xml << 'STREOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Dama</string>
              <string name="vs_ai">Bilgisayara Karsi</string>
              <string name="vs_local">2 Oyuncu</string>
              <string name="online">Online Oyna</string>
              <string name="undo">Geri Al</string>
              <string name="new_game">Yeni Oyun</string>
              <string name="menu">Menu</string>
              <string name="connect">Baglan</string>
              <string name="create_room">Oda Olustur</string>
              <string name="join_room">Odaya Katil</string>
              <string name="server_hint">Sunucu IP (ornek: 192.168.1.5)</string>
              <string name="room_code_hint">Oda Kodu</string>
              <string name="name_hint">Adiniz</string>
              <string name="send">Gonder</string>
              <string name="chat_hint">Mesaj...</string>
          </resources>
          STREOF

          # colors.xml
          cat > app/src/main/res/values/colors.xml << 'CEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="wood_border">#6B2F0A</color>
              <color name="cell_dark">#C68642</color>
              <color name="cell_light">#F5DEB3</color>
              <color name="piece_dark_top">#8B3A1A</color>
              <color name="piece_light_top">#E8C870</color>
              <color name="ui_bg">#3D1C08</color>
              <color name="ui_panel">#5C2E0E</color>
              <color name="ui_text">#FFE4B5</color>
              <color name="ui_text_dim">#C8A060</color>
              <color name="ui_gold">#DAA520</color>
              <color name="ui_bg_int">#3D1C08</color>
              <color name="colorPrimary">#8B4513</color>
              <color name="colorPrimaryDark">#3D1C08</color>
              <color name="colorAccent">#DAA520</color>
          </resources>
          CEOF

          # themes.xml
          cat > app/src/main/res/values/themes.xml << 'TEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.Dama" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryVariant">@color/wood_border</item>
                  <item name="colorOnPrimary">@color/ui_text</item>
                  <item name="colorSecondary">@color/ui_gold</item>
                  <item name="android:colorBackground">@color/ui_bg</item>
                  <item name="android:statusBarColor">@color/wood_border</item>
                  <item name="android:navigationBarColor">@color/wood_border</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:textColor">@color/ui_text</item>
              </style>
          </resources>
          TEOF

          # drawables
          cat > app/src/main/res/drawable/bg_panel.xml << 'D1EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:startColor="#6B2F0A" android:endColor="#4A1F06" android:angle="135"/>
              <stroke android:width="1dp" android:color="#DAA52044"/>
              <corners android:radius="10dp"/>
          </shape>
          D1EOF

          cat > app/src/main/res/drawable/bg_btn.xml << 'D2EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:startColor="#8B4513" android:endColor="#6B2F0A" android:angle="180"/>
              <stroke android:width="1dp" android:color="#DAA520"/>
              <corners android:radius="8dp"/>
          </shape>
          D2EOF

          cat > app/src/main/res/drawable/bg_btn_gold.xml << 'D3EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:startColor="#DAA520" android:endColor="#B8860B" android:angle="180"/>
              <stroke android:width="1dp" android:color="#FFD700"/>
              <corners android:radius="8dp"/>
          </shape>
          D3EOF

          cat > app/src/main/res/drawable/bg_input.xml << 'D4EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#2A1005"/>
              <stroke android:width="1dp" android:color="#8B4513"/>
              <corners android:radius="6dp"/>
          </shape>
          D4EOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'ICONF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#8B4513" android:pathData="M0,0h108v108H0z"/>
            <path android:fillColor="#C68642" android:pathData="M10,10h88v88H10z"/>
            <path android:fillColor="#F5DEB3" android:pathData="M10,10h22v22H10zM54,10h22v22H54zM32,32h22v22H32zM76,32h22v22H76zM10,54h22v22H10zM54,54h22v22H54zM32,76h22v22H32zM76,76h22v22H76z"/>
            <circle android:fillColor="#5C2008" cx="43" cy="32" r="14"/>
            <circle android:fillColor="#8B3A1A" cx="43" cy="30" r="11"/>
            <circle android:fillColor="#C0622A" cx="40" cy="27" r="5"/>
            <circle android:fillColor="#B8860B" cx="65" cy="76" r="14"/>
            <circle android:fillColor="#DAA520" cx="65" cy="74" r="11"/>
            <circle android:fillColor="#FFD700" cx="62" cy="71" r="5"/>
            <path android:fillColor="#6B2F0A" android:pathData="M10,10h88v3H10zM10,95h88v3H10zM10,10v88h3V10zM95,10v88h3V10z"/>
          </vector>
          ICONF

          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'ICONB'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#8B4513"/>
          </shape>
          ICONB

          # Adaptive icon — SADECE anydpi-v26 altinda
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'ADEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          ADEOF
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml \
             app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

          # PNG ikonlar — density klasorleri icin Python ile uret
          python3 << 'PYEOF'
          import struct, zlib, os
          def png(sz):
              rows=[]
              for y in range(sz):
                  row=[0]
                  for x in range(sz):
                      r,g,b,a=0x8B,0x45,0x13,255
                      brd=int(sz*0.08)
                      if x<brd or x>=sz-brd or y<brd or y>=sz-brd:
                          r,g,b=0x5C,0x20,0x08
                      cx1,cy1,cr=int(sz*0.33),int(sz*0.33),int(sz*0.17)
                      if (x-cx1)**2+(y-cy1)**2<cr**2: r,g,b=0x8B,0x3A,0x1A
                      if (x-cx1)**2+(y-cy1)**2<(cr//2)**2: r,g,b=0xC0,0x62,0x2A
                      cx2,cy2=int(sz*0.67),int(sz*0.67)
                      if (x-cx2)**2+(y-cy2)**2<cr**2: r,g,b=0xDA,0xA5,0x20
                      if (x-cx2)**2+(y-cy2)**2<(cr//2)**2: r,g,b=0xFF,0xD7,0x00
                      row+=[r,g,b,a]
                  rows.append(bytes(row))
              def chunk(t,d):
                  return struct.pack('>I',len(d))+t+d+struct.pack('>I',zlib.crc32(t+d)&0xffffffff)
              hdr=struct.pack('>IIBBBBB',sz,sz,8,2,0,0,0)
              return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',hdr)+chunk(b'IDAT',zlib.compress(b''.join(rows)))+chunk(b'IEND',b'')
          for folder,sz in [('mipmap-hdpi',48),('mipmap-xhdpi',72),('mipmap-xxhdpi',96),('mipmap-xxxhdpi',144)]:
              p=f'app/src/main/res/{folder}'
              os.makedirs(p,exist_ok=True)
              d=png(sz)
              open(f'{p}/ic_launcher.png','wb').write(d)
              open(f'{p}/ic_launcher_round.png','wb').write(d)
              print(f'{folder} {sz}px OK')
          PYEOF

          # Layouts
          cat > app/src/main/res/layout/activity_main.xml << 'LMEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:gravity="center"
              android:background="@color/ui_bg" android:padding="24dp">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="♟" android:textSize="56sp" android:textColor="@color/ui_gold"
                  android:layout_marginBottom="4dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="DAMA" android:textSize="36sp" android:textStyle="bold"
                  android:textColor="@color/ui_text" android:letterSpacing="0.18"
                  android:layout_marginBottom="2dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="Gercekci Ahsap Dama" android:textSize="13sp"
                  android:textColor="@color/ui_text_dim" android:layout_marginBottom="36dp"/>
              <LinearLayout android:layout_width="260dp" android:layout_height="wrap_content"
                  android:orientation="vertical" android:padding="18dp"
                  android:background="@drawable/bg_panel">
                  <Button android:id="@+id/btnVsAI"
                      android:layout_width="match_parent" android:layout_height="52dp"
                      android:text="@string/vs_ai" android:background="@drawable/bg_btn_gold"
                      android:textColor="@color/ui_bg" android:textStyle="bold"
                      android:textSize="14sp" android:layout_marginBottom="10dp"/>
                  <Button android:id="@+id/btnLocal"
                      android:layout_width="match_parent" android:layout_height="52dp"
                      android:text="@string/vs_local" android:background="@drawable/bg_btn"
                      android:textColor="@color/ui_text" android:textSize="13sp"
                      android:layout_marginBottom="10dp"/>
                  <Button android:id="@+id/btnOnline"
                      android:layout_width="match_parent" android:layout_height="52dp"
                      android:text="@string/online" android:background="@drawable/bg_btn"
                      android:textColor="@color/ui_text" android:textSize="13sp"/>
              </LinearLayout>
              <LinearLayout android:layout_width="260dp" android:layout_height="wrap_content"
                  android:orientation="horizontal" android:gravity="center"
                  android:layout_marginTop="14dp">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Zorluk: " android:textColor="@color/ui_text_dim"
                      android:textSize="13sp"/>
                  <Button android:id="@+id/btnEasy"
                      android:layout_width="0dp" android:layout_height="36dp"
                      android:layout_weight="1" android:text="Kolay"
                      android:background="@drawable/bg_btn"
                      android:textColor="@color/ui_text" android:textSize="11sp"
                      android:layout_marginStart="4dp"/>
                  <Button android:id="@+id/btnMed"
                      android:layout_width="0dp" android:layout_height="36dp"
                      android:layout_weight="1" android:text="Orta"
                      android:background="@drawable/bg_btn_gold"
                      android:textColor="@color/ui_bg" android:textSize="11sp"
                      android:layout_marginStart="4dp"/>
                  <Button android:id="@+id/btnHard"
                      android:layout_width="0dp" android:layout_height="36dp"
                      android:layout_weight="1" android:text="Zor"
                      android:background="@drawable/bg_btn"
                      android:textColor="@color/ui_text" android:textSize="11sp"
                      android:layout_marginStart="4dp"/>
              </LinearLayout>
          </LinearLayout>
          LMEOF

          cat > app/src/main/res/layout/activity_game.xml << 'LGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="@color/ui_bg">
              <LinearLayout android:layout_width="match_parent" android:layout_height="52dp"
                  android:orientation="horizontal" android:gravity="center_vertical"
                  android:paddingStart="12dp" android:paddingEnd="12dp"
                  android:background="@color/wood_border">
                  <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content"
                      android:layout_weight="1" android:orientation="horizontal"
                      android:gravity="center_vertical">
                      <View android:layout_width="18dp" android:layout_height="18dp"
                          android:background="@color/piece_dark_top" android:layout_marginEnd="6dp"/>
                      <LinearLayout android:layout_width="wrap_content"
                          android:layout_height="wrap_content" android:orientation="vertical">
                          <TextView android:id="@+id/tvP1Name"
                              android:layout_width="wrap_content" android:layout_height="wrap_content"
                              android:text="Koyu" android:textColor="@color/ui_text"
                              android:textSize="13sp" android:textStyle="bold"/>
                          <TextView android:id="@+id/tvP1Count"
                              android:layout_width="wrap_content" android:layout_height="wrap_content"
                              android:text="12 tas" android:textColor="@color/ui_text_dim"
                              android:textSize="10sp"/>
                      </LinearLayout>
                  </LinearLayout>
                  <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:orientation="vertical" android:gravity="center">
                      <TextView android:id="@+id/tvTimer"
                          android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="inf" android:textColor="@color/ui_gold"
                          android:textSize="20sp" android:textStyle="bold"
                          android:gravity="center" android:minWidth="50dp"/>
                      <TextView android:id="@+id/tvTurn"
                          android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="Senin Siran" android:textColor="@color/ui_text_dim"
                          android:textSize="9sp" android:gravity="center"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content"
                      android:layout_weight="1" android:orientation="horizontal"
                      android:gravity="center_vertical|end">
                      <LinearLayout android:layout_width="wrap_content"
                          android:layout_height="wrap_content" android:orientation="vertical"
                          android:gravity="end">
                          <TextView android:id="@+id/tvP2Name"
                              android:layout_width="wrap_content" android:layout_height="wrap_content"
                              android:text="Acik" android:textColor="@color/ui_text"
                              android:textSize="13sp" android:textStyle="bold"/>
                          <TextView android:id="@+id/tvP2Count"
                              android:layout_width="wrap_content" android:layout_height="wrap_content"
                              android:text="12 tas" android:textColor="@color/ui_text_dim"
                              android:textSize="10sp"/>
                      </LinearLayout>
                      <View android:layout_width="18dp" android:layout_height="18dp"
                          android:background="@color/piece_light_top" android:layout_marginStart="6dp"/>
                  </LinearLayout>
              </LinearLayout>
              <com.damax.game.BoardView
                  android:id="@+id/boardView"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1"/>
              <LinearLayout android:layout_width="match_parent" android:layout_height="52dp"
                  android:orientation="horizontal" android:gravity="center"
                  android:background="@color/wood_border"
                  android:paddingStart="8dp" android:paddingEnd="8dp">
                  <Button android:id="@+id/btnUndo"
                      android:layout_width="0dp" android:layout_height="40dp"
                      android:layout_weight="1" android:text="@string/undo"
                      android:background="@drawable/bg_btn"
                      android:textColor="@color/ui_text" android:textSize="12sp"
                      android:layout_marginEnd="4dp"/>
                  <Button android:id="@+id/btnNewGame"
                      android:layout_width="0dp" android:layout_height="40dp"
                      android:layout_weight="1" android:text="@string/new_game"
                      android:background="@drawable/bg_btn_gold"
                      android:textColor="@color/ui_bg" android:textStyle="bold"
                      android:textSize="12sp" android:layout_marginEnd="4dp"/>
                  <Button android:id="@+id/btnMenu"
                      android:layout_width="0dp" android:layout_height="40dp"
                      android:layout_weight="1" android:text="@string/menu"
                      android:background="@drawable/bg_btn"
                      android:textColor="@color/ui_text" android:textSize="12sp"/>
              </LinearLayout>
          </LinearLayout>
          LGEOF

          cat > app/src/main/res/layout/activity_online.xml << 'LOEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="@color/ui_bg" android:padding="20dp">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="Online Oyun" android:textSize="22sp" android:textStyle="bold"
                  android:textColor="@color/ui_gold" android:layout_marginBottom="4dp"/>
              <TextView android:id="@+id/tvStatus"
                  android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="Bagli degil" android:textSize="12sp"
                  android:textColor="@color/ui_text_dim" android:layout_marginBottom="16dp"/>
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:orientation="vertical" android:background="@drawable/bg_panel"
                  android:padding="14dp" android:layout_marginBottom="12dp">
                  <EditText android:id="@+id/etIP"
                      android:layout_width="match_parent" android:layout_height="46dp"
                      android:hint="@string/server_hint" android:background="@drawable/bg_input"
                      android:textColor="@color/ui_text" android:textColorHint="@color/ui_text_dim"
                      android:paddingStart="12dp" android:paddingEnd="12dp"
                      android:inputType="text" android:layout_marginBottom="8dp"/>
                  <EditText android:id="@+id/etName"
                      android:layout_width="match_parent" android:layout_height="46dp"
                      android:hint="@string/name_hint" android:background="@drawable/bg_input"
                      android:textColor="@color/ui_text" android:textColorHint="@color/ui_text_dim"
                      android:paddingStart="12dp" android:paddingEnd="12dp"
                      android:inputType="text" android:layout_marginBottom="8dp"/>
                  <Button android:id="@+id/btnConnect"
                      android:layout_width="match_parent" android:layout_height="48dp"
                      android:text="@string/connect" android:background="@drawable/bg_btn_gold"
                      android:textColor="@color/ui_bg" android:textStyle="bold"/>
              </LinearLayout>
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:orientation="horizontal" android:layout_marginBottom="10dp">
                  <Button android:id="@+id/btnCreate"
                      android:layout_width="0dp" android:layout_height="48dp" android:layout_weight="1"
                      android:text="@string/create_room" android:background="@drawable/bg_btn"
                      android:textColor="@color/ui_text" android:layout_marginEnd="6dp"/>
                  <Button android:id="@+id/btnJoin"
                      android:layout_width="0dp" android:layout_height="48dp" android:layout_weight="1"
                      android:text="@string/join_room" android:background="@drawable/bg_btn"
                      android:textColor="@color/ui_text"/>
              </LinearLayout>
              <EditText android:id="@+id/etCode"
                  android:layout_width="match_parent" android:layout_height="52dp"
                  android:hint="@string/room_code_hint" android:background="@drawable/bg_input"

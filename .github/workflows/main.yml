          package com.damax.game;
          import java.util.*;
          public class GameEngine {
              public static final int EMPTY=0,P1=1,P2=2,P1K=3,P2K=4;
              public int[][] board=new int[8][8];
              public int turn=1;
              public boolean active=false;
              public int p1count=12,p2count=12;
              public int aiLevel=2;
              public static class Move {
                  public int[]from,to; public List<int[]>caps;
                  public Move(int[]f,int[]t,List<int[]>c){from=f;to=t;caps=c!=null?c:new ArrayList<>();}
              }
              public void init(){
                  board=new int[8][8];
                  for(int r=0;r<3;r++)for(int c=0;c<8;c++)if((r+c)%2==1)board[r][c]=P2;
                  for(int r=5;r<8;r++)for(int c=0;c<8;c++)if((r+c)%2==1)board[r][c]=P1;
                  turn=1;active=true;p1count=12;p2count=12;
              }
              public List<Move> captures(int[][]b,int r,int c,int pl){
                  int pc=b[r][c];boolean king=pc==P1K||pc==P2K;
                  int[][]dirs=dirs(pl,king);List<Move>res=new ArrayList<>();
                  for(int[]d:dirs){
                      int er=r+d[0],ec=c+d[1],lr=r+2*d[0],lc=c+2*d[1];
                      if(er<0||er>7||ec<0||ec>7||lr<0||lr>7||lc<0||lc>7)continue;
                      int e=b[er][ec];
                      boolean enemy=(pl==1&&(e==P2||e==P2K))||(pl==2&&(e==P1||e==P1K));
                      if(enemy&&b[lr][lc]==EMPTY){
                          List<int[]>cap=new ArrayList<>();cap.add(new int[]{er,ec});
                          res.add(new Move(new int[]{r,c},new int[]{lr,lc},cap));
                      }
                  }
                  return res;
              }
              public List<Move> moves(int[][]b,int r,int c,int pl){
                  List<Move>caps=captures(b,r,c,pl);if(!caps.isEmpty())return caps;
                  int pc=b[r][c];boolean king=pc==P1K||pc==P2K;
                  int[][]dirs=dirs(pl,king);List<Move>res=new ArrayList<>();
                  for(int[]d:dirs){int nr=r+d[0],nc=c+d[1];
                      if(nr>=0&&nr<8&&nc>=0&&nc<8&&b[nr][nc]==EMPTY)
                          res.add(new Move(new int[]{r,c},new int[]{nr,nc},null));
                  }
                  return res;
              }
              public List<Move> allMoves(int[][]b,int pl){
                  List<Move>all=new ArrayList<>();
                  for(int r=0;r<8;r++)for(int c=0;c<8;c++){
                      int p=b[r][c];
                      if((pl==1&&(p==P1||p==P1K))||(pl==2&&(p==P2||p==P2K)))
                          all.addAll(moves(b,r,c,pl));
                  }
                  boolean hc=false;for(Move m:all)if(!m.caps.isEmpty()){hc=true;break;}
                  if(hc){List<Move>f=new ArrayList<>();for(Move m:all)if(!m.caps.isEmpty())f.add(m);return f;}
                  return all;
              }
              public int[][]applyMove(int[][]b,Move m,int pl){
                  int[][]nb=copy(b);int[]f=m.from,t=m.to;
                  nb[t[0]][t[1]]=nb[f[0]][f[1]];nb[f[0]][f[1]]=EMPTY;
                  for(int[]cap:m.caps)nb[cap[0]][cap[1]]=EMPTY;
                  if(nb[t[0]][t[1]]==P1&&t[0]==0)nb[t[0]][t[1]]=P1K;
                  if(nb[t[0]][t[1]]==P2&&t[0]==7)nb[t[0]][t[1]]=P2K;
                  return nb;
              }
              public boolean doMove(Move m){
                  int[]t=m.to;
                  board[t[0]][t[1]]=board[m.from[0]][m.from[1]];
                  board[m.from[0]][m.from[1]]=EMPTY;
                  for(int[]cap:m.caps){board[cap[0]][cap[1]]=EMPTY;if(turn==1)p2count--;else p1count--;}
                  boolean king=false;
                  if(board[t[0]][t[1]]==P1&&t[0]==0){board[t[0]][t[1]]=P1K;king=true;}
                  if(board[t[0]][t[1]]==P2&&t[0]==7){board[t[0]][t[1]]=P2K;king=true;}
                  return king;
              }
              public int winner(){
                  if(p1count<=0)return 2;if(p2count<=0)return 1;
                  int next=turn==1?2:1;
                  if(allMoves(board,next).isEmpty())return turn;
                  return 0;
              }
              public Move aiMove(){
                  List<Move>mv=allMoves(board,2);if(mv.isEmpty())return null;
                  if(aiLevel==1)return mv.get(new Random().nextInt(mv.size()));
                  if(aiLevel==2){
                      List<Move>caps=new ArrayList<>();for(Move m:mv)if(!m.caps.isEmpty())caps.add(m);
                      List<Move>pool=caps.isEmpty()?mv:caps;
                      return pool.get(new Random().nextInt(pool.size()));
                  }
                  Move best=null;int bs=Integer.MIN_VALUE;
                  for(Move m:mv){int s=mm(applyMove(board,m,2),2,false,0);if(s>bs){bs=s;best=m;}}
                  return best;
              }
              private int mm(int[][]b,int pl,boolean max,int d){
                  if(d>=4)return eval(b);
                  List<Move>mv=allMoves(b,pl);if(mv.isEmpty())return max?-999:999;
                  if(max){int best=Integer.MIN_VALUE;for(Move m:mv)best=Math.max(best,mm(applyMove(b,m,pl),3-pl,false,d+1));return best;}
                  else{int best=Integer.MAX_VALUE;for(Move m:mv)best=Math.min(best,mm(applyMove(b,m,pl),3-pl,true,d+1));return best;}
              }
              private int eval(int[][]b){
                  int s=0;
                  for(int r=0;r<8;r++)for(int c=0;c<8;c++){
                      if(b[r][c]==P1)s-=10;else if(b[r][c]==P1K)s-=18;
                      else if(b[r][c]==P2)s+=10+(7-r);else if(b[r][c]==P2K)s+=18;
                  }
                  return s;
              }
              private int[][]dirs(int pl,boolean king){
                  if(king)return new int[][]{{-1,-1},{-1,1},{1,-1},{1,1}};
                  if(pl==1)return new int[][]{{-1,-1},{-1,1}};
                  return new int[][]{{1,-1},{1,1}};
              }
              private int[][]copy(int[][]b){
                  int[][]n=new int[8][8];for(int i=0;i<8;i++)System.arraycopy(b[i],0,n[i],0,8);return n;
              }
          }

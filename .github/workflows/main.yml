          package com.damax.game;

          import android.app.AlertDialog;
          import android.app.Dialog;
          import android.content.Context;
          import android.os.Bundle;
          import android.os.CountDownTimer;
          import android.os.Handler;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.recyclerview.widget.LinearLayoutManager;
          import androidx.recyclerview.widget.RecyclerView;
          import com.damax.game.databinding.ActivityGameBinding;
          import com.google.gson.JsonObject;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.Stack;

          public class GameActivity extends AppCompatActivity implements BoardView.BoardListener, WebSocketManager.WSListener {

              private ActivityGameBinding b;
              private GameEngine engine;
              private SoundManager sound;
              private PrefsManager prefs;
              private WebSocketManager ws;
              private String gameMode;
              private int myColor = 1;
              private boolean myTurn = true;
              private String roomCode = "";
              private CountDownTimer countDownTimer;
              private int timerMode = 0, timerSeconds = 0;
              private int[] selected = null;
              private List<GameEngine.Move> validMoves = new ArrayList<>();
              private int[] captureChain = null;
              private Stack<GameState> undoStack = new Stack<>();
              private List<ChatMessage> chatMessages = new ArrayList<>();
              private ChatAdapter chatAdapter;
              private MoveLogAdapter moveLogAdapter;
              private List<String> moveLog = new ArrayList<>();

              static class GameState {
                  int[][] board; int player, p1Count, p2Count;
                  GameState(int[][] b, int p, int c1, int c2) {
                      board = new int[8][8]; for(int i=0;i<8;i++) System.arraycopy(b[i],0,board[i],0,8);
                      player=p; p1Count=c1; p2Count=c2;
                  }
              }

              static class ChatMessage {
                  String sender, text; int color;
                  ChatMessage(String s, String t, int c) { sender=s; text=t; color=c; }
              }

              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  b = ActivityGameBinding.inflate(getLayoutInflater());
                  setContentView(b.getRoot());
                  prefs = new PrefsManager(this);
                  sound = new SoundManager(this);
                  engine = new GameEngine();
                  engine.aiDifficulty = prefs.getAiDifficulty();
                  gameMode = getIntent().getStringExtra("mode");
                  if (gameMode == null) gameMode = "ai";

                  b.boardView.setEngine(engine);
                  b.boardView.setListener(this);
                  setupUI();
                  if ("online".equals(gameMode)) {
                      ws = new WebSocketManager(this);
                      ws.connect(prefs.getServerIP(), 3000);
                  } else {
                      startNewGame();
                  }
              }

              private void setupUI() {
                  b.btnUndo.setOnClickListener(v -> undoMove());
                  b.btnResign.setOnClickListener(v -> confirmResign());
                  b.btnChat.setOnClickListener(v -> showChatDialog());
                  updatePlayerNames();
              }

              private void startNewGame() {
                  engine.initBoard(); selected = null; validMoves.clear();
                  captureChain = null; undoStack.clear(); moveLog.clear();
                  b.boardView.setLastMove(null, null);
                  b.boardView.clearSelection();
                  myTurn = (gameMode.equals("local") || myColor == 1);
                  timerMode = prefs.getTimerMode();
                  updateCounters(); updateTurnInfo();
                  b.boardView.refresh();
                  startTimer();
              }

              @Override public void onCellTapped(int row, int col) {
                  if (!engine.gameActive) return;
                  if ("online".equals(gameMode) && !myTurn) {
                      showToast(getString(R.string.not_your_turn)); return;
                  }
                  int player = engine.currentPlayer;
                  int piece = engine.board[row][col];
                  boolean isMyPiece = (player==1 && (piece==GameEngine.P1||piece==GameEngine.P1K)) ||
                                       (player==2 && (piece==GameEngine.P2||piece==GameEngine.P2K));

                  if (captureChain != null) {
                      GameEngine.Move vm = getValidMoveAt(row, col);
                      if (vm != null) { executeMove(vm); return; }
                      return;
                  }

                  if (selected != null) {
                      GameEngine.Move vm = getValidMoveAt(row, col);
                      if (vm != null) { executeMove(vm); return; }
                      if (isMyPiece) { selectPiece(row, col); return; }
                      clearSelection(); return;
                  }

                  if (isMyPiece) {
                      List<GameEngine.Move> allMoves = engine.getAllMoves(engine.board, player);
                      boolean hasForcedCap = allMoves.stream().anyMatch(m -> !m.captures.isEmpty());
                      List<GameEngine.Move> myMoves = engine.getMoves(engine.board, row, col, player);
                      if (hasForcedCap && myMoves.stream().noneMatch(m -> !m.captures.isEmpty())) {
                          showToast(getString(R.string.forced_capture)); return;
                      }
                      selectPiece(row, col);
                  }
              }

              private void selectPiece(int r, int c) {
                  selected = new int[]{r, c};
                  validMoves = engine.getMoves(engine.board, r, c, engine.currentPlayer);
                  b.boardView.setSelected(selected, validMoves);
              }

              private void clearSelection() {
                  selected = null; validMoves.clear(); captureChain = null;
                  b.boardView.clearSelection();
              }

              private GameEngine.Move getValidMoveAt(int r, int c) {
                  for (GameEngine.Move m : validMoves) if (m.to[0]==r && m.to[1]==c) return m;
                  return null;
              }

              private void executeMove(GameEngine.Move move) {
                  undoStack.push(new GameState(engine.board, engine.currentPlayer, engine.p1Count, engine.p2Count));
                  boolean kinged = engine.applyMoveToBoard(move);
                  b.boardView.setLastMove(move.from, move.to);
                  int[] from = move.from, to = move.to;

                  // Move log
                  String[] letters = {"A","B","C","D","E","F","G","H"};
                  String[] nums = {"8","7","6","5","4","3","2","1"};
                  String entry = letters[from[1]]+nums[from[0]]+"→"+letters[to[1]]+nums[to[0]];
                  if (!move.captures.isEmpty()) entry += " (+" + move.captures.size() + ")";
                  moveLog.add(entry);

                  if (!move.captures.isEmpty()) sound.playCapture(); else sound.playMove();
                  if (kinged) { sound.playKing(); showToast(getString(R.string.king_promoted)); }

                  // Online sync
                  if ("online".equals(gameMode) && ws != null) {
                      JsonObject msg = buildMoveJson(move);
                      ws.send(msg);
                  }

                  // Chain capture?
                  if (!move.captures.isEmpty()) {
                      List<GameEngine.Move> chain = engine.getCaptures(engine.board, to[0], to[1], engine.currentPlayer);
                      if (!chain.isEmpty()) {
                          captureChain = to; selected = to;
                          validMoves = chain;
                          b.boardView.setSelected(selected, validMoves);
                          updateCounters(); b.boardView.refresh();
                          return;
                      }
                  }
                  captureChain = null;

                  updateCounters();
                  int winner = engine.checkWinner();
                  if (winner != 0) { showGameOver(winner, ""); return; }

                  engine.currentPlayer = engine.currentPlayer == 1 ? 2 : 1;
                  myTurn = "local".equals(gameMode) || myColor == engine.currentPlayer;
                  clearSelection(); updateTurnInfo(); resetTimer();
                  b.boardView.refresh();
                  if ("ai".equals(gameMode) && engine.currentPlayer == 2) {
                      new Handler().postDelayed(() -> {
                          GameEngine.Move aiMove = engine.getAIMove();
                          if (aiMove != null) executeMove(aiMove);
                      }, 600);
                  }
              }

              private void undoMove() {
                  if (undoStack.isEmpty()) { showToast("Geri alınacak hamle yok"); return; }
                  if ("online".equals(gameMode)) { showToast("Online modda geri alma yok"); return; }
                  GameState st = undoStack.pop();
                  engine.board = st.board; engine.currentPlayer = st.player;
                  engine.p1Count = st.p1Count; engine.p2Count = st.p2Count;
                  if (!moveLog.isEmpty()) moveLog.remove(moveLog.size()-1);
                  clearSelection(); updateCounters(); updateTurnInfo();
                  b.boardView.setLastMove(null, null); b.boardView.refresh();
                  showToast("Hamle geri alındı");
              }

              private void confirmResign() {
                  if (!engine.gameActive) return;
                  new AlertDialog.Builder(this)
                      .setTitle(getString(R.string.resign))
                      .setMessage(getString(R.string.resign_confirm))
                      .setPositiveButton(getString(R.string.yes), (d,w) -> showGameOver(engine.currentPlayer==1?2:1,"resign"))
                      .setNegativeButton(getString(R.string.no), null)
                      .show();
              }

              private void showGameOver(int winner, String reason) {
                  engine.gameActive = false;
                  if (countDownTimer != null) countDownTimer.cancel();
                  sound.playWin();
                  String name = winner == 1 ? b.tvP1Name.getText().toString() : b.tvP2Name.getText().toString();
                  String msg = name + " " + getString(R.string.wins);
                  if ("resign".equals(reason)) msg += "\n(Teslim olundu)";
                  new AlertDialog.Builder(this)
                      .setTitle(getString(R.string.game_over))
                      .setMessage(msg)
                      .setPositiveButton(getString(R.string.play_again), (d,w) -> startNewGame())
                      .setNegativeButton(getString(R.string.main_menu), (d,w) -> finish())
                      .setCancelable(false)
                      .show();
              }

              private void updatePlayerNames() {
                  String pName = prefs.getPlayerName();
                  if ("ai".equals(gameMode)) {
                      b.tvP1Name.setText(pName);
                      b.tvP2Name.setText("🤖 Yapay Zeka");
                  } else if ("local".equals(gameMode)) {
                      b.tvP1Name.setText("🔴 Oyuncu 1");
                      b.tvP2Name.setText("🔵 Oyuncu 2");
                  }
              }

              private void updateCounters() {
                  b.tvP1Count.setText(engine.p1Count + " " + getString(R.string.pieces));
                  b.tvP2Count.setText(engine.p2Count + " " + getString(R.string.pieces));
              }

              private void updateTurnInfo() {
                  String name = engine.currentPlayer==1 ? b.tvP1Name.getText().toString() : b.tvP2Name.getText().toString();
                  boolean isMyTurn = "local".equals(gameMode) || myTurn;
                  b.tvTurnInfo.setText(isMyTurn ? getString(R.string.your_turn) : getString(R.string.opponent_turn));
              }

              private void startTimer() {
                  if (countDownTimer != null) countDownTimer.cancel();
                  if (timerMode == 0) { b.tvTimer.setText("∞"); return; }
                  timerSeconds = timerMode;
                  runTimer();
              }

              private void resetTimer() {
                  if (countDownTimer != null) countDownTimer.cancel();
                  if (timerMode == 0) return;
                  timerSeconds = timerMode; runTimer();
              }

              private void runTimer() {
                  countDownTimer = new CountDownTimer(timerSeconds * 1000L, 1000) {
                      public void onTick(long ms) {
                          int s = (int)(ms/1000);
                          b.tvTimer.setText(s > 60 ? (s/60)+":"+(s%60<10?"0":"")+s%60 : String.valueOf(s));
                          if (s <= 5) sound.playTick();
                      }
                      public void onFinish() {
                          showGameOver(engine.currentPlayer==1?2:1,"timeout");
                      }
                  }.start();
              }

              private void showChatDialog() {
                  Dialog d = new Dialog(this);
                  d.setContentView(R.layout.dialog_chat);
                  d.getWindow().setLayout(android.view.ViewGroup.LayoutParams.MATCH_PARENT,
                                          android.view.ViewGroup.LayoutParams.WRAP_CONTENT);
                  RecyclerView rv = d.findViewById(R.id.rvChat);
                  chatAdapter = new ChatAdapter(chatMessages);
                  rv.setLayoutManager(new LinearLayoutManager(this));
                  rv.setAdapter(chatAdapter);
                  android.widget.EditText et = d.findViewById(R.id.etChatInput);
                  d.findViewById(R.id.btnSendChat).setOnClickListener(v -> {
                      String msg = et.getText().toString().trim();
                      if (msg.isEmpty()) return;
                      ChatMessage cm = new ChatMessage(prefs.getPlayerName(), msg, 0xFFFF8899);
                      chatMessages.add(cm);
                      chatAdapter.notifyItemInserted(chatMessages.size()-1);
                      rv.scrollToPosition(chatMessages.size()-1);
                      et.setText("");
                      if ("online".equals(gameMode) && ws != null) {
                          JsonObject obj = new JsonObject();
                          obj.addProperty("type","chat");
                          obj.addProperty("msg", msg);
                          obj.addProperty("name", prefs.getPlayerName());
                          obj.addProperty("room", roomCode);
                          ws.send(obj);
                      }
                  });
                  d.show();
              }

              private JsonObject buildMoveJson(GameEngine.Move move) {
                  JsonObject msg = new JsonObject();
                  msg.addProperty("type","move");
                  msg.addProperty("room", roomCode);
                  JsonObject mv = new JsonObject();
                  mv.addProperty("fr", move.from[0]); mv.addProperty("fc", move.from[1]);
                  mv.addProperty("tr", move.to[0]); mv.addProperty("tc", move.to[1]);
                  msg.add("move", mv);
                  return msg;
              }

              // WebSocket events
              @Override public void onConnected() {}
              @Override public void onDisconnected() { showToast(getString(R.string.disconnected)); }
              @Override public void onError(String e) { showToast("Hata: " + e); }
              @Override public void onMessage(String type, JsonObject data) {
                  switch (type) {
                      case "gameStart":
                          myColor = data.get("yourColor").getAsInt();
                          myTurn = myColor == 1;
                          roomCode = data.has("room") ? data.get("room").getAsString() : "";
                          b.tvP1Name.setText(data.get("p1name").getAsString());
                          b.tvP2Name.setText(data.get("p2name").getAsString());
                          startNewGame(); break;
                      case "move":
                          JsonObject mv = data.getAsJsonObject("move");
                          GameEngine.Move m = new GameEngine.Move(
                              new int[]{mv.get("fr").getAsInt(), mv.get("fc").getAsInt()},
                              new int[]{mv.get("tr").getAsInt(), mv.get("tc").getAsInt()},
                              new ArrayList<>()
                          );
                          executeMove(m); break;
                      case "chat":
                          String sender = data.get("name").getAsString();
                          String msg = data.get("msg").getAsString();
                          chatMessages.add(new ChatMessage(sender, msg, 0xFF88BBFF));
                          if (chatAdapter != null) chatAdapter.notifyItemInserted(chatMessages.size()-1);
                          break;
                      case "opponentLeft":
                          showToast(getString(R.string.opponent_left)); break;
                      case "restart":
                          startNewGame(); break;
                  }
              }

              private void showToast(String msg) { Toast.makeText(this, msg, Toast.LENGTH_SHORT).show(); }
              @Override protected void onDestroy() { super.onDestroy(); if (ws!=null) ws.disconnect(); if(countDownTimer!=null) countDownTimer.cancel(); sound.release(); }
          }
          GAME_EOF

      # ─── Java: LobbyActivity.java ─────────────────────────────
      - name: Write LobbyActivity.java
        run: |
          cat > app/src/main/java/com/damax/game/LobbyActivity.java << 'LOBBY_EOF'
          package com.damax.game;

          import android.content.Intent;
          import android.os.Bundle;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.recyclerview.widget.LinearLayoutManager;
          import com.damax.game.databinding.ActivityLobbyBinding;
          import com.google.gson.JsonArray;
          import com.google.gson.JsonObject;

          public class LobbyActivity extends AppCompatActivity implements WebSocketManager.WSListener {
              private ActivityLobbyBinding b;
              private WebSocketManager ws;
              private PrefsManager prefs;
              private RoomAdapter roomAdapter;

              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  b = ActivityLobbyBinding.inflate(getLayoutInflater());
                  setContentView(b.getRoot());
                  prefs = new PrefsManager(this);
                  b.etServerIP.setText(prefs.getServerIP());
                  b.etPlayerName.setText(prefs.getPlayerName());

                  roomAdapter = new RoomAdapter(code -> {
                      b.etRoomCode.setText(code); joinRoom();
                  });
                  b.rvRooms.setLayoutManager(new LinearLayoutManager(this));
                  b.rvRooms.setAdapter(roomAdapter);

                  b.btnConnect.setOnClickListener(v -> connect());
                  b.btnCreateRoom.setOnClickListener(v -> createRoom());
                  b.btnJoinRoom.setOnClickListener(v -> joinRoom());
              }

              private void connect() {
                  String ip = b.etServerIP.getText().toString().trim();
                  String name = b.etPlayerName.getText().toString().trim();
                  if (ip.isEmpty()) { showToast("IP adresi girin"); return; }
                  if (name.isEmpty()) { showToast("Kullanıcı adı girin"); return; }
                  prefs.setServerIP(ip); prefs.setPlayerName(name);
                  b.tvConnectionStatus.setText(getString(R.string.connecting));
                  if (ws != null) ws.disconnect();
                  ws = new WebSocketManager(this);
                  ws.connect(ip, 3000);
              }

              private void createRoom() {
                  if (ws == null || !ws.isConnected()) { showToast("Önce bağlanın"); return; }
                  JsonObject msg = new JsonObject();
                  msg.addProperty("type","createRoom");
                  msg.addProperty("name", prefs.getPlayerName());
                  msg.addProperty("timer", prefs.getTimerMode());
                  ws.send(msg);
              }

              private void joinRoom() {
                  if (ws == null || !ws.isConnected()) { showToast("Önce bağlanın"); return; }
                  String code = b.etRoomCode.getText().toString().trim().toUpperCase();
                  if (code.isEmpty()) { showToast("Oda kodu girin"); return; }
                  JsonObject msg = new JsonObject();
                  msg.addProperty("type","joinRoom");
                  msg.addProperty("code", code);
                  msg.addProperty("name", prefs.getPlayerName());
                  ws.send(msg);
              }

              @Override public void onConnected() {
                  runOnUiThread(() -> {
                      b.tvConnectionStatus.setText(getString(R.string.connected));
                      ws.sendType("listRooms");
                  });
              }
              @Override public void onDisconnected() {
                  runOnUiThread(() -> b.tvConnectionStatus.setText(getString(R.string.disconnected)));
              }
              @Override public void onError(String e) {
                  runOnUiThread(() -> { b.tvConnectionStatus.setText("Hata: "+e); showToast("Bağlantı hatası: "+e); });
              }
              @Override public void onMessage(String type, JsonObject data) {
                  switch (type) {
                      case "roomCreated":
                          showToast("Oda oluşturuldu: " + data.get("code").getAsString() + " — Rakip bekleniyor…");
                          break;
                      case "gameStart":
                          Intent i = new Intent(this, GameActivity.class);
                          i.putExtra("mode","online");
                          startActivity(i);
                          break;
                      case "roomList":
                          JsonArray rooms = data.getAsJsonArray("rooms");
                          roomAdapter.setRooms(rooms);
                          break;
                      case "error":
                          showToast(data.get("msg").getAsString()); break;
                  }
              }

              private void showToast(String msg) { Toast.makeText(this, msg, Toast.LENGTH_SHORT).show(); }
              @Override protected void onDestroy() { super.onDestroy(); if(ws!=null) ws.disconnect(); }
          }
          LOBBY_EOF

      # ─── Java: Adapters ───────────────────────────────────────
      - name: Write Adapter classes
        run: |
          cat > app/src/main/java/com/damax/game/ChatAdapter.java << 'CHAT_ADAPTER_EOF'
          package com.damax.game;
          import android.view.*;
          import android.widget.TextView;
          import androidx.annotation.NonNull;
          import androidx.recyclerview.widget.RecyclerView;
          import java.util.List;
          public class ChatAdapter extends RecyclerView.Adapter<ChatAdapter.VH> {
              private List<GameActivity.ChatMessage> items;
              public ChatAdapter(List<GameActivity.ChatMessage> items) { this.items = items; }
              @NonNull @Override public VH onCreateViewHolder(@NonNull ViewGroup p, int t) {
                  View v = LayoutInflater.from(p.getContext()).inflate(R.layout.item_chat, p, false);
                  return new VH(v);
              }
              @Override public void onBindViewHolder(@NonNull VH h, int pos) {
                  GameActivity.ChatMessage m = items.get(pos);
                  h.sender.setText(m.sender); h.sender.setTextColor(m.color);
                  h.msg.setText(m.text);
              }
              @Override public int getItemCount() { return items.size(); }
              static class VH extends RecyclerView.ViewHolder {
                  TextView sender, msg;
                  VH(View v) { super(v); sender=v.findViewById(R.id.tvChatSender); msg=v.findViewById(R.id.tvChatMessage); }
              }
          }
          CHAT_ADAPTER_EOF

          cat > app/src/main/java/com/damax/game/RoomAdapter.java << 'ROOM_ADAPTER_EOF'
          package com.damax.game;
          import android.view.*;
          import android.widget.TextView;
          import androidx.annotation.NonNull;
          import androidx.recyclerview.widget.RecyclerView;
          import com.google.gson.JsonArray;
          import com.google.gson.JsonObject;
          public class RoomAdapter extends RecyclerView.Adapter<RoomAdapter.VH> {
              interface OnJoinClick { void join(String code); }
              private JsonArray rooms = new JsonArray();
              private OnJoinClick listener;
              public RoomAdapter(OnJoinClick l) { listener = l; }
              public void setRooms(JsonArray r) { rooms = r; notifyDataSetChanged(); }
              @NonNull @Override public VH onCreateViewHolder(@NonNull ViewGroup p, int t) {
                  View v = LayoutInflater.from(p.getContext()).inflate(R.layout.item_room, p, false);
                  return new VH(v);
              }
              @Override public void onBindViewHolder(@NonNull VH h, int pos) {
                  JsonObject room = rooms.get(pos).getAsJsonObject();
                  String code = room.get("code").getAsString();
                  String name = room.get("name").getAsString();
                  int players = room.get("players").getAsInt();
                  h.name.setText(name); h.code.setText(code);
                  h.players.setText(players+"/2");
                  h.players.setTextColor(players>=2 ? 0xFFFF4466 : 0xFF39FF85);
                  if (players < 2) h.itemView.setOnClickListener(v -> listener.join(code));
              }
              @Override public int getItemCount() { return rooms.size(); }
              static class VH extends RecyclerView.ViewHolder {
                  TextView name, code, players;
                  VH(View v) { super(v); name=v.findViewById(R.id.tvRoomName); code=v.findViewById(R.id.tvRoomCode); players=v.findViewById(R.id.tvRoomPlayers); }
              }
          }
          ROOM_ADAPTER_EOF

          cat > app/src/main/java/com/damax/game/MoveLogAdapter.java << 'MOVELOG_EOF'
          package com.damax.game;
          import android.view.*;
          import android.widget.TextView;
          import androidx.annotation.NonNull;
          import androidx.recyclerview.widget.RecyclerView;
          import java.util.List;
          public class MoveLogAdapter extends RecyclerView.Adapter<MoveLogAdapter.VH> {
              private List<String> moves;
              public MoveLogAdapter(List<String> m) { moves = m; }
              @NonNull @Override public VH onCreateViewHolder(@NonNull ViewGroup p, int t) {
                  TextView tv = new TextView(p.getContext());
                  tv.setTextSize(11); tv.setPadding(8,4,8,4);
                  tv.setTextColor(0xFFE8E0CC);
                  return new VH(tv);
              }
              @Override public void onBindViewHolder(@NonNull VH h, int pos) {
                  h.tv.setText((pos+1)+". "+moves.get(pos));
              }
              @Override public int getItemCount() { return moves.size(); }
              static class VH extends RecyclerView.ViewHolder {
                  TextView tv;
                  VH(TextView v) { super(v); tv = v; }
              }
          }
          MOVELOG_EOF

      # ─── Java: SettingsDialog.java ────────────────────────────
      - name: Write SettingsDialog.java
        run: |
          cat > app/src/main/java/com/damax/game/SettingsDialog.java << 'SETTINGS_DIALOG_EOF'
          package com.damax.game;
          import android.app.Dialog;
          import android.content.Context;
          import android.os.Bundle;
          import android.widget.*;
          public class SettingsDialog extends Dialog {
              private PrefsManager prefs;
              public SettingsDialog(Context ctx) { super(ctx, R.style.Theme_DamaX); }
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  prefs = new PrefsManager(getContext());
                  LinearLayout layout = new LinearLayout(getContext());
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setPadding(40, 40, 40, 40);
                  layout.setBackgroundColor(0xFF0F1830);

                  TextView title = new TextView(getContext());
                  title.setText("⚙ AYARLAR"); title.setTextSize(18);
                  title.setTextColor(0xFFC9A84C); layout.addView(title);

                  CheckBox cbSound = new CheckBox(getContext());
                  cbSound.setText("Ses Efektleri"); cbSound.setTextColor(0xFFE8E0CC);
                  cbSound.setChecked(prefs.isSoundEnabled()); layout.addView(cbSound);

                  CheckBox cbVib = new CheckBox(getContext());
                  cbVib.setText("Titreşim"); cbVib.setTextColor(0xFFE8E0CC);
                  cbVib.setChecked(prefs.isVibrationEnabled()); layout.addView(cbVib);

                  CheckBox cbAnim = new CheckBox(getContext());
                  cbAnim.setText("Animasyonlar"); cbAnim.setTextColor(0xFFE8E0CC);
                  cbAnim.setChecked(prefs.isAnimationsEnabled()); layout.addView(cbAnim);

                  TextView tvDiff = new TextView(getContext());
                  tvDiff.setText("\nAI Zorluğu:"); tvDiff.setTextColor(0xFFC9A84C); layout.addView(tvDiff);

                  RadioGroup rg = new RadioGroup(getContext()); rg.setOrientation(RadioGroup.HORIZONTAL);
                  String[] diffs = {"Kolay","Orta","Zor"};
                  for (int i=0; i<3; i++) {
                      RadioButton rb = new RadioButton(getContext()); rb.setText(diffs[i]);
                      rb.setTextColor(0xFFE8E0CC); rb.setId(i+1);
                      rg.addView(rb);
                  }
                  rg.check(prefs.getAiDifficulty()); layout.addView(rg);

                  Button btnSave = new Button(getContext());
                  btnSave.setText("Kaydet"); btnSave.setBackgroundColor(0xFF1A3320);
                  btnSave.setTextColor(0xFF39FF85);
                  btnSave.setOnClickListener(v -> {
                      prefs.setSoundEnabled(cbSound.isChecked());
                      prefs.setVibrationEnabled(cbVib.isChecked());
                      prefs.setAnimationsEnabled(cbAnim.isChecked());
                      prefs.setAiDifficulty(rg.getCheckedRadioButtonId());
                      dismiss();
                  });
                  layout.addView(btnSave);
                  setContentView(layout);
              }
          }
          SETTINGS_DIALOG_EOF

      # ─── Setup Gradle Wrapper properly ───────────────────────
      - name: Setup Gradle properly
        run: |
          # Use gradle directly via github actions setup
          cat > gradlew << 'GRADLEW_REAL_EOF'
          #!/usr/bin/env sh
          set -e
          APP_HOME="$(cd "$(dirname "$0")" && pwd -P)"
          exec java -jar "$APP_HOME/gradle/wrapper/gradle-wrapper.jar" "$@"
          GRADLEW_REAL_EOF
          chmod +x gradlew

      # ─────────────────────────────────────────────────────────────
      # 4. BUILD APK
      # ─────────────────────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --info

      # ─────────────────────────────────────────────────────────────
      # 5. ARTIFACT UPLOAD
      # ─────────────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk -name "*.apk" -exec cp {} artifacts/DamaX-v1.0.0-debug.apk \;
          ls -lh artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DamaX-APK-${{ github.run_number }}
          path: artifacts/DamaX-v1.0.0-debug.apk
          retention-days: 90

      # ─────────────────────────────────────────────────────────────
      # 6. BUILD SUMMARY
      # ─────────────────────────────────────────────────────────────
      - name: Build Summary
        run: |
          echo "## ✅ DAMA X APK Build Başarılı!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 **APK** | DamaX-v1.0.0-debug.apk |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎮 **Modlar** | AI, Lokal 2 Kişi, Online |" >> $GITHUB_STEP_SUMMARY
          echo "| 📡 **WebSocket** | OkHttp4 |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗 **Build** | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Actions → Artifacts** sekmesinden APK'yı indir, cihaza kur." >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -h artifacts/DamaX-v1.0.0-debug.apk 2>/dev/null | cut -f1 || echo "?")
          echo "| 📦 **Boyut** | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────
  # RELEASE JOB (sadece tag push'ta)
  # ───────────────────────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: DamaX-APK-${{ github.run_number }}
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          name: "DAMA X ${{ github.ref_name }}"
          body: |
            ## 🎮 DAMA X ${{ github.ref_name }}

            ### 📥 Kurulum
            1. APK'yı indir
            2. Android'de **"Bilinmeyen Kaynaklardan Yükleme"** izni ver
            3. Kur ve oyna!

            ### ✨ Özellikler
            - 🤖 **AI ile Oyna** — 3 zorluk (Kolay / Orta / Minimax)
            - 👥 **Lokal 2 Kişi** — aynı cihazda
            - 🌐 **Online** — aynı ağda WebSocket oda sistemi
            - 💬 Gerçek zamanlı sohbet
            - ⏱ Hamle süresi sistemi (30s / 60s / 2dk)
            - ↩ Geri alma
            - 🔊 Titreşim geri bildirimi
            - ♛ Dame (kral) terfi animasyonu
            - 🎨 Karanlık altın tema

            ### 📡 Online Oynamak İçin
            Sunucu gereklidir. `docker-compose.yml` ile çalıştırın:
            ```bash
            docker-compose up
            ```
            Her iki telefon aynı ağda → **Online Oyna** → IP gir → Oda oluştur/katıl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ═══════════════════════════════════════════════════════════════════
#  KULLANIM:
#  1. Bu dosyayı: .github/workflows/build-apk.yml olarak kaydet
#  2. git push → Actions sekmesi → APK otomatik derlenir
#  3. APK indirmek: Actions → İlgili run → Artifacts → DamaX-APK-*
#  4. Release için: git tag v1.0.0 && git push origin v1.0.0
# ═══════════════════════════════════════════════════════════════════

                  animateButtons();
                  b.btnVsAI.setOnClickListener(v -> startGame("ai"));
                  b.btnVsLocal.setOnClickListener(v -> startGame("local"));
                  b.btnOnline.setOnClickListener(v ->
                      startActivity(new Intent(this, LobbyActivity.class)));
                  b.btnSettings.setOnClickListener(v -> new SettingsDialog(this).show());
              }

              private void animateButtons() {
                  android.view.View[] views = {b.btnVsAI, b.btnVsLocal, b.btnOnline, b.btnSettings};
                  for (int i = 0; i < views.length; i++) {
                      views[i].setAlpha(0f);
                      views[i].setTranslationY(30f);
                      ObjectAnimator a = ObjectAnimator.ofFloat(views[i], "alpha", 0f, 1f);
                      ObjectAnimator t = ObjectAnimator.ofFloat(views[i], "translationY", 30f, 0f);
                      a.setDuration(400); t.setDuration(400);
                      a.setStartDelay(200 + i * 100L); t.setStartDelay(200 + i * 100L);
                      a.setInterpolator(new AccelerateDecelerateInterpolator());
                      t.setInterpolator(new AccelerateDecelerateInterpolator());
                      a.start(); t.start();
                  }
              }

              private void startGame(String mode) {
                  Intent i = new Intent(this, GameActivity.class);
                  i.putExtra("mode", mode);
                  startActivity(i);
              }

          package com.damax.game;
          import android.content.Intent;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          import com.damax.game.databinding.ActivityMainBinding;
          public class MainActivity extends AppCompatActivity {
              private ActivityMainBinding binding;
              private PrefsManager prefs;
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  binding = ActivityMainBinding.inflate(getLayoutInflater());
                  setContentView(binding.getRoot());
                  prefs = new PrefsManager(this);
                  if (prefs.getPlayerName().isEmpty()) {
                      showNicknameDialog();
                      return;
                  }
                  binding.btnVsAI.setOnClickListener(v -> startGame("ai"));
                  binding.btnVsLocal.setOnClickListener(v -> startGame("local"));
                  binding.btnOnline.setOnClickListener(v -> startActivity(new Intent(this, LobbyActivity.class)));
                  binding.btnSettings.setOnClickListener(v -> new SettingsDialog(this).show());
              }
              private void startGame(String mode) {
                  Intent i = new Intent(this, GameActivity.class);
                  i.putExtra("mode", mode);
                  startActivity(i);
              }
              private void showNicknameDialog() {
                  android.app.Dialog d = new android.app.Dialog(this);
                  d.setContentView(R.layout.dialog_nickname);
                  d.setCancelable(false);
                  d.findViewById(R.id.btnSaveNickname).setOnClickListener(v -> {
                      String name = ((android.widget.EditText) d.findViewById(R.id.etNickname)).getText().toString().trim();
                      if (!name.isEmpty()) {
                          prefs.setPlayerName(name);
                          d.dismiss();
                          recreate();
                      }
                  });
                  d.show();
              }
          }

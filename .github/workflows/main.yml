          package com.damax.game;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.*;
          import java.util.*;

          public class BoardView extends View {
              // Hucre renkleri (ahsap)
              private static final int[] DARK_GRAD  = {0xFFD49A4A,0xFFB87830,0xFFC88840,0xFFD49A4A};
              private static final int[] LIGHT_GRAD = {0xFFFFF8E0,0xFFEED8A0,0xFFF8ECC0,0xFFFFF8E0};
              // Koyu tas (kahverengi — resimde ust satirlar)
              private static final int D_OUT=0xFF3A0F04,D_R1=0xFF6B2008,D_R2=0xFF8B3218;
              private static final int D_R3=0xFF9E3C20,D_R4=0xFFB04828,D_CTR=0xFFC05030,D_SH=0xFFD06838;
              // Acik tas (krem/altin — resimde alt satirlar)
              private static final int L_OUT=0xFFA07010,L_R1=0xFFBE9020,L_R2=0xFFD0A830;
              private static final int L_R3=0xFFDDB840,L_R4=0xFFEACA50,L_CTR=0xFFF2D860,L_SH=0xFFFDE880;

              private Paint p=new Paint(Paint.ANTI_ALIAS_FLAG);
              private GameEngine eng;
              private int[]sel; private List<GameEngine.Move>valid=new ArrayList<>();
              private int[]lastFrom,lastTo;
              private float cs,ox,oy; // cellSize, offsetX, offsetY
              private Listener lst;
              public interface Listener{void onTap(int r,int c);}

              public BoardView(Context c){super(c);init();}
              public BoardView(Context c,AttributeSet a){super(c,a);init();}
              public BoardView(Context c,AttributeSet a,int d){super(c,a,d);init();}

              private void init(){
                  setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_UP){
                          int c2=(int)((e.getX()-ox)/cs),r2=(int)((e.getY()-oy)/cs);
                          if(r2>=0&&r2<8&&c2>=0&&c2<8&&lst!=null)lst.onTap(r2,c2);
                          performClick();
                      }
                      return true;
                  });
              }
              @Override public boolean performClick(){return super.performClick();}

              @Override protected void onDraw(Canvas cv){
                  if(eng==null)return;
                  int sz=Math.min(getWidth(),getHeight());
                  float brd=sz*0.045f;
                  cs=(sz-brd*2)/8f;
                  ox=(getWidth()-sz)/2f+brd;
                  oy=(getHeight()-sz)/2f+brd;

                  // Dis cerceve (ahsap)
                  float wx=(getWidth()-sz)/2f,wy=(getHeight()-sz)/2f;
                  p.setShader(new LinearGradient(wx,wy,wx+sz,wy+sz,
                      new int[]{0xFFA05520,0xFF7B3510,0xFF9B4518,0xFF6B2808},
                      null,Shader.TileMode.CLAMP));
                  p.setStyle(Paint.Style.FILL);
                  cv.drawRoundRect(new RectF(wx,wy,wx+sz,wy+sz),14,14,p);
                  p.setShader(null);
                  // Ic cizgi
                  p.setStyle(Paint.Style.STROKE);p.setColor(0xFF3D1200);p.setStrokeWidth(2f);
                  cv.drawRect(ox-1,oy-1,ox+cs*8+1,oy+cs*8+1,p);
                  p.setStyle(Paint.Style.FILL);

                  // Hucreler
                  for(int r=0;r<8;r++){
                      for(int c=0;c<8;c++){
                          float l=ox+c*cs,t=oy+r*cs;
                          RectF cell=new RectF(l,t,l+cs,t+cs);
                          boolean dark=(r+c)%2==1;
                          drawCell(cv,cell,dark);
                          // Son hamle
                          if(isLast(r,c)){p.setColor(0x40FFD700);cv.drawRect(cell,p);}
                          // Secili
                          if(isSel(r,c)){
                              p.setColor(0x55FFD700);cv.drawRect(cell,p);
                              p.setStyle(Paint.Style.STROKE);p.setColor(0xCCFFD700);p.setStrokeWidth(3f);
                              cv.drawRect(cell,p);p.setStyle(Paint.Style.FILL);
                          }
                          // Gecerli hamle noktasi
                          GameEngine.Move vm=validAt(r,c);
                          if(vm!=null)drawDot(cv,l+cs/2,t+cs/2,vm.caps.isEmpty());
                      }
                  }

                  // Koordinatlar (kucuk, tah disi)
                  p.setTextSize(brd*0.52f);p.setColor(0xAAFFE4B5);
                  for(int i=0;i<8;i++){
                      cv.drawText(String.valueOf((char)('a'+i)),ox+i*cs+cs*0.08f,oy+cs*8+brd*0.8f,p);
                      cv.drawText(String.valueOf(8-i),wx+brd*0.15f,oy+i*cs+cs*0.6f,p);
                  }

                  // Taslar
                  for(int r=0;r<8;r++){
                      for(int c=0;c<8;c++){
                          int pc=eng.board[r][c];if(pc==GameEngine.EMPTY)continue;
                          boolean isP1=pc==GameEngine.P1||pc==GameEngine.P1K;
                          boolean king=pc==GameEngine.P1K||pc==GameEngine.P2K;
                          float cx=ox+c*cs+cs/2,cy=oy+r*cs+cs/2,pr=cs*0.43f;
                          if(isSel(r,c))pr*=1.06f;
                          drawPiece(cv,cx,cy,pr,isP1,king,isSel(r,c));
                      }
                  }
              }

              private void drawCell(Canvas cv,RectF r,boolean dark){
                  int[]g=dark?DARK_GRAD:LIGHT_GRAD;
                  p.setShader(new LinearGradient(r.left,r.top,r.right,r.bottom,g,null,Shader.TileMode.CLAMP));
                  cv.drawRect(r,p);p.setShader(null);
                  // Ahsap doku cizgileri
                  p.setColor(dark?0x10000000:0x08000000);
                  p.setStyle(Paint.Style.STROKE);p.setStrokeWidth(0.7f);
                  float h=r.height()/5f;
                  for(int i=1;i<5;i++)cv.drawLine(r.left,r.top+i*h,r.right,r.top+i*h+0.8f,p);
                  p.setStyle(Paint.Style.FILL);
              }

              /** Gercekci 3D konsantrik halka tasi ciz — resimde goruldugu gibi */
              private void drawPiece(Canvas cv,float cx,float cy,float r,boolean p1,boolean king,boolean sel){
                  int out=p1?D_OUT:L_OUT,r1=p1?D_R1:L_R1,r2=p1?D_R2:L_R2;
                  int r3=p1?D_R3:L_R3,r4=p1?D_R4:L_R4,ctr=p1?D_CTR:L_CTR,sh=p1?D_SH:L_SH;

                  // Golgesi (hafif asagida)
                  p.setShader(new RadialGradient(cx,cy+r*0.15f,r*1.1f,
                      new int[]{0x50000000,0x00000000},null,Shader.TileMode.CLAMP));
                  cv.drawCircle(cx+r*0.04f,cy+r*0.12f,r,p);p.setShader(null);

                  // Secim parlama halkasi
                  if(sel){
                      p.setColor(0xDDFFD700);p.setStyle(Paint.Style.STROKE);
                      p.setStrokeWidth(r*0.1f);
                      cv.drawCircle(cx,cy,r+r*0.08f,p);
                      p.setStyle(Paint.Style.FILL);
                  }

                  // --- Radyal gradyan tabani ---
                  // Dis kenar (en koyu)
                  p.setShader(new RadialGradient(cx,cy,r,new int[]{r2,out},null,Shader.TileMode.CLAMP));
                  cv.drawCircle(cx,cy,r,p);p.setShader(null);

                  // Konsantrik halkalar — yuze basmali cizgi efekti
                  float rr=r*0.95f;
                  drawRing(cv,cx,cy,rr,rr*0.07f,out);       // dis halka
                  drawRing(cv,cx,cy,rr*0.84f,rr*0.06f,r1);  // 2. halka
                  drawRing(cv,cx,cy,rr*0.68f,rr*0.06f,r2);  // 3. halka
                  drawRing(cv,cx,cy,rr*0.50f,rr*0.05f,r3);  // 4. halka
                  drawRing(cv,cx,cy,rr*0.32f,rr*0.05f,r4);  // 5. halka

                  // Orta dolu alan — 3D ust yuzey gradyani
                  float tx=cx-r*0.22f,ty=cy-r*0.22f;
                  p.setShader(new RadialGradient(tx,ty,r*1.1f,
                      new int[]{sh,ctr,r4,r3},new float[]{0f,0.2f,0.6f,1f},Shader.TileMode.CLAMP));
                  cv.drawCircle(cx,cy,rr*0.26f,p);p.setShader(null);

                  // Merkez parlak nokta
                  p.setShader(new RadialGradient(tx,ty,r*0.25f,
                      new int[]{0xBBFFFFFF,0x00FFFFFF},null,Shader.TileMode.CLAMP));
                  cv.drawCircle(tx+r*0.05f,ty+r*0.05f,r*0.22f,p);p.setShader(null);

                  // Dame (tas uzerinde altin cornel/halka)
                  if(king){
                      p.setColor(0xFFFFD700);p.setStyle(Paint.Style.STROKE);
                      p.setStrokeWidth(r*0.09f);
                      cv.drawCircle(cx,cy,rr*0.42f,p);
                      cv.drawCircle(cx,cy,rr*0.22f,p);
                      p.setStyle(Paint.Style.FILL);
                      p.setColor(0xCCFFD700);cv.drawCircle(cx,cy,rr*0.12f,p);
                  }
              }

              private void drawRing(Canvas cv,float cx,float cy,float r,float w,int color){
                  p.setColor(color);p.setStyle(Paint.Style.STROKE);p.setStrokeWidth(w);
                  // Hafif golge efekti icin ince ic cizgi
                  cv.drawCircle(cx,cy,r,p);
                  // Alt-sag daha koyu (3D derinlik)
                  p.setColor(color&0x80FFFFFF);p.setStrokeWidth(w*0.6f);
                  cv.drawArc(new RectF(cx-r,cy-r,cx+r,cy+r),30,180,false,p);
                  p.setStyle(Paint.Style.FILL);
              }

              private void drawDot(Canvas cv,float cx,float cy,boolean normal){
                  float dr=cs*0.18f;
                  p.setShader(new RadialGradient(cx,cy,dr,
                      new int[]{normal?0xCCFFD700:0xCCFF4400,normal?0x44FFD700:0x44FF4400},
                      null,Shader.TileMode.CLAMP));
                  cv.drawCircle(cx,cy,dr,p);p.setShader(null);
              }

              private boolean isSel(int r,int c){return sel!=null&&sel[0]==r&&sel[1]==c;}
              private boolean isLast(int r,int c){
                  return(lastFrom!=null&&lastFrom[0]==r&&lastFrom[1]==c)||
                        (lastTo!=null&&lastTo[0]==r&&lastTo[1]==c);
              }
              private GameEngine.Move validAt(int r,int c){
                  for(GameEngine.Move m:valid)if(m.to[0]==r&&m.to[1]==c)return m;return null;
              }
              public void setEngine(GameEngine e){eng=e;invalidate();}
              public void select(int[]s,List<GameEngine.Move>v){sel=s;valid=v!=null?v:new ArrayList<>();invalidate();}
              public void clearSel(){sel=null;valid.clear();invalidate();}
              public void setLast(int[]f,int[]t){lastFrom=f;lastTo=t;invalidate();}
              public void setListener(Listener l){lst=l;}
              public void refresh(){invalidate();}
          }

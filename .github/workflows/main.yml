package com.dama.game;
import android.animation.ValueAnimator;
import android.content.Context;
import android.graphics.*;
import android.util.AttributeSet;
import android.view.*;
import android.view.animation.AccelerateDecelerateInterpolator;
import java.util.ArrayList;
import java.util.List;
public class BoardView extends View {
    private static final int CL=0xFFD4A843,CD=0xFF5C2C0A,CB=0xFF3D1A04,CF=0xFF8B4513;
    private static final int CS=0x6039FF85,CV=0x4039FF85,CC=0x60FF4466,CLM=0x40FFFFFF;
    private static final int P1D=0xFF1A1410,P1L=0xFF6B5A48,P2D=0xFFD0C8B8,P2L=0xFFFFFAF0,CK=0xFFFFD700;
    private Paint cp=new Paint(),pp=new Paint(Paint.ANTI_ALIAS_FLAG),hp=new Paint(Paint.ANTI_ALIAS_FLAG);
    private Paint tp=new Paint(Paint.ANTI_ALIAS_FLAG),fp=new Paint(Paint.ANTI_ALIAS_FLAG);
    private Paint bp=new Paint(Paint.ANTI_ALIAS_FLAG),sp=new Paint(Paint.ANTI_ALIAS_FLAG),dp=new Paint(Paint.ANTI_ALIAS_FLAG);
    private Paint kp=new Paint(Paint.ANTI_ALIAS_FLAG);
    private GameEngine engine;
    private int[]selected=null;private List<GameEngine.Move>validMoves=new ArrayList<>();
    private int[]lastFrom=null,lastTo=null;
    private float cellSize,offsetX,offsetY;
    private BoardListener listener;
    private float aFR=-1,aFC=-1,aTR=-1,aTC=-1;private int aPiece=0;
    private boolean isAnim=false;private float aProgress=1f;
    public interface BoardListener{void onCellTapped(int row,int col);}
    public BoardView(Context c){super(c);init();}
    public BoardView(Context c,AttributeSet a){super(c,a);init();}
    public BoardView(Context c,AttributeSet a,int s){super(c,a,s);init();}
    private void init(){
        fp.setColor(CF);bp.setColor(CB);bp.setStyle(Paint.Style.STROKE);
        sp.setColor(0x66000000);sp.setMaskFilter(new BlurMaskFilter(10,BlurMaskFilter.Blur.NORMAL));
        tp.setTextAlign(Paint.Align.CENTER);dp.setAntiAlias(true);
        kp.setColor(0xAAD4A843);kp.setTextAlign(Paint.Align.CENTER);
        setOnTouchListener((v,e)->{
            if(e.getAction()==MotionEvent.ACTION_UP&&!isAnim){
                int col=(int)((e.getX()-offsetX)/cellSize),row=(int)((e.getY()-offsetY)/cellSize);
                if(row>=0&&row<8&&col>=0&&col<8&&listener!=null)listener.onCellTapped(row,col);
                performClick();
            }return true;
        });
    }
    @Override protected void onDraw(Canvas canvas){
        super.onDraw(canvas);if(engine==null)return;
        int size=Math.min(getWidth(),getHeight());float pad=26f;
        cellSize=(size-pad*2)/8f;offsetX=(getWidth()-size)/2f+pad;offsetY=(getHeight()-size)/2f+pad;
        canvas.drawRect(offsetX-pad,offsetY-pad,offsetX+8*cellSize+pad,offsetY+8*cellSize+pad,fp);
        kp.setTextSize(pad*0.55f);
        String[]lts={"A","B","C","D","E","F","G","H"},nms={"8","7","6","5","4","3","2","1"};
        for(int i=0;i<8;i++){
            canvas.drawText(lts[i],offsetX+i*cellSize+cellSize/2,offsetY-pad*0.35f,kp);
            canvas.drawText(nms[i],offsetX-pad*0.55f,offsetY+i*cellSize+cellSize/2+kp.getTextSize()*0.35f,kp);
        }
        for(int r=0;r<8;r++)for(int c=0;c<8;c++){
            float l=offsetX+c*cellSize,t=offsetY+r*cellSize;RectF rect=new RectF(l,t,l+cellSize,t+cellSize);
            cp.setColor((r+c)%2==0?CL:CD);canvas.drawRect(rect,cp);
            if(isLastMove(r,c)){hp.setColor(CLM);canvas.drawRect(rect,hp);}
            if(isSel(r,c)){hp.setColor(CS);canvas.drawRect(rect,hp);}
            GameEngine.Move vm=getVM(r,c);
            if(vm!=null){hp.setColor(vm.captures.isEmpty()?CV:CC);canvas.drawRect(rect,hp);
                dp.setColor(vm.captures.isEmpty()?0xBB2ECC71:0xBBFF4466);canvas.drawCircle(l+cellSize/2,t+cellSize/2,cellSize*0.15f,dp);}
        }
        bp.setStrokeWidth(0.6f);bp.setColor(CB);
        for(int i=0;i<=8;i++){canvas.drawLine(offsetX+i*cellSize,offsetY,offsetX+i*cellSize,offsetY+8*cellSize,bp);canvas.drawLine(offsetX,offsetY+i*cellSize,offsetX+8*cellSize,offsetY+i*cellSize,bp);}
        bp.setStrokeWidth(3f);canvas.drawRect(offsetX,offsetY,offsetX+8*cellSize,offsetY+8*cellSize,bp);
        for(int r=0;r<8;r++)for(int c=0;c<8;c++){
            int piece=engine.board[r][c];if(piece==GameEngine.EMPTY)continue;
            if(isAnim&&aFR==r&&aFC==c)continue;
            drawPiece(canvas,offsetX+c*cellSize+cellSize/2,offsetY+r*cellSize+cellSize/2,piece,isSel(r,c));
        }
        if(isAnim&&aProgress<1f){
            float fX=offsetX+aFC*cellSize+cellSize/2,fY=offsetY+aFR*cellSize+cellSize/2;
            float tX=offsetX+aTC*cellSize+cellSize/2,tY=offsetY+aTR*cellSize+cellSize/2;
            drawPiece(canvas,fX+(tX-fX)*aProgress,fY+(tY-fY)*aProgress,aPiece,false);
        }
    }
    private void drawPiece(Canvas canvas,float cx,float cy,int piece,boolean sel){
        boolean isP1=piece==GameEngine.P1||piece==GameEngine.P1K;
        boolean isKing=piece==GameEngine.P1K||piece==GameEngine.P2K;
        float pr=cellSize*0.40f,prs=sel?pr*1.08f:pr;
        canvas.drawCircle(cx+2.5f,cy+4f,prs*0.92f,sp);
        RadialGradient g=new RadialGradient(cx-prs*0.28f,cy-prs*0.28f,prs*1.1f,isP1?P1L:P2L,isP1?P1D:P2D,Shader.TileMode.CLAMP);
        pp.setShader(g);pp.setStyle(Paint.Style.FILL);canvas.drawCircle(cx,cy,prs,pp);pp.setShader(null);
        pp.setColor(isP1?0x44FFFFFF:0x55FFFFFF);pp.setStyle(Paint.Style.STROKE);pp.setStrokeWidth(1.5f);canvas.drawCircle(cx,cy,prs,pp);pp.setStyle(Paint.Style.FILL);
        if(sel){pp.setColor(0xAA2ECC71);pp.setStyle(Paint.Style.STROKE);pp.setStrokeWidth(3f);canvas.drawCircle(cx,cy,prs+4,pp);pp.setStyle(Paint.Style.FILL);}
        if(isKing){tp.setTextSize(prs*1.05f);tp.setColor(CK);Paint.FontMetrics fm=tp.getFontMetrics();canvas.drawText("\u265B",cx,cy-(fm.ascent+fm.descent)/2f,tp);}
    }
    public void animateMove(int fr,int fc,int tr,int tc,int piece,Runnable onDone){
        aFR=fr;aFC=fc;aTR=tr;aTC=tc;aPiece=piece;isAnim=true;
        ValueAnimator va=ValueAnimator.ofFloat(0f,1f);va.setDuration(220);va.setInterpolator(new AccelerateDecelerateInterpolator());
        va.addUpdateListener(a->{aProgress=(float)a.getAnimatedValue();invalidate();});
        va.addListener(new android.animation.AnimatorListenerAdapter(){
            @Override public void onAnimationEnd(android.animation.Animator a){isAnim=false;aProgress=1f;invalidate();if(onDone!=null)onDone.run();}
        });va.start();
    }
    private boolean isSel(int r,int c){return selected!=null&&selected[0]==r&&selected[1]==c;}
    private boolean isLastMove(int r,int c){return(lastFrom!=null&&lastFrom[0]==r&&lastFrom[1]==c)||(lastTo!=null&&lastTo[0]==r&&lastTo[1]==c);}
    private GameEngine.Move getVM(int r,int c){for(GameEngine.Move m:validMoves)if(m.to[0]==r&&m.to[1]==c)return m;return null;}
    public void setEngine(GameEngine e){engine=e;invalidate();}
    public void setSelected(int[]sel,List<GameEngine.Move>moves){selected=sel;validMoves=moves!=null?moves:new ArrayList<>();invalidate();}
    public void setLastMove(int[]from,int[]to){lastFrom=from;lastTo=to;}
    public void clearSelection(){selected=null;validMoves.clear();invalidate();}
    public void setListener(BoardListener l){listener=l;}
    public void refresh(){invalidate();}
    @Override public boolean performClick(){return super.performClick();}
}

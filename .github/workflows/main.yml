          package com.dama.game;

          import android.content.Context;
          import android.net.nsd.NsdManager;
          import android.net.nsd.NsdServiceInfo;
          import android.os.Handler;
          import android.os.Looper;
          import java.net.ServerSocket;

          /**
           * WiFi LAN üzerinde otomatik oyuncu keşfi.
           * NSD (Network Service Discovery) kullanır - IP adresi girmeden eşleşme.
           */
          public class NsdHelper {
              private static final String SERVICE_TYPE = "_dama._tcp.";
              private static final String SERVICE_NAME = "DamaGame";

              private NsdManager nsdManager;
              private NsdManager.RegistrationListener regListener;
              private NsdManager.DiscoveryListener discListener;
              private NsdManager.ResolveListener resolveListener;
              private Handler handler = new Handler(Looper.getMainLooper());

              private String registeredName;
              private int localPort;
              private NsdCallback callback;
              private boolean discovering = false;

              public interface NsdCallback {
                  void onServiceRegistered(int port);
                  void onPlayerFound(String name, String host, int port);
                  void onPlayerLost(String name);
                  void onError(String msg);
              }

              public NsdHelper(Context ctx, NsdCallback cb) {
                  nsdManager = (NsdManager) ctx.getSystemService(Context.NSD_SERVICE);
                  callback = cb;
              }

              public void registerService(String playerName) {
                  try {
                      ServerSocket ss = new ServerSocket(0);
                      localPort = ss.getLocalPort();
                      ss.close();
                  } catch (Exception e) {
                      localPort = 54321;
                  }

                  NsdServiceInfo info = new NsdServiceInfo();
                  info.setServiceName(SERVICE_NAME + "_" + playerName);
                  info.setServiceType(SERVICE_TYPE);
                  info.setPort(localPort);

                  regListener = new NsdManager.RegistrationListener() {
                      @Override public void onServiceRegistered(NsdServiceInfo i) {
                          registeredName = i.getServiceName();
                          handler.post(() -> callback.onServiceRegistered(localPort));
                      }
                      @Override public void onRegistrationFailed(NsdServiceInfo i, int code) {
                          handler.post(() -> callback.onError("Kayıt hatası: " + code));
                      }
                      @Override public void onServiceUnregistered(NsdServiceInfo i) {}
                      @Override public void onUnregistrationFailed(NsdServiceInfo i, int code) {}
                  };
                  nsdManager.registerService(info, NsdManager.PROTOCOL_DNS_SD, regListener);
              }

              public void discoverServices() {
                  if (discovering) return;
                  discovering = true;
                  discListener = new NsdManager.DiscoveryListener() {
                      @Override public void onDiscoveryStarted(String type) {}
                      @Override public void onServiceFound(NsdServiceInfo info) {
                          if (!info.getServiceType().equals(SERVICE_TYPE)) return;
                          if (registeredName != null && info.getServiceName().equals(registeredName)) return;
                          nsdManager.resolveService(info, makeResolveListener());
                      }
                      @Override public void onServiceLost(NsdServiceInfo info) {
                          handler.post(() -> callback.onPlayerLost(info.getServiceName()));
                      }
                      @Override public void onDiscoveryStopped(String type) { discovering = false; }
                      @Override public void onStartDiscoveryFailed(String type, int code) {
                          discovering = false;
                          handler.post(() -> callback.onError("Keşif hatası: " + code));
                      }
                      @Override public void onStopDiscoveryFailed(String type, int code) { discovering = false; }
                  };
                  nsdManager.discoverServices(SERVICE_TYPE, NsdManager.PROTOCOL_DNS_SD, discListener);
              }

              private NsdManager.ResolveListener makeResolveListener() {
                  return new NsdManager.ResolveListener() {
                      @Override public void onResolveFailed(NsdServiceInfo i, int code) {}
                      @Override public void onServiceResolved(NsdServiceInfo i) {
                          String name = i.getServiceName();
                          String host = i.getHost().getHostAddress();
                          int port = i.getPort();
                          handler.post(() -> callback.onPlayerFound(name, host, port));
                      }
                  };
              }

              public void tearDown() {
                  try {
                      if (regListener != null) nsdManager.unregisterService(regListener);
                  } catch (Exception ignored) {}
                  try {
                      if (discListener != null && discovering) {
                          nsdManager.stopServiceDiscovery(discListener);
                          discovering = false;
                      }
                  } catch (Exception ignored) {}
              }

              public int getLocalPort() { return localPort; }
          }
          NSD_EOF


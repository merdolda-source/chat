package com.dama.game;
import android.content.Context;
import android.net.nsd.NsdManager;
import android.net.nsd.NsdServiceInfo;
import android.os.Handler;
import android.os.Looper;
import java.net.ServerSocket;
public class NsdHelper {
    private static final String TYPE="_dama._tcp.";
    private static final String PREFIX="DamaGame_";
    private NsdManager nsd;
    private NsdManager.RegistrationListener regL;
    private NsdManager.DiscoveryListener discL;
    private Handler h=new Handler(Looper.getMainLooper());
    private String regName;private int port;private NsdCallback cb;private boolean disc=false;
    public interface NsdCallback{void onServiceRegistered(int port);void onPlayerFound(String name,String host,int port);void onPlayerLost(String name);void onError(String msg);}
    public NsdHelper(Context ctx,NsdCallback c){nsd=(NsdManager)ctx.getSystemService(Context.NSD_SERVICE);cb=c;}
    public void registerService(String name){
        try{ServerSocket ss=new ServerSocket(0);port=ss.getLocalPort();ss.close();}catch(Exception e){port=54321;}
        NsdServiceInfo info=new NsdServiceInfo();info.setServiceName(PREFIX+name);info.setServiceType(TYPE);info.setPort(port);
        regL=new NsdManager.RegistrationListener(){
            @Override public void onServiceRegistered(NsdServiceInfo i){regName=i.getServiceName();h.post(()->cb.onServiceRegistered(port));}
            @Override public void onRegistrationFailed(NsdServiceInfo i,int c){h.post(()->cb.onError("Kayit hatasi: "+c));}
            @Override public void onServiceUnregistered(NsdServiceInfo i){}
            @Override public void onUnregistrationFailed(NsdServiceInfo i,int c){}
        };
        nsd.registerService(info,NsdManager.PROTOCOL_DNS_SD,regL);
    }
    public void discoverServices(){
        if(disc)return;disc=true;
        discL=new NsdManager.DiscoveryListener(){
            @Override public void onDiscoveryStarted(String t){}
            @Override public void onServiceFound(NsdServiceInfo info){
                if(!info.getServiceType().equals(TYPE))return;
                if(regName!=null&&info.getServiceName().equals(regName))return;
                nsd.resolveService(info,new NsdManager.ResolveListener(){
                    @Override public void onResolveFailed(NsdServiceInfo i,int c){}
                    @Override public void onServiceResolved(NsdServiceInfo i){
                        String n=i.getServiceName().replace(PREFIX,"");String host=i.getHost().getHostAddress();int p=i.getPort();
                        h.post(()->cb.onPlayerFound(n,host,p));
                    }
                });
            }
            @Override public void onServiceLost(NsdServiceInfo i){h.post(()->cb.onPlayerLost(i.getServiceName()));}
            @Override public void onDiscoveryStopped(String t){disc=false;}
            @Override public void onStartDiscoveryFailed(String t,int c){disc=false;h.post(()->cb.onError("Kesif hatasi: "+c));}
            @Override public void onStopDiscoveryFailed(String t,int c){disc=false;}
        };
        nsd.discoverServices(TYPE,NsdManager.PROTOCOL_DNS_SD,discL);
    }
    public void tearDown(){try{if(regL!=null)nsd.unregisterService(regL);}catch(Exception ignored){}try{if(discL!=null&&disc){nsd.stopServiceDiscovery(discL);disc=false;}}catch(Exception ignored){}}
    public int getLocalPort(){return port;}
}

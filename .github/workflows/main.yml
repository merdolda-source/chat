name: "DAMA X — Build APK (Tam Versiyon v1.2.0)"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: 'GitHub Release oluştur?'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────────────
      # 1. CHECKOUT
      # ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────
      # 2. JDK
      # ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─────────────────────────────────────────────────────────────
      # 3. PROJE YAPISI OLUŞTUR
      # ─────────────────────────────────────────────────────────────
      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/damax/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p gradle/wrapper
          echo "Dizinler oluşturuldu"

      # ─── settings.gradle ───────────────────────────────────────
      - name: Write settings.gradle
        run: |
          cat > settings.gradle << 'SETTINGS_EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "DamaX"
          include ':app'
          SETTINGS_EOF

      # ─── build.gradle (root) ──────────────────────────────────
      - name: Write root build.gradle
        run: |
          cat > build.gradle << 'ROOT_GRADLE_EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          ROOT_GRADLE_EOF

      # ─── gradle.properties ────────────────────────────────────
      - name: Write gradle.properties
        run: |
          cat > gradle.properties << 'GRADLE_PROPS_EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          GRADLE_PROPS_EOF

      # ─── gradle wrapper ───────────────────────────────────────
      - name: Write gradle wrapper
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'WRAPPER_EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          networkTimeout=10000
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          WRAPPER_EOF

      # ─── Download wrapper jar ─────────────────────────────────
      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar

      # ─── gradlew ──────────────────────────────────────────────
      - name: Write gradlew
        run: |
          cat > gradlew << 'GRADLEW_EOF'
          #!/bin/sh
          GRADLE_OPTS="${GRADLE_OPTS:-}" exec "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" "$@" 2>/dev/null || gradle "$@"
          GRADLEW_EOF
          chmod +x gradlew

      # ─── app/build.gradle ─────────────────────────────────────
      - name: Write app/build.gradle
        run: |
          cat > app/build.gradle << 'APP_GRADLE_EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.damax.game'
              compileSdk 34
              defaultConfig {
                  applicationId "com.damax.game"
                  minSdk 24
                  targetSdk 34
                  versionCode 2
                  versionName "1.2.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      debuggable true
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              buildFeatures { viewBinding true }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
          }
          APP_GRADLE_EOF

      # ─── proguard-rules.pro ───────────────────────────────────
      - name: Write proguard rules
        run: echo "-keep class com.damax.game.** { *; }" > app/proguard-rules.pro

      # ─── AndroidManifest.xml ──────────────────────────────────
      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:hardwareAccelerated="true"
                  android:theme="@style/Theme.DamaX"
                  xmlns:tools="http://schemas.android.com/tools"
                  tools:replace="android:icon,android:roundIcon">
                  <activity android:name=".SplashActivity"
                      android:exported="true"
                      android:screenOrientation="portrait"
                      android:theme="@style/Theme.DamaX.Splash">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".MainActivity"
                      android:exported="false"
                      android:screenOrientation="portrait"/>
                  <activity android:name=".GameActivity"
                      android:exported="false"
                      android:screenOrientation="portrait"/>
                  <activity android:name=".LobbyActivity"
                      android:exported="false"
                      android:screenOrientation="portrait"/>
              </application>
          </manifest>
          MANIFEST_EOF

      # ─── strings.xml ──────────────────────────────────────────
      - name: Write strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'STRINGS_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">DAMA X</string>
              <string name="app_subtitle">Klasik Türk Daması</string>
              <string name="vs_ai">🤖 AI ile Oyna</string>
              <string name="vs_local">👥 Lokal 2 Kişi</string>
              <string name="online">🌐 Online Oyna (Aynı WiFi)</string>
              <string name="settings">⚙ Ayarlar</string>
              <string name="create_room">Oda Oluştur</string>
              <string name="join_room">Odaya Katıl</string>
              <string name="your_turn">✦ Senin Sıran!</string>
              <string name="opponent_turn">Rakip düşünüyor…</string>
              <string name="resign">🏳 Teslim Ol</string>
              <string name="undo">↩ Geri Al</string>
              <string name="send">➤ Gönder</string>
              <string name="chat_hint">Mesaj yazın…</string>
              <string name="room_code_hint">Oda Kodu (örn: ABC123)</string>
              <string name="player_name_hint">Kullanıcı Adınız</string>
              <string name="server_ip_hint">Sunucu IP (örn: 192.168.1.5)</string>
              <string name="easy">Kolay</string>
              <string name="medium">Orta</string>
              <string name="hard">Zor</string>
              <string name="game_over">Oyun Bitti</string>
              <string name="wins">Kazandı!</string>
              <string name="play_again">🔄 Tekrar Oyna</string>
              <string name="main_menu">🏠 Ana Menü</string>
              <string name="forced_capture">⚠ Zorunlu yeme var!</string>
              <string name="not_your_turn">Sıra sende değil</string>
              <string name="waiting_opponent">Rakip bekleniyor…</string>
              <string name="opponent_left">Rakip oyundan ayrıldı!</string>
              <string name="king_promoted">♛ Dame oldu!</string>
              <string name="connect">Bağlan</string>
              <string name="connecting">Bağlanılıyor…</string>
              <string name="connected">● Bağlı</string>
              <string name="disconnected">○ Bağlantı Kesildi</string>
              <string name="sound">Ses Efektleri</string>
              <string name="vibration">Titreşim</string>
              <string name="animations">Animasyonlar</string>
              <string name="ai_difficulty">AI Zorluğu</string>
              <string name="server_address">Sunucu Adresi</string>
              <string name="open_rooms">Açık Odalar</string>
              <string name="no_rooms">Açık oda bulunamadı</string>
              <string name="version">v1.2.0</string>
              <string name="resign_confirm">Teslim olmak istediğinizden emin misiniz?</string>
              <string name="yes">Evet</string>
              <string name="no">Hayır</string>
              <string name="room_created">Oda oluşturuldu: </string>
              <string name="p1_label">🔴 Kırmızı</string>
              <string name="p2_label">🔵 Mavi</string>
              <string name="pieces">taş</string>
              <string name="nickname_title">Hoş Geldin!</string>
              <string name="nickname_hint">Kullanıcı adınızı girin</string>
              <string name="nickname_save">Kaydet ve Başla</string>
              <string name="winner_title">🏆 Kazanan</string>
          </resources>
          STRINGS_EOF

      # ─── colors.xml (ahşap tema) ──────────────────────────────
      - name: Write colors.xml
        run: |
          cat > app/src/main/res/values/colors.xml << 'COLORS_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg_deep">#FF050810</color>
              <color name="bg_panel">#FF0F1830</color>
              <color name="glass">#CC111828</color>
              <color name="gold">#FFC9A84C</color>
              <color name="gold_light">#FFF0D080</color>
              <color name="neon">#FF39FF85</color>
              <color name="p1_bright">#FFFFC107</color>
              <color name="p1_dark">#FFCC1133</color>
              <color name="p2_bright">#FF88BBFF</color>
              <color name="p2_dark">#FF1144CC</color>
              <color name="text_primary">#FFE8E0CC</color>
              <color name="text_secondary">#FF6A6050</color>
              <color name="error">#FFFF4466</color>
              <color name="cell_light">#FFF5E8C7</color>
              <color name="cell_dark">#FF8B5A2B</color>
              <color name="border_gold">#44C9A84C</color>
          </resources>
          COLORS_EOF

      # ─── themes.xml ───────────────────────────────────────────
      - name: Write themes.xml
        run: |
          cat > app/src/main/res/values/themes.xml << 'THEMES_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.DamaX" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/gold</item>
                  <item name="android:colorBackground">@color/bg_deep</item>
                  <item name="android:statusBarColor">@color/bg_deep</item>
                  <item name="android:navigationBarColor">@color/bg_deep</item>
                  <item name="android:textColor">@color/text_primary</item>
              </style>
              <style name="Theme.DamaX.Splash" parent="Theme.DamaX">
                  <item name="android:windowFullscreen">true</item>
              </style>
              <style name="Widget.DamaX.Button" parent="Widget.MaterialComponents.Button">
                  <item name="backgroundTint">@color/glass</item>
                  <item name="android:textColor">@color/gold</item>
                  <item name="strokeColor">@color/border_gold</item>
                  <item name="strokeWidth">1dp</item>
                  <item name="cornerRadius">12dp</item>
              </style>
              <style name="Widget.DamaX.Button.Primary" parent="Widget.DamaX.Button">
                  <item name="backgroundTint">#1A2A1A</item>
                  <item name="android:textColor">@color/neon</item>
              </style>
              <style name="Widget.DamaX.Button.Danger" parent="Widget.DamaX.Button">
                  <item name="backgroundTint">#2A0A10</item>
                  <item name="android:textColor">@color/error</item>
              </style>
          </resources>
          THEMES_EOF

      # ─── drawables (ahşap tahta + icon) ───────────────────────
      - name: Write drawables
        run: |
          cat > app/src/main/res/drawable/bg_gradient.xml << 'BG_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:startColor="#050810" android:endColor="#0A1528" android:angle="135" android:type="linear"/>
          </shape>
          BG_EOF

          cat > app/src/main/res/drawable/bg_card.xml << 'CARD_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:startColor="#0F1830" android:endColor="#0A1220" android:angle="135"/>
              <stroke android:width="1dp" android:color="#44C9A84C"/>
              <corners android:radius="14dp"/>
          </shape>
          CARD_EOF

          cat > app/src/main/res/drawable/cell_light.xml << 'CELL_LIGHT'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#FFF5E8C7"/>
          </shape>
          CELL_LIGHT

          cat > app/src/main/res/drawable/cell_dark.xml << 'CELL_DARK'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#FF8B5A2B"/>
          </shape>
          CELL_DARK

          # Adaptive icon (resimdeki gibi)
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'ICON_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#050810" android:pathData="M0,0h108v108H0z"/>
            <path android:fillColor="#0F1830" android:pathData="M18,18h72v72H18z"/>
            <circle android:fillColor="#CC1133" cx="36" cy="36" r="11"/>
            <circle android:fillColor="#FF889966" cx="32" cy="32" r="5"/>
            <circle android:fillColor="#1144CC" cx="72" cy="72" r="11"/>
            <circle android:fillColor="#88BBFF66" cx="68" cy="68" r="5"/>
          </vector>
          ICON_EOF

          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'ICONBG_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#050810"/>
          </shape>
          ICONBG_EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'ADAPTIVE_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          ADAPTIVE_EOF
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

          python3 - << 'PYICON_EOF'
          import struct, zlib, os
          def make_png(size, bg):
              w = h = size
              raw = []
              for y in range(h):
                  row = [0]
                  for x in range(w):
                      cx, cy = w/2.0, h/2.0
                      dist = ((x-cx)**2 + (y-cy)**2)**0.5
                      r2, g2, b2, a2 = bg[0], bg[1], bg[2], 255
                      if ((x-w*0.33)**2+(y-h*0.33)**2) < (w*0.16)**2: r2,g2,b2 = 204,17,51
                      if ((x-w*0.67)**2+(y-h*0.67)**2) < (w*0.16)**2: r2,g2,b2 = 17,68,204
                      if (w*0.44 < dist < w*0.48): r2,g2,b2 = 201,168,76
                      row += [r2, g2, b2, a2]
                  raw.append(bytes(row))
              def chunk(tag, data):
                  c = zlib.crc32(tag + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + tag + data + struct.pack('>I', c)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              compressed = zlib.compress(b''.join(raw))
              return (b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', compressed) + chunk(b'IEND', b''))
          configs = {'mipmap-hdpi':48,'mipmap-xhdpi':72,'mipmap-xxhdpi':96,'mipmap-xxxhdpi':144}
          bg = (15, 24, 48)
          for folder, size in configs.items():
              path = f'app/src/main/res/{folder}'
              os.makedirs(path, exist_ok=True)
              png = make_png(size, bg)
              for name in ['ic_launcher.png', 'ic_launcher_round.png']:
                  with open(f'{path}/{name}', 'wb') as f: f.write(png)
          PYICON_EOF
          echo "Drawables tamamlandı"

      # ─── Layout dosyaları (tam) ───────────────────────────────
      - name: Write layout files
        run: |
          cat > app/src/main/res/layout/activity_splash.xml << 'SPLASH_LAYOUT_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="@drawable/bg_gradient">
              <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:layout_gravity="center" android:orientation="vertical" android:gravity="center">
                  <TextView android:id="@+id/tvLogo" android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="♟" android:textSize="90sp" android:textColor="@color/gold"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="DAMA X" android:textSize="42sp" android:textStyle="bold"
                      android:textColor="@color/gold_light"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="KLASİK TÜRK DAMASI" android:textSize="16sp" android:textColor="@color/neon"/>
              </LinearLayout>
          </FrameLayout>
          SPLASH_LAYOUT_EOF

          cat > app/src/main/res/layout/activity_main.xml << 'MAIN_LAYOUT_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="@drawable/bg_gradient"
              android:gravity="center">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="♟" android:textSize="72sp" android:textColor="@color/gold"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="DAMA X" android:textSize="36sp" android:textStyle="bold"
                  android:textColor="@color/gold_light"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="KLASİK TÜRK DAMASI" android:textSize="14sp"
                  android:textColor="@color/neon" android:layout_marginBottom="50dp"/>
              <LinearLayout android:layout_width="300dp" android:layout_height="wrap_content"
                  android:orientation="vertical" android:padding="24dp" android:background="@drawable/bg_card">
                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/btnVsAI" style="@style/Widget.DamaX.Button.Primary"
                      android:layout_width="match_parent" android:layout_height="56dp"
                      android:text="@string/vs_ai" android:layout_marginBottom="12dp"/>
                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/btnVsLocal" style="@style/Widget.DamaX.Button"
                      android:layout_width="match_parent" android:layout_height="56dp"
                      android:text="@string/vs_local" android:layout_marginBottom="12dp"/>
                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/btnOnline" style="@style/Widget.DamaX.Button"
                      android:layout_width="match_parent" android:layout_height="56dp"
                      android:text="@string/online" android:layout_marginBottom="12dp"/>
                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/btnSettings" style="@style/Widget.DamaX.Button"
                      android:layout_width="match_parent" android:layout_height="56dp"
                      android:text="@string/settings"/>
              </LinearLayout>
          </LinearLayout>
          MAIN_LAYOUT_EOF

          cat > app/src/main/res/layout/activity_lobby.xml << 'LOBBY_LAYOUT_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="@drawable/bg_gradient"
              android:padding="20dp">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="🌐 ONLINE (Aynı WiFi)" android:textSize="24sp" android:textStyle="bold"
                  android:textColor="@color/gold_light"/>
              <TextView android:id="@+id/tvConnectionStatus" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="@string/connecting"
                  android:textColor="@color/neon" android:layout_marginBottom="20dp"/>
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:orientation="vertical" android:background="@drawable/bg_card"
                  android:padding="16dp" android:layout_marginBottom="12dp">
                  <EditText android:id="@+id/etServerIP" android:layout_width="match_parent"
                      android:layout_height="52dp" android:hint="@string/server_ip_hint"
                      android:background="@drawable/bg_card" android:textColor="@color/text_primary"/>
                  <EditText android:id="@+id/etPlayerName" android:layout_width="match_parent"
                      android:layout_height="52dp" android:hint="@string/player_name_hint"
                      android:background="@drawable/bg_card" android:textColor="@color/text_primary"/>
                  <com.google.android.material.button.MaterialButton android:id="@+id/btnConnect"
                      style="@style/Widget.DamaX.Button.Primary" android:layout_width="match_parent"
                      android:layout_height="52dp" android:text="@string/connect"/>
              </LinearLayout>
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:orientation="horizontal" android:layout_marginBottom="12dp">
                  <com.google.android.material.button.MaterialButton android:id="@+id/btnCreateRoom"
                      style="@style/Widget.DamaX.Button" android:layout_width="0dp"
                      android:layout_height="52dp" android:layout_weight="1" android:text="@string/create_room"/>
                  <com.google.android.material.button.MaterialButton android:id="@+id/btnJoinRoom"
                      style="@style/Widget.DamaX.Button" android:layout_width="0dp"
                      android:layout_height="52dp" android:layout_weight="1" android:text="@string/join_room"/>
              </LinearLayout>
              <EditText android:id="@+id/etRoomCode" android:layout_width="match_parent"
                  android:layout_height="52dp" android:hint="@string/room_code_hint"
                  android:inputType="textCapCharacters" android:maxLength="8"
                  android:background="@drawable/bg_card"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"

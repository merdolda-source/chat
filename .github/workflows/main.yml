          package com.damax.game;
          import android.os.*;
          import com.google.gson.*;import okhttp3.*;
          import java.util.concurrent.TimeUnit;
          public class WsClient {
              public interface CB{void ok();void fail();void msg(String t,JsonObject d);}
              private OkHttpClient client;private WebSocket ws;private boolean conn=false;
              private Handler h=new Handler(Looper.getMainLooper());private CB cb;
              public WsClient(CB c){cb=c;client=new OkHttpClient.Builder()
                  .connectTimeout(10,TimeUnit.SECONDS).pingInterval(20,TimeUnit.SECONDS).build();}
              public void connect(String ip,int port){
                  Request req=new Request.Builder().url("ws://"+ip+":"+port+"/ws").build();
                  ws=client.newWebSocket(req,new WebSocketListener(){
                      public void onOpen(WebSocket w,Response r){conn=true;h.post(cb::ok);}
                      public void onMessage(WebSocket w,String t){try{
                          JsonObject o=JsonParser.parseString(t).getAsJsonObject();
                          String tp=o.get("type").getAsString();
                          h.post(()->cb.msg(tp,o));}catch(Exception ignored){}}
                      public void onClosed(WebSocket w,int c,String r){conn=false;h.post(cb::fail);}
                      public void onFailure(WebSocket w,Throwable t,Response r){conn=false;h.post(cb::fail);}
                  });
              }
              public void send(JsonObject o){if(ws!=null&&conn)ws.send(new Gson().toJson(o));}
              public void close(){if(ws!=null){ws.close(1000,"bye");ws=null;}conn=false;}
              public boolean connected(){return conn;}
          }

package com.dama.game;
import android.os.Handler;import android.os.Looper;
import com.google.gson.Gson;import com.google.gson.JsonObject;import com.google.gson.JsonParser;
import java.io.*;import java.net.*;
public class LanServer {
    private ServerSocket ss;private Socket cs;private PrintWriter out;
    private boolean running=false;private Handler h=new Handler(Looper.getMainLooper());
    private Gson gson=new Gson();private LanListener listener;
    public interface LanListener{void onClientConnected();void onMessage(String type,JsonObject data);void onClientDisconnected();}
    public LanServer(LanListener l){listener=l;}
    public void start(int port){running=true;new Thread(()->{
        try{ss=new ServerSocket(port);cs=ss.accept();
            out=new PrintWriter(new BufferedWriter(new OutputStreamWriter(cs.getOutputStream())),true);
            h.post(()->listener.onClientConnected());
            BufferedReader in=new BufferedReader(new InputStreamReader(cs.getInputStream()));
            String line;while(running&&(line=in.readLine())!=null){
                final String msg=line;try{JsonObject obj=JsonParser.parseString(msg).getAsJsonObject();String type=obj.get("type").getAsString();h.post(()->listener.onMessage(type,obj));}catch(Exception ignored){}
            }
        }catch(Exception e){if(running)h.post(()->listener.onClientDisconnected());}
    }).start();}
    public void send(JsonObject msg){if(out!=null)new Thread(()->out.println(gson.toJson(msg))).start();}
    public void stop(){running=false;try{if(cs!=null)cs.close();}catch(Exception ignored){}try{if(ss!=null)ss.close();}catch(Exception ignored){}}
}

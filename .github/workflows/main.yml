package com.dama.game;
import android.content.Intent;import android.os.Bundle;import android.widget.Toast;
import androidx.appcompat.app.AppCompatActivity;import androidx.recyclerview.widget.LinearLayoutManager;
import com.dama.game.databinding.ActivityLobbyBinding;import java.util.*;
public class LobbyActivity extends AppCompatActivity implements NsdHelper.NsdCallback {
    private ActivityLobbyBinding b;private PrefsManager prefs;private NsdHelper nsd;
    private PA playerAdapter;private int myPort=0;private boolean registered=false;private LanServer lobbyServer=null;
    static class PI{String name,host;int port;PI(String n,String h,int p){name=n;host=h;port=p;}}
    @Override protected void onCreate(Bundle s){
        super.onCreate(s);b=ActivityLobbyBinding.inflate(getLayoutInflater());setContentView(b.getRoot());
        prefs=new PrefsManager(this);b.etPlayerName.setText(prefs.getPlayerName());
        playerAdapter=new PA(this::join);b.rvPlayers.setLayoutManager(new LinearLayoutManager(this));b.rvPlayers.setAdapter(playerAdapter);
        nsd=new NsdHelper(this,this);
        b.btnHost.setOnClickListener(v->host());
        b.btnSearch.setOnClickListener(v->{save();nsd.discoverServices();b.tvStatus.setText("Agda araniyor...");});
    }
    private void save(){String n=b.etPlayerName.getText().toString().trim();if(n.isEmpty())n="Oyuncu";prefs.setPlayerName(n);}
    private void host(){save();if(registered){Toast.makeText(this,"Zaten kayit edildiniz",Toast.LENGTH_SHORT).show();return;}registered=true;nsd.registerService(prefs.getPlayerName());nsd.discoverServices();b.tvStatus.setText("Yayinlaniyor — rakip bekleniyor...");}
    private void join(PI p){if(lobbyServer!=null)lobbyServer.stop();nsd.tearDown();Intent i=new Intent(this,GameActivity.class);i.putExtra("mode","online");i.putExtra("isHost",false);i.putExtra("host",p.host);i.putExtra("port",p.port);i.putExtra("opponentName",p.name);startActivity(i);finish();}
    @Override public void onServiceRegistered(int port){
        myPort=port;runOnUiThread(()->b.tvStatus.setText("Yayinda (port "+port+") — rakip bekleniyor..."));
        lobbyServer=new LanServer(new LanServer.LanListener(){
            @Override public void onClientConnected(){runOnUiThread(()->{nsd.tearDown();Intent i=new Intent(LobbyActivity.this,GameActivity.class);i.putExtra("mode","online");i.putExtra("isHost",true);i.putExtra("port",myPort);i.putExtra("opponentName","Rakip");startActivity(i);finish();});}
            @Override public void onMessage(String t,com.google.gson.JsonObject d){}
            @Override public void onClientDisconnected(){}
        });lobbyServer.start(myPort);
    }
    @Override public void onPlayerFound(String name,String host,int port){runOnUiThread(()->{playerAdapter.add(new PI(name,host,port));b.tvStatus.setText(playerAdapter.getItemCount()+" oyuncu bulundu");});}
    @Override public void onPlayerLost(String name){runOnUiThread(()->playerAdapter.remove(name));}
    @Override public void onError(String msg){runOnUiThread(()->b.tvStatus.setText("Hata: "+msg));}
    @Override protected void onDestroy(){super.onDestroy();if(nsd!=null)nsd.tearDown();if(lobbyServer!=null)lobbyServer.stop();}
    static class PA extends androidx.recyclerview.widget.RecyclerView.Adapter<PA.VH> {
        interface OJ{void join(PI p);}private final List<PI>list=new ArrayList<>();private final OJ l;
        PA(OJ l){this.l=l;}
        void add(PI p){for(PI e:list)if(e.host.equals(p.host)&&e.port==p.port)return;list.add(p);notifyItemInserted(list.size()-1);}
        void remove(String n){list.removeIf(p->n.contains(p.name));notifyDataSetChanged();}
        @Override public VH onCreateViewHolder(android.view.ViewGroup parent,int t){return new VH(android.view.LayoutInflater.from(parent.getContext()).inflate(R.layout.item_player,parent,false));}
        @Override public void onBindViewHolder(VH h,int pos){PI p=list.get(pos);h.name.setText(p.name);h.ping.setText("Katil");h.itemView.setOnClickListener(v->l.join(p));}
        @Override public int getItemCount(){return list.size();}
        static class VH extends androidx.recyclerview.widget.RecyclerView.ViewHolder{android.widget.TextView name,ping;VH(android.view.View v){super(v);name=v.findViewById(R.id.tvPlayerName);ping=v.findViewById(R.id.tvPlayerPing);}}
    }
}

          package com.damax.game;

          import android.os.Handler;
          import android.os.Looper;
          import com.google.gson.Gson;
          import com.google.gson.JsonObject;
          import com.google.gson.JsonParser;
          import okhttp3.*;
          import java.util.concurrent.TimeUnit;

          public class WebSocketManager {
              private OkHttpClient client;
              private WebSocket webSocket;
              private Gson gson = new Gson();
              private Handler mainHandler = new Handler(Looper.getMainLooper());
              private WSListener listener;
              private boolean connected = false;

              public interface WSListener {
                  void onConnected();
                  void onDisconnected();
                  void onMessage(String type, JsonObject data);
                  void onError(String error);
              }

              public WebSocketManager(WSListener listener) {
                  this.listener = listener;
                  client = new OkHttpClient.Builder()
                      .connectTimeout(10, TimeUnit.SECONDS)
                      .readTimeout(30, TimeUnit.SECONDS)
                      .pingInterval(20, TimeUnit.SECONDS)
                      .build();
              }

              public void connect(String ip, int port) {
                  String url = "ws://" + ip + ":" + port + "/ws";
                  Request request = new Request.Builder().url(url).build();
                  webSocket = client.newWebSocket(request, new WebSocketListener() {
                      @Override public void onOpen(WebSocket ws, Response response) {
                          connected = true;
                          mainHandler.post(() -> listener.onConnected());
                      }
                      @Override public void onMessage(WebSocket ws, String text) {
                          try {
                              JsonObject obj = JsonParser.parseString(text).getAsJsonObject();
                              String type = obj.get("type").getAsString();
                              mainHandler.post(() -> listener.onMessage(type, obj));
                          } catch (Exception e) {
                              mainHandler.post(() -> listener.onError("Parse error: " + e.getMessage()));
                          }
                      }
                      @Override public void onClosed(WebSocket ws, int code, String reason) {
                          connected = false;
                          mainHandler.post(() -> listener.onDisconnected());
                      }
                      @Override public void onFailure(WebSocket ws, Throwable t, Response response) {
                          connected = false;
                          mainHandler.post(() -> listener.onError(t.getMessage()));
                      }
                  });
              }

              public void send(JsonObject obj) {
                  if (webSocket != null && connected)
                      webSocket.send(gson.toJson(obj));
              }

              public void sendType(String type) {
                  JsonObject obj = new JsonObject(); obj.addProperty("type", type); send(obj);
              }

              public void disconnect() {
                  if (webSocket != null) { webSocket.close(1000, "Bye"); webSocket = null; }
                  connected = false;
              }

              public boolean isConnected() { return connected; }
          }
          WSM_EOF


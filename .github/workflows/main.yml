          package com.dama.game;

          import android.app.AlertDialog;
          import android.app.Dialog;
          import android.os.Bundle;
          import android.os.Handler;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.recyclerview.widget.LinearLayoutManager;
          import androidx.recyclerview.widget.RecyclerView;
          import com.dama.game.databinding.ActivityGameBinding;
          import com.google.gson.JsonObject;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.Stack;

          public class GameActivity extends AppCompatActivity
                  implements BoardView.BoardListener, LanServer.LanListener {

              private ActivityGameBinding b;
              private GameEngine engine;
              private SoundManager sound;
              private PrefsManager prefs;
              private String gameMode;
              private int myColor = 1;
              private boolean myTurn = true;

              // LAN çok oyunculu
              private LanServer lanServer;
              private LanClient lanClient;
              private boolean isHost = false;
              private String opponentName = "Rakip";

              private int[] selected = null;
              private List<GameEngine.Move> validMoves = new ArrayList<>();
              private int[] captureChain = null;
              private Stack<GameState> undoStack = new Stack<>();
              private List<ChatMessage> chatMessages = new ArrayList<>();
              private ChatAdapter chatAdapter;

              static class GameState {
                  int[][] board; int player, p1Count, p2Count;
                  GameState(int[][] b, int p, int c1, int c2) {
                      board = new int[8][8];
                      for (int i = 0; i < 8; i++) System.arraycopy(b[i], 0, board[i], 0, 8);
                      player = p; p1Count = c1; p2Count = c2;
                  }
              }

              static class ChatMessage {
                  String sender, text; int color;
                  ChatMessage(String s, String t, int c) { sender = s; text = t; color = c; }
              }

              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  b = ActivityGameBinding.inflate(getLayoutInflater());
                  setContentView(b.getRoot());
                  prefs = new PrefsManager(this);
                  sound = new SoundManager(this);
                  engine = new GameEngine();
                  engine.aiDifficulty = prefs.getAiDifficulty();
                  gameMode = getIntent().getStringExtra("mode");
                  if (gameMode == null) gameMode = "ai";

                  isHost = getIntent().getBooleanExtra("isHost", false);
                  opponentName = getIntent().getStringExtra("opponentName");
                  if (opponentName == null) opponentName = "Rakip";

                  b.boardView.setEngine(engine);
                  b.boardView.setListener(this);
                  setupUI();

                  if ("online".equals(gameMode)) {
                      myColor = isHost ? 1 : 2;
                      myTurn = isHost;
                      if (isHost) {
                          int port = getIntent().getIntExtra("port", 54321);
                          lanServer = new LanServer(this);
                          lanServer.start(port);
                      } else {
                          String host = getIntent().getStringExtra("host");
                          int port = getIntent().getIntExtra("port", 54321);
                          lanClient = new LanClient(this);
                          lanClient.connect(host, port);
                      }
                  }
                  startNewGame();
              }

              private void setupUI() {
                  b.btnUndo.setOnClickListener(v -> undoMove());
                  b.btnResign.setOnClickListener(v -> confirmResign());
                  b.btnChat.setOnClickListener(v -> showChatDialog());
                  updatePlayerNames();
              }

              private void startNewGame() {
                  engine.initBoard();
                  selected = null; validMoves.clear(); captureChain = null;
                  undoStack.clear();
                  b.boardView.setLastMove(null, null);
                  b.boardView.clearSelection();
                  myTurn = "local".equals(gameMode) || myColor == 1;
                  updateCounters(); updateTurnInfo();
                  b.boardView.refresh();
              }

              @Override public void onCellTapped(int row, int col) {
                  if (!engine.gameActive) return;
                  if ("online".equals(gameMode) && !myTurn) {
                      showToast(getString(R.string.not_your_turn)); return;
                  }
                  int player = engine.currentPlayer;
                  int piece = engine.board[row][col];
                  boolean isMyPiece = (player == 1 && (piece == GameEngine.P1 || piece == GameEngine.P1K)) ||
                                      (player == 2 && (piece == GameEngine.P2 || piece == GameEngine.P2K));

                  if (captureChain != null) {
                      GameEngine.Move vm = getValidMoveAt(row, col);
                      if (vm != null) { executeMove(vm, true); return; }
                      return;
                  }

                  if (selected != null) {
                      GameEngine.Move vm = getValidMoveAt(row, col);
                      if (vm != null) { executeMove(vm, true); return; }
                      if (isMyPiece) { selectPiece(row, col); return; }
                      clearSelection(); return;
                  }

                  if (isMyPiece) {
                      List<GameEngine.Move> allMoves = engine.getAllMoves(engine.board, player);
                      boolean hasForcedCap = allMoves.stream().anyMatch(m -> !m.captures.isEmpty());
                      List<GameEngine.Move> myMoves = engine.getMoves(engine.board, row, col, player);
                      if (hasForcedCap && myMoves.stream().noneMatch(m -> !m.captures.isEmpty())) {
                          showToast(getString(R.string.forced_capture));
                          sound.playError(); return;
                      }
                      selectPiece(row, col);
                  }
              }

              private void selectPiece(int r, int c) {
                  selected = new int[]{r, c};
                  validMoves = engine.getMoves(engine.board, r, c, engine.currentPlayer);
                  b.boardView.setSelected(selected, validMoves);
              }

              private void clearSelection() {
                  selected = null; validMoves.clear(); captureChain = null;
                  b.boardView.clearSelection();
              }

              private GameEngine.Move getValidMoveAt(int r, int c) {
                  for (GameEngine.Move m : validMoves) if (m.to[0] == r && m.to[1] == c) return m;
                  return null;
              }

              private void executeMove(GameEngine.Move move, boolean sendToOpponent) {
                  int movingPiece = engine.board[move.from[0]][move.from[1]];
                  undoStack.push(new GameState(engine.board, engine.currentPlayer, engine.p1Count, engine.p2Count));

                  // Animasyonla hamle
                  b.boardView.animateMove(move.from[0], move.from[1], move.to[0], move.to[1], movingPiece, () -> {
                      boolean kinged = engine.applyMoveToBoard(move);
                      b.boardView.setLastMove(move.from, move.to);

                      if (!move.captures.isEmpty()) sound.playCapture(); else sound.playMove();
                      if (kinged) {
                          sound.playKing();
                          showToast(getString(R.string.king_promoted));
                      }

                      // Online'da karşı tarafa gönder
                      if ("online".equals(gameMode) && sendToOpponent) {
                          JsonObject msg = new JsonObject();
                          msg.addProperty("type", "move");
                          msg.addProperty("fr", move.from[0]); msg.addProperty("fc", move.from[1]);
                          msg.addProperty("tr", move.to[0]);  msg.addProperty("tc", move.to[1]);
                          sendToOpponent(msg);
                      }

                      // Zincir yeme kontrolü
                      if (!move.captures.isEmpty()) {
                          int[] to = move.to;
                          List<GameEngine.Move> chain = engine.getCaptures(engine.board, to[0], to[1], engine.currentPlayer);
                          if (!chain.isEmpty()) {
                              captureChain = to; selected = to;
                              validMoves = chain;
                              b.boardView.setSelected(selected, validMoves);
                              updateCounters(); b.boardView.refresh();
                              return;
                          }
                      }
                      captureChain = null;

                      updateCounters();
                      int winner = engine.checkWinner();
                      if (winner != 0) { showGameOver(winner, ""); return; }

                      engine.currentPlayer = engine.currentPlayer == 1 ? 2 : 1;
                      myTurn = "local".equals(gameMode) || myColor == engine.currentPlayer;
                      clearSelection(); updateTurnInfo();
                      b.boardView.refresh();

                      // AI hamlesi
                      if ("ai".equals(gameMode) && engine.currentPlayer == 2) {
                          b.boardView.setListener(null); // dokunuşu geçici engelle
                          new Handler().postDelayed(() -> {
                              b.boardView.setListener(GameActivity.this);
                              GameEngine.Move aiMove = engine.getAIMove();
                              if (aiMove != null) executeMove(aiMove, false);
                          }, 650);
                      }
                  });
              }

              private void sendToOpponent(JsonObject msg) {
                  if (isHost && lanServer != null) lanServer.send(msg);
                  else if (!isHost && lanClient != null) lanClient.send(msg);
              }

              // LanListener callbacks
              @Override public void onClientConnected() {
                  runOnUiThread(() -> showToast("Rakip bağlandı!"));
              }
              @Override public void onClientDisconnected() {
                  runOnUiThread(() -> {
                      showToast(getString(R.string.opponent_left));
                      engine.gameActive = false;
                  });
              }
              @Override public void onMessage(String type, JsonObject data) {
                  if ("move".equals(type)) {
                      GameEngine.Move m = new GameEngine.Move(
                          new int[]{data.get("fr").getAsInt(), data.get("fc").getAsInt()},
                          new int[]{data.get("tr").getAsInt(), data.get("tc").getAsInt()},
                          new ArrayList<>()
                      );
                      // Rakibin hamlesini bul (captures dahil)
                      List<GameEngine.Move> legalMoves = engine.getAllMoves(engine.board, engine.currentPlayer);
                      GameEngine.Move matched = null;
                      for (GameEngine.Move lm : legalMoves) {
                          if (lm.from[0] == m.from[0] && lm.from[1] == m.from[1] &&
                              lm.to[0] == m.to[0] && lm.to[1] == m.to[1]) {
                              matched = lm; break;
                          }
                      }
                      if (matched != null) executeMove(matched, false);
                      myTurn = true;
                  } else if ("chat".equals(type)) {
                      String sender = data.has("name") ? data.get("name").getAsString() : opponentName;
                      String msg = data.get("msg").getAsString();
                      chatMessages.add(new ChatMessage(sender, msg, 0xFF88BBFF));
                      if (chatAdapter != null) {
                          chatAdapter.notifyItemInserted(chatMessages.size() - 1);
                      }
                  }
              }

              private void undoMove() {
                  if (undoStack.isEmpty()) { showToast("Geri alınacak hamle yok"); return; }
                  if ("online".equals(gameMode)) { showToast("Online modda geri alma yapılamaz"); return; }
                  GameState st = undoStack.pop();
                  engine.board = st.board; engine.currentPlayer = st.player;
                  engine.p1Count = st.p1Count; engine.p2Count = st.p2Count;
                  clearSelection(); updateCounters(); updateTurnInfo();
                  b.boardView.setLastMove(null, null); b.boardView.refresh();
                  showToast("Hamle geri alındı");
              }

              private void confirmResign() {
                  if (!engine.gameActive) return;
                  new AlertDialog.Builder(this)
                      .setTitle(getString(R.string.resign))
                      .setMessage(getString(R.string.resign_confirm))
                      .setPositiveButton(getString(R.string.yes), (d, w) ->
                          showGameOver(engine.currentPlayer == 1 ? 2 : 1, "resign"))
                      .setNegativeButton(getString(R.string.no), null).show();
              }

              private void showGameOver(int winner, String reason) {
                  engine.gameActive = false;
                  sound.playWin();
                  String name = winner == 1 ? b.tvP1Name.getText().toString() : b.tvP2Name.getText().toString();
                  String msg = name + " " + getString(R.string.wins);
                  if ("resign".equals(reason)) msg += "\n(Teslim olundu)";
                  new AlertDialog.Builder(this)
                      .setTitle(getString(R.string.game_over))
                      .setMessage(msg)
                      .setPositiveButton(getString(R.string.play_again), (d, w) -> startNewGame())
                      .setNegativeButton(getString(R.string.main_menu), (d, w) -> finish())
                      .setCancelable(false).show();
              }

              private void updatePlayerNames() {
                  String pName = prefs.getPlayerName();
                  if ("ai".equals(gameMode)) {
                      b.tvP1Name.setText(pName.isEmpty() ? "Sen" : pName);
                      b.tvP2Name.setText("🤖 Bilgisayar");
                  } else if ("local".equals(gameMode)) {
                      b.tvP1Name.setText("⚫ Siyah");
                      b.tvP2Name.setText("⚪ Beyaz");
                  } else {
                      b.tvP1Name.setText(isHost ? (prefs.getPlayerName().isEmpty() ? "Sen" : prefs.getPlayerName()) : opponentName);
                      b.tvP2Name.setText(isHost ? opponentName : (prefs.getPlayerName().isEmpty() ? "Sen" : prefs.getPlayerName()));
                  }
              }

              private void updateCounters() {
                  b.tvP1Count.setText(engine.p1Count + " " + getString(R.string.pieces));
                  b.tvP2Count.setText(engine.p2Count + " " + getString(R.string.pieces));
              }

              private void updateTurnInfo() {
                  boolean p1Turn = engine.currentPlayer == 1;
                  b.tvTurnInfo.setText(p1Turn ? "⚫ Siyah oynar" : "⚪ Beyaz oynar");
              }

              private void showChatDialog() {
                  Dialog d = new Dialog(this);
                  d.setContentView(R.layout.dialog_chat);
                  d.getWindow().setLayout(android.view.ViewGroup.LayoutParams.MATCH_PARENT,
                      android.view.ViewGroup.LayoutParams.WRAP_CONTENT);
                  RecyclerView rv = d.findViewById(R.id.rvChat);
                  chatAdapter = new ChatAdapter(chatMessages);
                  rv.setLayoutManager(new LinearLayoutManager(this));
                  rv.setAdapter(chatAdapter);
                  android.widget.EditText et = d.findViewById(R.id.etChatInput);
                  d.findViewById(R.id.btnSendChat).setOnClickListener(v -> {
                      String msg = et.getText().toString().trim();
                      if (msg.isEmpty()) return;
                      chatMessages.add(new ChatMessage(prefs.getPlayerName(), msg, 0xFFFF8899));
                      chatAdapter.notifyItemInserted(chatMessages.size() - 1);
                      rv.scrollToPosition(chatMessages.size() - 1);
                      et.setText("");
                      if ("online".equals(gameMode)) {
                          JsonObject obj = new JsonObject();
                          obj.addProperty("type", "chat");
                          obj.addProperty("msg", msg);
                          obj.addProperty("name", prefs.getPlayerName());
                          sendToOpponent(obj);
                      }
                  });
                  d.show();
              }

              private void showToast(String msg) { Toast.makeText(this, msg, Toast.LENGTH_SHORT).show(); }

              @Override protected void onDestroy() {
                  super.onDestroy();
                  if (lanServer != null) lanServer.stop();
                  if (lanClient != null) lanClient.disconnect();
                  sound.release();
              }
          }
          GAME_EOF

      # ─── LobbyActivity.java (WiFi NSD eşleşme) ───────────────
      - name: Write LobbyActivity.java
        run: |
          cat > app/src/main/java/com/dama/game/LobbyActivity.java << 'LOBBY_EOF'
          package com.dama.game;

          import android.content.Intent;
          import android.os.Bundle;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.recyclerview.widget.LinearLayoutManager;
          import com.dama.game.databinding.ActivityLobbyBinding;
          import java.util.ArrayList;
          import java.util.List;

          public class LobbyActivity extends AppCompatActivity implements NsdHelper.NsdCallback {
              private ActivityLobbyBinding b;
              private PrefsManager prefs;
              private NsdHelper nsd;
              private PlayerAdapter playerAdapter;
              private boolean isRegistered = false;
              private int myPort = 0;

              static class PlayerInfo {
                  String name, host; int port;
                  PlayerInfo(String n, String h, int p) { name=n; host=h; port=p; }
              }

              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  b = ActivityLobbyBinding.inflate(getLayoutInflater());
                  setContentView(b.getRoot());
                  prefs = new PrefsManager(this);
                  b.etPlayerName.setText(prefs.getPlayerName());

                  playerAdapter = new PlayerAdapter(player -> joinPlayer(player));
                  b.rvPlayers.setLayoutManager(new LinearLayoutManager(this));
                  b.rvPlayers.setAdapter(playerAdapter);

                  nsd = new NsdHelper(this, this);

                  b.btnHost.setOnClickListener(v -> hostGame());
                  b.btnSearch.setOnClickListener(v -> {
                      saveName();
                      nsd.discoverServices();
                      b.tvStatus.setText("🔍 Ağda aranıyor…");
                  });
              }

              private void saveName() {
                  String name = b.etPlayerName.getText().toString().trim();
                  if (name.isEmpty()) name = "Oyuncu";
                  prefs.setPlayerName(name);
              }

              private void hostGame() {
                  saveName();
                  if (isRegistered) { showToast("Zaten kayıt edildiniz"); return; }
                  nsd.registerService(prefs.getPlayerName());
                  nsd.discoverServices();
                  b.tvStatus.setText("📡 Yayınlanıyor — rakip bekleniyor…");
                  isRegistered = true;
              }

              private void joinPlayer(PlayerInfo player) {
                  Intent i = new Intent(this, GameActivity.class);
                  i.putExtra("mode", "online");
                  i.putExtra("isHost", false);
                  i.putExtra("host", player.host);
                  i.putExtra("port", player.port);
                  i.putExtra("opponentName", player.name);
                  nsd.tearDown();
                  startActivity(i);
                  finish();
              }

              // NsdCallback
              @Override public void onServiceRegistered(int port) {
                  myPort = port;
                  runOnUiThread(() -> b.tvStatus.setText("📡 Yayında (port " + port + ") — rakip bekleniyor…"));
                  // Host sunucusu başlat ve rakip bağlanınca oyunu başlat
                  LanServer tempServer = new LanServer(new LanServer.LanListener() {
                      @Override public void onClientConnected() {
                          runOnUiThread(() -> {
                              Intent i = new Intent(LobbyActivity.this, GameActivity.class);
                              i.putExtra("mode", "online");
                              i.putExtra("isHost", true);
                              i.putExtra("port", myPort);
                              i.putExtra("opponentName", "Rakip");
                              nsd.tearDown();
                              startActivity(i);
                              finish();
                          });
                      }
                      @Override public void onMessage(String type, com.google.gson.JsonObject data) {}
                      @Override public void onClientDisconnected() {}
                  });
                  tempServer.start(myPort);
              }

              @Override public void onPlayerFound(String name, String host, int port) {
                  runOnUiThread(() -> {
                      String displayName = name.replace("DamaGame_", "");
                      playerAdapter.addPlayer(new PlayerInfo(displayName, host, port));
                      b.tvStatus.setText("✅ " + playerAdapter.getItemCount() + " oyuncu bulundu");
                  });
              }

              @Override public void onPlayerLost(String name) {
                  runOnUiThread(() -> playerAdapter.removePlayer(name));
              }

              @Override public void onError(String msg) {
                  runOnUiThread(() -> b.tvStatus.setText("Hata: " + msg));
              }

              private void showToast(String msg) { Toast.makeText(this, msg, Toast.LENGTH_SHORT).show(); }

              @Override protected void onDestroy() {
                  super.onDestroy();
                  if (nsd != null) nsd.tearDown();
              }

              // ── PlayerAdapter (inline) ──────────────────────────
              static class PlayerAdapter extends androidx.recyclerview.widget.RecyclerView.Adapter<PlayerAdapter.VH> {
                  interface OnJoin { void join(PlayerInfo p); }
                  private List<PlayerInfo> list = new ArrayList<>();
                  private OnJoin listener;
                  PlayerAdapter(OnJoin l) { listener = l; }

                  void addPlayer(PlayerInfo p) {
                      for (PlayerInfo e : list) if (e.host.equals(p.host) && e.port == p.port) return;
                      list.add(p); notifyItemInserted(list.size() - 1);
                  }
                  void removePlayer(String name) {
                      list.removeIf(p -> name.contains(p.name));
                      notifyDataSetChanged();
                  }

                  @Override public VH onCreateViewHolder(android.view.ViewGroup parent, int t) {
                      android.view.View v = android.view.LayoutInflater.from(parent.getContext())
                          .inflate(R.layout.item_player, parent, false);
                      return new VH(v);
                  }
                  @Override public void onBindViewHolder(VH h, int pos) {
                      PlayerInfo p = list.get(pos);
                      h.name.setText(p.name);
                      h.ping.setText("Katıl →");
                      h.itemView.setOnClickListener(v -> listener.join(p));
                  }
                  @Override public int getItemCount() { return list.size(); }

                  static class VH extends androidx.recyclerview.widget.RecyclerView.ViewHolder {
                      android.widget.TextView name, ping, icon;
                      VH(android.view.View v) {
                          super(v);
                          name = v.findViewById(R.id.tvPlayerName);
                          ping = v.findViewById(R.id.tvPlayerPing);
                          icon = v.findViewById(R.id.tvPlayerIcon);
                      }
                  }
              }
          }
          LOBBY_EOF

      # ─── ChatAdapter.java ─────────────────────────────────────
      - name: Write Adapter classes
        run: |
          cat > app/src/main/java/com/dama/game/ChatAdapter.java << 'CHAT_EOF'
          package com.dama.game;
          import android.view.*;
          import android.widget.TextView;
          import androidx.annotation.NonNull;
          import androidx.recyclerview.widget.RecyclerView;
          import java.util.List;
          public class ChatAdapter extends RecyclerView.Adapter<ChatAdapter.VH> {
              private List<GameActivity.ChatMessage> items;
              public ChatAdapter(List<GameActivity.ChatMessage> items) { this.items = items; }
              @NonNull @Override public VH onCreateViewHolder(@NonNull ViewGroup p, int t) {
                  View v = LayoutInflater.from(p.getContext()).inflate(R.layout.item_chat, p, false);
                  return new VH(v);
              }
              @Override public void onBindViewHolder(@NonNull VH h, int pos) {
                  GameActivity.ChatMessage m = items.get(pos);
                  h.sender.setText(m.sender); h.sender.setTextColor(m.color);
                  h.msg.setText(m.text);
              }
              @Override public int getItemCount() { return items.size(); }
              static class VH extends RecyclerView.ViewHolder {
                  TextView sender, msg;
                  VH(View v) { super(v); sender = v.findViewById(R.id.tvChatSender); msg = v.findViewById(R.id.tvChatMessage); }
              }
          }
          CHAT_EOF

      # ─── SettingsDialog.java ──────────────────────────────────
      - name: Write SettingsDialog.java
        run: |
          cat > app/src/main/java/com/dama/game/SettingsDialog.java << 'SETTINGS_EOF'
          package com.dama.game;
          import android.app.Dialog;
          import android.content.Context;
          import android.os.Bundle;
          import android.widget.*;
          public class SettingsDialog extends Dialog {
              private PrefsManager prefs;
              public SettingsDialog(Context ctx) { super(ctx, R.style.Theme_Dama); }
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  prefs = new PrefsManager(getContext());
                  LinearLayout layout = new LinearLayout(getContext());
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setPadding(48, 48, 48, 48);
                  layout.setBackgroundColor(0xFF111827);

                  TextView title = new TextView(getContext());
                  title.setText("⚙  AYARLAR"); title.setTextSize(18);
                  title.setTextColor(0xFFD4A843); layout.addView(title);

                  CheckBox cbVib = new CheckBox(getContext());
                  cbVib.setText("Titreşim"); cbVib.setTextColor(0xFFE8E0CC);
                  cbVib.setChecked(prefs.isVibrationEnabled()); layout.addView(cbVib);

                  CheckBox cbAnim = new CheckBox(getContext());
                  cbAnim.setText("Animasyonlar"); cbAnim.setTextColor(0xFFE8E0CC);
                  cbAnim.setChecked(prefs.isAnimationsEnabled()); layout.addView(cbAnim);

                  TextView tvDiff = new TextView(getContext());
                  tvDiff.setText("\nZorluk Seviyesi:"); tvDiff.setTextColor(0xFFD4A843); layout.addView(tvDiff);

                  RadioGroup rg = new RadioGroup(getContext()); rg.setOrientation(RadioGroup.HORIZONTAL);
                  String[] diffs = {"Kolay","Orta","Zor"};
                  for (int i = 0; i < 3; i++) {
                      RadioButton rb = new RadioButton(getContext());
                      rb.setText(diffs[i]); rb.setTextColor(0xFFE8E0CC); rb.setId(i + 1);
                      rg.addView(rb);
                  }
                  rg.check(prefs.getAiDifficulty()); layout.addView(rg);

                  Button btnSave = new Button(getContext());
                  btnSave.setText("Kaydet"); btnSave.setBackgroundColor(0xFF1A3320);
                  btnSave.setTextColor(0xFF2ECC71);
                  btnSave.setOnClickListener(v -> {
                      prefs.setVibrationEnabled(cbVib.isChecked());
                      prefs.setAnimationsEnabled(cbAnim.isChecked());
                      prefs.setAiDifficulty(rg.getCheckedRadioButtonId());
                      dismiss();
                  });
                  layout.addView(btnSave);
                  setContentView(layout);
              }
          }
          SETTINGS_EOF

      - name: Setup Gradle properly
        run: |
          cat > gradlew << 'GRADLEW_EOF'
          #!/usr/bin/env sh
          set -e
          APP_HOME="$(cd "$(dirname "$0")" && pwd -P)"
          exec java -jar "$APP_HOME/gradle/wrapper/gradle-wrapper.jar" "$@"
          GRADLEW_EOF
          chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --info

      - name: Rename APK
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk -name "*.apk" -exec cp {} artifacts/KlasikDama-v2.0.0-debug.apk \;
          ls -lh artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KlasikDama-APK-${{ github.run_number }}
          path: artifacts/KlasikDama-v2.0.0-debug.apk
          retention-days: 90

      - name: Build Summary
        run: |
          echo "## ✅ Klasik Dama APK Build Başarılı!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 **APK** | KlasikDama-v2.0.0-debug.apk |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎮 **Modlar** | AI, Lokal 2 Kişi, WiFi Eşleşme |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎯 **Kural** | Klasik Türk Dama |" >> $GITHUB_STEP_SUMMARY
          echo "| 📡 **Eşleşme** | NSD - IP girmeden otomatik |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏱ **Süre** | Süresiz |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗 **Build** | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -h artifacts/KlasikDama-v2.0.0-debug.apk 2>/dev/null | cut -f1 || echo "?")
          echo "| 📦 **Boyut** | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: KlasikDama-APK-${{ github.run_number }}
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          name: "Klasik Dama ${{ github.ref_name }}"
          body: |
            ## 🎮 Klasik Dama ${{ github.ref_name }}

            ### 📥 Kurulum
            1. APK'yı indir
            2. Android'de **"Bilinmeyen Kaynaklardan Yükleme"** iznini ver
            3. Kur ve oyna!

            ### ✨ Özellikler
            - 🤖 **Bilgisayara Karşı** — 3 zorluk (Kolay / Orta / Zor + Alpha-Beta)
            - 👥 **Aynı Cihazda** — 2 kişilik lokal mod
            - 📡 **WiFi Eşleşme** — IP girmeden otomatik LAN keşfi (NSD)
            - 🎯 **Klasik Türk Dama Kuralları** — zorunlu yeme, zincir yeme, dame
            - ♟ **Gerçekçi Ahşap Tahta** — animasyonlu taş hareketleri
            - ↩ **Geri alma** (AI ve lokal modda)
            - 💬 **Sohbet** (WiFi modunda)
            - ⏱ **Süresiz oyun**

            ### 📡 WiFi ile Oynamak İçin
            - Her iki telefon **aynı WiFi ağında** olmalı
            - **Oyun Oluştur** → Diğer telefon **Ara** ile bulur → Katıl
            - Sunucu/IP girişi gerekmez, otomatik eşleşir!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ═══════════════════════════════════════════════════════════════
#  KULLANIM:
#  1. Bu dosyayı: .github/workflows/build-apk.yml olarak kaydet
#  2. git push → Actions sekmesi → APK otomatik derlenir
#  3. APK indirmek: Actions → İlgili run → Artifacts → KlasikDama-APK-*
#  4. Release için: git tag v2.0.0 && git push origin v2.0.0
# ═══════════════════════════════════════════════════════════════

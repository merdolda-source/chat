name: "DAMA — Build APK"

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create directories
        run: |
          mkdir -p app/src/main/java/com/dama/game
          mkdir -p app/src/main/res/{layout,values,drawable}
          mkdir -p app/src/main/res/mipmap-{hdpi,xhdpi,xxhdpi,xxxhdpi,anydpi-v26}
          mkdir -p gradle/wrapper

      - name: Write Gradle files
        run: |
          cat > settings.gradle << 'ENDOFFILE'
pluginManagement {
    repositories { google(); mavenCentral(); gradlePluginPortal() }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories { google(); mavenCentral() }
}
rootProject.name = "Dama"
include ':app'
ENDOFFILE

          cat > build.gradle << 'ENDOFFILE'
plugins {
    id 'com.android.application' version '8.2.2' apply false
}
ENDOFFILE

          cat > gradle.properties << 'ENDOFFILE'
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true
ENDOFFILE

          cat > gradle/wrapper/gradle-wrapper.properties << 'ENDOFFILE'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
networkTimeout=10000
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
ENDOFFILE

          cat > app/build.gradle << 'ENDOFFILE'
plugins {
    id 'com.android.application'
}
android {
    namespace 'com.dama.game'
    compileSdk 34
    defaultConfig {
        applicationId "com.dama.game"
        minSdk 24
        targetSdk 34
        versionCode 2
        versionName "2.0.0"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug { debuggable true }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    buildFeatures { viewBinding true }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
}
ENDOFFILE

          echo "-keep class com.dama.game.** { *; }" > app/proguard-rules.pro

          printf '#!/usr/bin/env sh\nset -e\nAPP_HOME="$(cd "$(dirname "$0")" && pwd -P)"\nexec java -jar "$APP_HOME/gradle/wrapper/gradle-wrapper.jar" "$@"\n' > gradlew
          chmod +x gradlew

      - name: Download Gradle wrapper jar
        run: |
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'ENDOFFILE'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    <uses-permission android:name="android.permission.INTERNET"/>
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>
    <uses-permission android:name="android.permission.CHANGE_WIFI_MULTICAST_STATE"/>
    <uses-permission android:name="android.permission.VIBRATE"/>
    <application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:label="@string/app_name"
        android:roundIcon="@mipmap/ic_launcher_round"
        android:supportsRtl="true"
        android:hardwareAccelerated="true"
        android:theme="@style/Theme.Dama"
        xmlns:tools="http://schemas.android.com/tools"
        tools:replace="android:icon,android:roundIcon">
        <activity android:name=".SplashActivity" android:exported="true"
            android:screenOrientation="portrait" android:theme="@style/Theme.Dama.Splash">
            <intent-filter>
                <action android:name="android.intent.action.MAIN"/>
                <category android:name="android.intent.category.LAUNCHER"/>
            </intent-filter>
        </activity>
        <activity android:name=".MainActivity" android:exported="false" android:screenOrientation="portrait"/>
        <activity android:name=".GameActivity" android:exported="false"
            android:screenOrientation="portrait" android:windowSoftInputMode="adjustResize"/>
        <activity android:name=".LobbyActivity" android:exported="false"
            android:screenOrientation="portrait" android:windowSoftInputMode="adjustResize"/>
    </application>
</manifest>
ENDOFFILE


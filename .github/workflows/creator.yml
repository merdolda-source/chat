name: Build IPTV APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Flutter projesi olustur
        run: flutter create --org com.tinetv --project-name tinetv tinetv_app

      - name: pubspec.yaml yaz
        run: |
          cat > tinetv_app/pubspec.yaml << 'PUBSPEC'
          name: tinetv
          description: TinetV IPTV
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            http: ^1.2.1
            cached_network_image: ^3.3.1
            better_player: ^0.0.84
            native_device_orientation: ^2.0.1
            wakelock_plus: ^1.2.8

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          PUBSPEC

      - name: build.gradle guncelle (minSdk 22, compileSdk 36)
        run: |
          GRADLE_FILE="tinetv_app/android/app/build.gradle"
          # minSdkVersion 21 -> 22
          sed -i 's/minSdkVersion 21/minSdkVersion 22/' "$GRADLE_FILE"
          sed -i 's/minSdk 21/minSdk 22/' "$GRADLE_FILE"
          # compileSdkVersion -> 36
          sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 36/' "$GRADLE_FILE"
          sed -i 's/compileSdk [0-9]*/compileSdk 36/' "$GRADLE_FILE"
          # targetSdkVersion -> 36
          sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 36/' "$GRADLE_FILE"
          sed -i 's/targetSdk [0-9]*/targetSdk 36/' "$GRADLE_FILE"
          echo "=== build.gradle ==="
          cat "$GRADLE_FILE"

      - name: main.dart yaz
        run: |
          cat > tinetv_app/lib/main.dart << 'MAINDART'
          import 'dart:async';
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:http/http.dart' as http;
          import 'package:cached_network_image/cached_network_image.dart';
          import 'package:better_player/better_player.dart';
          import 'package:native_device_orientation/native_device_orientation.dart';
          import 'package:wakelock_plus/wakelock_plus.dart';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            SystemChrome.setPreferredOrientations([DeviceOrientation.portraitUp]);
            runApp(const MyApp());
          }

          // ── MODEL ─────────────────────────────────────────────────────────────
          class Channel {
            final String name;
            final String url;
            final String? logo;
            final String? group;
            final String? userAgent;
            final String? referrer;
            final String? origin;
            Channel({
              required this.name,
              required this.url,
              this.logo,
              this.group,
              this.userAgent,
              this.referrer,
              this.origin,
            });
          }

          // ── M3U PARSER ────────────────────────────────────────────────────────
          List<Channel> parseM3U(String content) {
            final channels = <Channel>[];
            final lines = content.split('\n');
            String? name, logo, group, userAgent, referrer, origin;

            for (var i = 0; i < lines.length; i++) {
              final line = lines[i].trim();
              if (line.startsWith('#EXTINF')) {
                name = null; logo = null; group = null;
                userAgent = null; referrer = null; origin = null;

                logo = RegExp(r'tvg-logo="([^"]*)"').firstMatch(line)?.group(1);
                group = RegExp(r'group-title="([^"]*)"').firstMatch(line)?.group(1);
                userAgent = RegExp(r'user-agent="([^"]*)"', caseSensitive: false).firstMatch(line)?.group(1);
                referrer = RegExp(r'referrer="([^"]*)"', caseSensitive: false).firstMatch(line)?.group(1);
                origin = RegExp(r'origin="([^"]*)"', caseSensitive: false).firstMatch(line)?.group(1);

                final ci = line.lastIndexOf(',');
                if (ci != -1) name = line.substring(ci + 1).trim();

              } else if (line.startsWith('#EXTVLCOPT') && name != null) {
                final ua = RegExp(r'http-user-agent=(.+)', caseSensitive: false).firstMatch(line)?.group(1)?.trim();
                final ref = RegExp(r'http-referrer=(.+)', caseSensitive: false).firstMatch(line)?.group(1)?.trim();
                if (ua != null) userAgent = ua;
                if (ref != null) referrer = ref;

              } else if (line.startsWith('http') && name != null) {
                String url = line;
                if (line.contains('|')) {
                  final parts = line.split('|');
                  url = parts[0].trim();
                  final opts = parts[1];
                  final ua = RegExp(r'[Uu]ser-[Aa]gent=([^&\s]+)').firstMatch(opts)?.group(1);
                  final ref = RegExp(r'[Rr]eferer=([^&\s]+)').firstMatch(opts)?.group(1);
                  final orig = RegExp(r'[Oo]rigin=([^&\s]+)').firstMatch(opts)?.group(1);
                  if (ua != null) userAgent ??= Uri.decodeComponent(ua);
                  if (ref != null) referrer ??= Uri.decodeComponent(ref);
                  if (orig != null) origin ??= Uri.decodeComponent(orig);
                }
                channels.add(Channel(
                  name: name, url: url, logo: logo, group: group,
                  userAgent: userAgent, referrer: referrer, origin: origin,
                ));
                name = null;
              }
            }
            return channels;
          }

          // ── APP ───────────────────────────────────────────────────────────────
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'TinetV',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  brightness: Brightness.dark,
                  scaffoldBackgroundColor: const Color(0xFF0A0A0A),
                  colorScheme: const ColorScheme.dark(
                    primary: Color(0xFFE50914),
                    surface: Color(0xFF181818),
                  ),
                  appBarTheme: const AppBarTheme(
                    backgroundColor: Color(0xFF0A0A0A),
                    elevation: 0,
                  ),
                  useMaterial3: true,
                ),
                home: const SplashScreen(),
              );
            }
          }

          // ── SPLASH ────────────────────────────────────────────────────────────
          class SplashScreen extends StatefulWidget {
            const SplashScreen({super.key});
            @override
            State<SplashScreen> createState() => _SplashScreenState();
          }

          class _SplashScreenState extends State<SplashScreen>
              with SingleTickerProviderStateMixin {
            late AnimationController _ctrl;
            late Animation<double> _scale;
            late Animation<double> _fade;

            @override
            void initState() {
              super.initState();
              _ctrl = AnimationController(vsync: this, duration: const Duration(milliseconds: 1200));
              _scale = Tween(begin: 0.7, end: 1.0)
                  .animate(CurvedAnimation(parent: _ctrl, curve: Curves.easeOutBack));
              _fade = CurvedAnimation(parent: _ctrl, curve: Curves.easeIn);
              _ctrl.forward();
              Future.delayed(const Duration(seconds: 3), () {
                if (mounted) Navigator.of(context).pushReplacement(
                  PageRouteBuilder(
                    pageBuilder: (_, __, ___) => const ChannelListScreen(),
                    transitionsBuilder: (_, anim, __, child) =>
                        FadeTransition(opacity: anim, child: child),
                    transitionDuration: const Duration(milliseconds: 400),
                  ),
                );
              });
            }

            @override
            void dispose() { _ctrl.dispose(); super.dispose(); }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: const Color(0xFF0A0A0A),
                body: FadeTransition(
                  opacity: _fade,
                  child: Center(
                    child: ScaleTransition(
                      scale: _scale,
                      child: Column(
                        mainAxisAlignment: MainAxisAlignment.center,
                        children: [
                          Container(
                            width: 100, height: 100,
                            decoration: BoxDecoration(
                              gradient: const LinearGradient(
                                colors: [Color(0xFFE50914), Color(0xFF8B0000)],
                                begin: Alignment.topLeft,
                                end: Alignment.bottomRight,
                              ),
                              borderRadius: BorderRadius.circular(20),
                              boxShadow: [BoxShadow(
                                color: const Color(0xFFE50914).withOpacity(0.4),
                                blurRadius: 30, spreadRadius: 5,
                              )],
                            ),
                            child: const Icon(Icons.live_tv, size: 58, color: Colors.white),
                          ),
                          const SizedBox(height: 22),
                          const Text('TinetV',
                              style: TextStyle(color: Colors.white, fontSize: 32,
                                  fontWeight: FontWeight.bold, letterSpacing: 4)),
                          const SizedBox(height: 6),
                          const Text('CANLI YAYIN',
                              style: TextStyle(color: Color(0xFFE50914), fontSize: 11,
                                  letterSpacing: 6, fontWeight: FontWeight.w500)),
                          const SizedBox(height: 50),
                          SizedBox(
                            width: 120,
                            child: LinearProgressIndicator(
                              backgroundColor: Colors.white10,
                              color: const Color(0xFFE50914),
                              borderRadius: BorderRadius.circular(4),
                            ),
                          ),
                        ],
                      ),
                    ),
                  ),
                ),
              );
            }
          }

          // ── CHANNEL LIST ──────────────────────────────────────────────────────
          class ChannelListScreen extends StatefulWidget {
            const ChannelListScreen({super.key});
            @override
            State<ChannelListScreen> createState() => _ChannelListScreenState();
          }

          class _ChannelListScreenState extends State<ChannelListScreen> {
            static const String _m3uUrl =
                'https://streams.uzunmuhalefet.com/lists/tr.m3u';

            List<Channel> _all = [];
            List<Channel> _filtered = [];
            List<String> _groups = [];
            String _selectedGroup = 'Tumu';
            bool _loading = true;
            String? _error;
            final _searchCtrl = TextEditingController();
            final _scrollCtrl = ScrollController();

            @override
            void initState() {
              super.initState();
              _loadChannels();
              _searchCtrl.addListener(_applyFilter);
            }

            @override
            void dispose() {
              _searchCtrl.dispose();
              _scrollCtrl.dispose();
              super.dispose();
            }

            Future<void> _loadChannels() async {
              setState(() { _loading = true; _error = null; });
              try {
                final res = await http.get(Uri.parse(_m3uUrl), headers: {
                  'User-Agent': 'Mozilla/5.0 (Linux; Android 11) AppleWebKit/537.36',
                }).timeout(const Duration(seconds: 25));
                if (res.statusCode == 200) {
                  final channels = parseM3U(res.body);
                  final groupSet = <String>{};
                  for (final c in channels) groupSet.add(c.group ?? 'Diger');
                  final groups = ['Tumu', ...groupSet.toList()..sort()];
                  setState(() {
                    _all = channels;
                    _filtered = channels;
                    _groups = groups;
                    _loading = false;
                  });
                } else {
                  setState(() { _error = 'HTTP ${res.statusCode}'; _loading = false; });
                }
              } catch (e) {
                setState(() { _error = e.toString(); _loading = false; });
              }
            }

            void _applyFilter() {
              final q = _searchCtrl.text.toLowerCase();
              setState(() {
                _filtered = _all.where((c) {
                  final gm = _selectedGroup == 'Tumu' || (c.group ?? 'Diger') == _selectedGroup;
                  final nm = c.name.toLowerCase().contains(q);
                  return gm && nm;
                }).toList();
              });
            }

            void _selectGroup(String g) {
              setState(() => _selectedGroup = g);
              _applyFilter();
              _scrollCtrl.animateTo(0,
                  duration: const Duration(milliseconds: 200), curve: Curves.easeOut);
            }

            Widget _logoPlaceholder() => Container(
              width: 48, height: 48,
              decoration: BoxDecoration(
                color: const Color(0xFF242424),
                borderRadius: BorderRadius.circular(8),
              ),
              child: const Icon(Icons.tv, color: Colors.white24, size: 24),
            );

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: const Color(0xFF0A0A0A),
                appBar: AppBar(
                  backgroundColor: const Color(0xFF0A0A0A),
                  titleSpacing: 16,
                  title: Row(children: [
                    Container(
                      padding: const EdgeInsets.all(5),
                      decoration: BoxDecoration(
                        color: const Color(0xFFE50914),
                        borderRadius: BorderRadius.circular(6),
                      ),
                      child: const Icon(Icons.live_tv, size: 16, color: Colors.white),
                    ),
                    const SizedBox(width: 10),
                    const Text('TinetV',
                        style: TextStyle(color: Colors.white,
                            fontWeight: FontWeight.bold, fontSize: 20)),
                  ]),
                  actions: [
                    IconButton(
                      icon: const Icon(Icons.refresh, color: Colors.white54),
                      onPressed: _loadChannels,
                    ),
                  ],
                  bottom: PreferredSize(
                    preferredSize: const Size.fromHeight(52),
                    child: Padding(
                      padding: const EdgeInsets.fromLTRB(12, 0, 12, 10),
                      child: TextField(
                        controller: _searchCtrl,
                        style: const TextStyle(color: Colors.white, fontSize: 14),
                        decoration: InputDecoration(
                          hintText: 'Kanal ara...',
                          hintStyle: const TextStyle(color: Colors.white30, fontSize: 14),
                          prefixIcon: const Icon(Icons.search, color: Colors.white30, size: 20),
                          suffixIcon: _searchCtrl.text.isNotEmpty
                              ? IconButton(
                                  icon: const Icon(Icons.clear, color: Colors.white30, size: 18),
                                  onPressed: () { _searchCtrl.clear(); _applyFilter(); },
                                )
                              : null,
                          filled: true,
                          fillColor: const Color(0xFF1E1E1E),
                          border: OutlineInputBorder(
                            borderRadius: BorderRadius.circular(12),
                            borderSide: BorderSide.none,
                          ),
                          contentPadding: const EdgeInsets.symmetric(vertical: 0),
                        ),
                      ),
                    ),
                  ),
                ),
                body: _loading
                    ? const Center(child: Column(
                        mainAxisAlignment: MainAxisAlignment.center,
                        children: [
                          CircularProgressIndicator(color: Color(0xFFE50914)),
                          SizedBox(height: 16),
                          Text('Liste yukleniyor...',
                              style: TextStyle(color: Colors.white38, fontSize: 13)),
                        ]))
                    : _error != null
                        ? Center(child: Padding(
                            padding: const EdgeInsets.all(32),
                            child: Column(
                              mainAxisAlignment: MainAxisAlignment.center,
                              children: [
                                const Icon(Icons.cloud_off, color: Colors.white24, size: 64),
                                const SizedBox(height: 16),
                                const Text('Liste yuklenemedi',
                                    style: TextStyle(color: Colors.white,
                                        fontSize: 16, fontWeight: FontWeight.bold)),
                                const SizedBox(height: 8),
                                Text(_error!,
                                    textAlign: TextAlign.center,
                                    style: const TextStyle(color: Colors.white38, fontSize: 12)),
                                const SizedBox(height: 24),
                                ElevatedButton.icon(
                                  style: ElevatedButton.styleFrom(
                                      backgroundColor: const Color(0xFFE50914),
                                      foregroundColor: Colors.white,
                                      padding: const EdgeInsets.symmetric(
                                          horizontal: 24, vertical: 12),
                                      shape: RoundedRectangleBorder(
                                          borderRadius: BorderRadius.circular(10))),
                                  onPressed: _loadChannels,
                                  icon: const Icon(Icons.refresh, size: 18),
                                  label: const Text('Tekrar Dene'),
                                ),
                              ],
                            )))
                        : Column(children: [
                            SizedBox(
                              height: 38,
                              child: ListView.builder(
                                scrollDirection: Axis.horizontal,
                                padding: const EdgeInsets.symmetric(horizontal: 12),
                                itemCount: _groups.length,
                                itemBuilder: (_, i) {
                                  final g = _groups[i];
                                  final sel = g == _selectedGroup;
                                  return Padding(
                                    padding: const EdgeInsets.only(right: 6),
                                    child: GestureDetector(
                                      onTap: () => _selectGroup(g),
                                      child: AnimatedContainer(
                                        duration: const Duration(milliseconds: 200),
                                        padding: const EdgeInsets.symmetric(
                                            horizontal: 14, vertical: 6),
                                        decoration: BoxDecoration(
                                          color: sel
                                              ? const Color(0xFFE50914)
                                              : const Color(0xFF1E1E1E),
                                          borderRadius: BorderRadius.circular(20),
                                        ),
                                        child: Text(g,
                                            style: TextStyle(
                                                color: sel ? Colors.white : Colors.white54,
                                                fontSize: 12,
                                                fontWeight: sel
                                                    ? FontWeight.bold
                                                    : FontWeight.normal)),
                                      ),
                                    ),
                                  );
                                },
                              ),
                            ),
                            const SizedBox(height: 4),
                            Padding(
                              padding: const EdgeInsets.symmetric(horizontal: 16, vertical: 4),
                              child: Row(children: [
                                Text('${_filtered.length} kanal',
                                    style: const TextStyle(color: Colors.white30, fontSize: 11)),
                              ]),
                            ),
                            Expanded(
                              child: ListView.builder(
                                controller: _scrollCtrl,
                                itemCount: _filtered.length,
                                itemBuilder: (_, i) {
                                  final ch = _filtered[i];
                                  return _ChannelTile(
                                    channel: ch,
                                    onTap: () => Navigator.push(
                                      context,
                                      PageRouteBuilder(
                                        pageBuilder: (_, __, ___) => PlayerScreen(channel: ch),
                                        transitionsBuilder: (_, anim, __, child) =>
                                            FadeTransition(opacity: anim, child: child),
                                        transitionDuration: const Duration(milliseconds: 300),
                                      ),
                                    ),
                                  );
                                },
                              ),
                            ),
                          ]),
              );
            }
          }

          class _ChannelTile extends StatelessWidget {
            final Channel channel;
            final VoidCallback onTap;
            const _ChannelTile({required this.channel, required this.onTap});

            Widget _logo() => Container(
              width: 48, height: 48,
              decoration: BoxDecoration(
                color: const Color(0xFF242424),
                borderRadius: BorderRadius.circular(8),
              ),
              child: const Icon(Icons.tv, color: Colors.white24, size: 24),
            );

            @override
            Widget build(BuildContext context) {
              return InkWell(
                onTap: onTap,
                splashColor: const Color(0xFFE50914).withOpacity(0.1),
                highlightColor: const Color(0xFFE50914).withOpacity(0.05),
                child: Padding(
                  padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 6),
                  child: Row(children: [
                    ClipRRect(
                      borderRadius: BorderRadius.circular(8),
                      child: channel.logo != null && channel.logo!.isNotEmpty
                          ? CachedNetworkImage(
                              imageUrl: channel.logo!,
                              width: 48, height: 48,
                              fit: BoxFit.contain,
                              placeholder: (_, __) => _logo(),
                              errorWidget: (_, __, ___) => _logo(),
                            )
                          : _logo(),
                    ),
                    const SizedBox(width: 12),
                    Expanded(
                      child: Column(
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          Text(channel.name,
                              style: const TextStyle(color: Colors.white, fontSize: 13,
                                  fontWeight: FontWeight.w500),
                              maxLines: 1, overflow: TextOverflow.ellipsis),
                          if (channel.group != null)
                            Text(channel.group!,
                                style: const TextStyle(color: Colors.white30, fontSize: 11),
                                maxLines: 1, overflow: TextOverflow.ellipsis),
                        ],
                      ),
                    ),
                    const Icon(Icons.play_circle_outline,
                        color: Color(0xFFE50914), size: 22),
                  ]),
                ),
              );
            }
          }

          // ── PLAYER ────────────────────────────────────────────────────────────
          class PlayerScreen extends StatefulWidget {
            final Channel channel;
            const PlayerScreen({super.key, required this.channel});
            @override
            State<PlayerScreen> createState() => _PlayerScreenState();
          }

          class _PlayerScreenState extends State<PlayerScreen> {
            BetterPlayerController? _playerCtrl;
            bool _loading = true;
            String? _error;
            StreamSubscription<NativeDeviceOrientation>? _orientSub;

            @override
            void initState() {
              super.initState();
              WakelockPlus.enable();
              _listenOrientation();
              _initPlayer();
            }

            void _listenOrientation() {
              _orientSub = NativeDeviceOrientationCommunicator()
                  .onOrientationChanged(useSensor: true)
                  .listen((o) {
                final land = o == NativeDeviceOrientation.landscapeLeft ||
                    o == NativeDeviceOrientation.landscapeRight;
                if (land) {
                  SystemChrome.setPreferredOrientations([
                    DeviceOrientation.landscapeLeft,
                    DeviceOrientation.landscapeRight,
                  ]);
                  SystemChrome.setEnabledSystemUIMode(SystemUiMode.immersiveSticky);
                } else {
                  SystemChrome.setPreferredOrientations([DeviceOrientation.portraitUp]);
                  SystemChrome.setEnabledSystemUIMode(SystemUiMode.edgeToEdge);
                }
              });
            }

            Map<String, String> _buildHeaders() {
              final ch = widget.channel;
              final h = <String, String>{};
              h['User-Agent'] = ch.userAgent ??
                  'Mozilla/5.0 (Linux; Android 11; Mobile) AppleWebKit/537.36 '
                  '(KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36';
              try {
                final uri = Uri.parse(ch.url);
                final base = '${uri.scheme}://${uri.host}';
                h['Referer'] = ch.referrer ?? '$base/';
                h['Origin'] = ch.origin ?? base;
              } catch (_) {}
              return h;
            }

            Future<void> _initPlayer() async {
              setState(() { _loading = true; _error = null; });
              try {
                _playerCtrl?.dispose();
                final headers = _buildHeaders();
                final url = widget.channel.url;
                final isHls = url.contains('.m3u8') ||
                    url.contains('hls') || url.contains('playlist');

                final ds = BetterPlayerDataSource(
                  BetterPlayerDataSourceType.network,
                  url,
                  videoFormat: isHls
                      ? BetterPlayerVideoFormat.hls
                      : BetterPlayerVideoFormat.other,
                  headers: headers,
                  liveStream: true,
                  notificationConfiguration: BetterPlayerNotificationConfiguration(
                    showNotification: true,
                    title: widget.channel.name,
                    author: widget.channel.group ?? 'TinetV',
                  ),
                );

                final ctrl = BetterPlayerController(
                  BetterPlayerConfiguration(
                    autoPlay: true,
                    looping: false,
                    aspectRatio: 16 / 9,
                    fit: BoxFit.contain,
                    allowedScreenSleep: false,
                    autoDetectFullscreenDeviceOrientation: false,
                    autoDetectFullscreenAspectRatio: true,
                    fullScreenByDefault: false,
                    controlsConfiguration: const BetterPlayerControlsConfiguration(
                      enableFullscreen: true,
                      enableMute: true,
                      enablePlayPause: true,
                      enableProgressBar: false,
                      enableSkips: false,
                      enableSubtitles: false,
                      enableQualities: false,
                      enableAudioTracks: false,
                      enableOverflowMenu: false,
                      showControlsOnInitialize: false,
                      playerTheme: BetterPlayerTheme.material,
                      controlBarColor: Colors.transparent,
                      iconsColor: Colors.white,
                      loadingWidget: SizedBox.shrink(),
                    ),
                  ),
                  betterPlayerDataSource: ds,
                );

                setState(() { _playerCtrl = ctrl; _loading = false; });
              } catch (e) {
                setState(() { _error = e.toString(); _loading = false; });
              }
            }

            @override
            void dispose() {
              _orientSub?.cancel();
              _playerCtrl?.dispose();
              WakelockPlus.disable();
              SystemChrome.setPreferredOrientations([DeviceOrientation.portraitUp]);
              SystemChrome.setEnabledSystemUIMode(SystemUiMode.edgeToEdge);
              super.dispose();
            }

            @override
            Widget build(BuildContext context) {
              final isLand = MediaQuery.of(context).orientation == Orientation.landscape;
              return Scaffold(
                backgroundColor: Colors.black,
                appBar: isLand
                    ? null
                    : AppBar(
                        backgroundColor: Colors.black,
                        leading: IconButton(
                          icon: const Icon(Icons.arrow_back, color: Colors.white),
                          onPressed: () => Navigator.pop(context),
                        ),
                        title: Column(
                          crossAxisAlignment: CrossAxisAlignment.start,
                          children: [
                            Text(widget.channel.name,
                                style: const TextStyle(color: Colors.white,
                                    fontSize: 14, fontWeight: FontWeight.bold),
                                maxLines: 1, overflow: TextOverflow.ellipsis),
                            if (widget.channel.group != null)
                              Text(widget.channel.group!,
                                  style: const TextStyle(
                                      color: Colors.white38, fontSize: 11)),
                          ],
                        ),
                      ),
                body: _loading
                    ? const Center(child: Column(
                        mainAxisAlignment: MainAxisAlignment.center,
                        children: [
                          CircularProgressIndicator(
                              color: Color(0xFFE50914), strokeWidth: 2),
                          SizedBox(height: 14),
                          Text('Baglaniliyor...',
                              style: TextStyle(color: Colors.white38, fontSize: 12)),
                        ]))
                    : _error != null
                        ? Center(child: Padding(
                            padding: const EdgeInsets.all(28),
                            child: Column(
                              mainAxisAlignment: MainAxisAlignment.center,
                              children: [
                                const Icon(Icons.wifi_off, color: Colors.white24, size: 56),
                                const SizedBox(height: 16),
                                const Text('Yayin acilamadi',
                                    style: TextStyle(color: Colors.white,
                                        fontSize: 15, fontWeight: FontWeight.bold)),
                                const SizedBox(height: 8),
                                Text(_error!,
                                    textAlign: TextAlign.center,
                                    style: const TextStyle(
                                        color: Colors.white38, fontSize: 11),
                                    maxLines: 3, overflow: TextOverflow.ellipsis),
                                const SizedBox(height: 24),
                                ElevatedButton.icon(
                                  style: ElevatedButton.styleFrom(
                                      backgroundColor: const Color(0xFFE50914),
                                      foregroundColor: Colors.white,
                                      shape: RoundedRectangleBorder(
                                          borderRadius: BorderRadius.circular(10))),
                                  onPressed: _initPlayer,
                                  icon: const Icon(Icons.refresh, size: 18),
                                  label: const Text('Tekrar Dene'),
                                ),
                              ],
                            )))
                        : isLand
                            ? SizedBox.expand(
                                child: BetterPlayer(controller: _playerCtrl!))
                            : Column(children: [
                                AspectRatio(
                                  aspectRatio: 16 / 9,
                                  child: BetterPlayer(controller: _playerCtrl!),
                                ),
                                Expanded(child: Padding(
                                  padding: const EdgeInsets.all(16),
                                  child: Column(
                                    crossAxisAlignment: CrossAxisAlignment.start,
                                    children: [
                                      Text(widget.channel.name,
                                          style: const TextStyle(color: Colors.white,
                                              fontSize: 16, fontWeight: FontWeight.bold)),
                                      if (widget.channel.group != null)
                                        Padding(
                                          padding: const EdgeInsets.only(top: 4),
                                          child: Text(widget.channel.group!,
                                              style: const TextStyle(
                                                  color: Colors.white38, fontSize: 12)),
                                        ),
                                      const SizedBox(height: 16),
                                      const Row(children: [
                                        Icon(Icons.screen_rotation,
                                            color: Colors.white24, size: 14),
                                        SizedBox(width: 6),
                                        Text('Tam ekran icin telefonu yan ceviriniz',
                                            style: TextStyle(
                                                color: Colors.white24, fontSize: 11)),
                                      ]),
                                    ],
                                  ),
                                )),
                              ]),
              );
            }
          }
          MAINDART

      - name: AndroidManifest.xml yaz
        run: |
          cat > tinetv_app/android/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <application
                  android:label="TinetV"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:screenOrientation="sensor"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          MANIFEST

      - name: Bagimlilik yukle
        working-directory: tinetv_app
        run: flutter pub get

      - name: APK derle
        working-directory: tinetv_app
        run: flutter build apk --release --split-per-abi

      - name: APK Artifacts yukle
        uses: actions/upload-artifact@v4
        with:
          name: tinetv-apk
          path: tinetv_app/build/app/outputs/flutter-apk/*.apk

      - name: Release olustur
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ github.run_number }}
          name: "TinetV v${{ github.run_number }}"
          artifacts: "tinetv_app/build/app/outputs/flutter-apk/*.apk"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true

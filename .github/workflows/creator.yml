name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Flutter projesi oluştur
        run: flutter create --org com.tinetv --project-name tinetv tinetv_app

      - name: pubspec.yaml yaz
        run: |
          cat > tinetv_app/pubspec.yaml << 'PUBSPEC'
          name: tinetv
          description: TinetV uygulaması
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.7.0

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          PUBSPEC

      - name: main.dart yaz
        run: |
          cat > tinetv_app/lib/main.dart << 'MAINDART'
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            SystemChrome.setPreferredOrientations([
              DeviceOrientation.portraitUp,
              DeviceOrientation.landscapeLeft,
              DeviceOrientation.landscapeRight,
            ]);
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'TinetV',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(seedColor: Colors.deepPurple),
                  useMaterial3: true,
                ),
                home: const SplashScreen(),
              );
            }
          }

          class SplashScreen extends StatefulWidget {
            const SplashScreen({super.key});
            @override
            State<SplashScreen> createState() => _SplashScreenState();
          }

          class _SplashScreenState extends State<SplashScreen>
              with SingleTickerProviderStateMixin {
            late AnimationController _controller;
            late Animation<double> _fadeAnim;

            @override
            void initState() {
              super.initState();
              _controller = AnimationController(
                  vsync: this, duration: const Duration(seconds: 2));
              _fadeAnim =
                  CurvedAnimation(parent: _controller, curve: Curves.easeIn);
              _controller.forward();
              Future.delayed(const Duration(seconds: 3), () {
                if (mounted) {
                  Navigator.of(context).pushReplacement(
                    MaterialPageRoute(builder: (_) => const WebViewScreen()),
                  );
                }
              });
            }

            @override
            void dispose() {
              _controller.dispose();
              super.dispose();
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: Colors.black,
                body: FadeTransition(
                  opacity: _fadeAnim,
                  child: Center(
                    child: Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: [
                        Container(
                          width: 120,
                          height: 120,
                          decoration: BoxDecoration(
                            color: Colors.deepPurple,
                            borderRadius: BorderRadius.circular(24),
                          ),
                          child: const Icon(Icons.play_circle_fill,
                              size: 80, color: Colors.white),
                        ),
                        const SizedBox(height: 24),
                        const Text('TinetV',
                            style: TextStyle(
                                color: Colors.white,
                                fontSize: 32,
                                fontWeight: FontWeight.bold,
                                letterSpacing: 2)),
                        const SizedBox(height: 8),
                        const Text('tinetvresmi.site',
                            style: TextStyle(color: Colors.white54, fontSize: 14)),
                        const SizedBox(height: 48),
                        const CircularProgressIndicator(color: Colors.deepPurple),
                      ],
                    ),
                  ),
                ),
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});
            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController _controller;
            bool _isLoading = true;
            bool _canGoBack = false;
            bool _canGoForward = false;

            static const String _url = 'https://tinetvresmi.site';

            @override
            void initState() {
              super.initState();
              _controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(Colors.black)
                ..setNavigationDelegate(NavigationDelegate(
                  onPageStarted: (_) => setState(() => _isLoading = true),
                  onPageFinished: (_) async {
                    setState(() => _isLoading = false);
                    _canGoBack = await _controller.canGoBack();
                    _canGoForward = await _controller.canGoForward();
                    setState(() {});
                  },
                  onWebResourceError: (_) => setState(() => _isLoading = false),
                ))
                ..loadRequest(Uri.parse(_url));
            }

            @override
            Widget build(BuildContext context) {
              return PopScope(
                canPop: false,
                onPopInvoked: (didPop) async {
                  if (!didPop) {
                    if (await _controller.canGoBack()) {
                      _controller.goBack();
                    } else {
                      if (context.mounted) SystemNavigator.pop();
                    }
                  }
                },
                child: Scaffold(
                  backgroundColor: Colors.black,
                  appBar: AppBar(
                    backgroundColor: Colors.black,
                    foregroundColor: Colors.white,
                    titleSpacing: 0,
                    title: const Text('TinetV',
                        style: TextStyle(
                            color: Colors.white,
                            fontWeight: FontWeight.bold,
                            fontSize: 18)),
                    actions: [
                      IconButton(
                        icon: Icon(Icons.arrow_back_ios,
                            color: _canGoBack ? Colors.white : Colors.white30,
                            size: 20),
                        onPressed: _canGoBack ? () => _controller.goBack() : null,
                      ),
                      IconButton(
                        icon: Icon(Icons.arrow_forward_ios,
                            color: _canGoForward ? Colors.white : Colors.white30,
                            size: 20),
                        onPressed:
                            _canGoForward ? () => _controller.goForward() : null,
                      ),
                      IconButton(
                        icon: const Icon(Icons.refresh, color: Colors.white),
                        onPressed: () => _controller.reload(),
                      ),
                    ],
                  ),
                  body: Stack(
                    children: [
                      WebViewWidget(controller: _controller),
                      if (_isLoading)
                        const Center(
                          child: CircularProgressIndicator(color: Colors.deepPurple),
                        ),
                    ],
                  ),
                ),
              );
            }
          }
          MAINDART

      - name: AndroidManifest.xml yaz
        run: |
          cat > tinetv_app/android/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <application
                  android:label="TinetV"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          MANIFEST

      - name: Bağımlılıkları yükle
        working-directory: tinetv_app
        run: flutter pub get

      - name: APK derle
        working-directory: tinetv_app
        run: flutter build apk --release --split-per-abi

      - name: APK'yı Artifacts olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: tinetv-apk
          path: tinetv_app/build/app/outputs/flutter-apk/*.apk

      - name: Release oluştur
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ github.run_number }}
          name: "TinetV v${{ github.run_number }}"
          artifacts: "tinetv_app/build/app/outputs/flutter-apk/*.apk"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
